{id:941,a:"centennial",c:"Outdoors",t:"Horse Drive Trailhead",e:"\uD83D\uDEB6",d:"A starting point for trails heading northwest into the desert toward the Spring Mountains. Mostly flat with desert terrain and wide open sky.",g:"Horse Drive Trailhead Las Vegas",tg:["Hiking","Nature","Free"]},
{id:942,a:"centennial",c:"Experience",t:"Red Rock Lanes Cosmic Bowl",e:"\uD83C\uDFB3",d:"Friday and Saturday nights at Red Rock Casino bowling turn into a cosmic experience with blacklights, music, and a bar scene. Fun date night in the suburbs.",g:"Red Rock Lanes Cosmic Bowl Las Vegas",tg:["Nightlife","Fun","Local"]},
{id:943,a:"enterprise",c:"Outdoors",t:"Las Vegas Wash Henderson",e:"\uD83C\uDF3F",d:"A section of the Las Vegas Wash between Sunset Park and Lake Mead with paved trails, bird blinds, and interpretive signs. Easy walking through an urban wetland.",g:"Las Vegas Wash Trail Henderson",tg:["Nature","Free","Family"]},
{id:944,a:"enterprise",c:"Food & Drink",t:"Thai BBQ",e:"\uD83C\uDF5B",d:"Thai street food near the South Strip. The papaya salad and the grilled chicken with sticky rice are both perfect. Open late, cash friendly.",g:"Thai BBQ Las Vegas",tg:["Local","Authentic","Cheap"]},
{id:945,a:"mt-charleston",c:"Nature",t:"Wild Horse Spring",e:"\uD83D\uDCA7",d:"A seasonal spring on the back side of Mt Charleston accessible from a moderate trail. In spring, water flows and wildflowers bloom. Remote and beautiful.",g:"Wild Horse Spring Mt Charleston",tg:["Nature","Hidden","Free"]},
{id:946,a:"the-strip",c:"Experience",t:"Tournament of Kings Dinner Show",e:"\uD83C\uDFF0",d:"A medieval dinner show at Excalibur with jousting, sword fights, and you eat with your hands. Campy, loud, and unexpectedly fun. Great for families.",g:"Tournament of Kings Dinner Show Las Vegas",tg:["Family","Entertainment","Unique"]},
{id:947,a:"the-strip",c:"Food & Drink",t:"Heart Attack Grill",e:"\uD83C\uDF54",d:"A hospital-themed restaurant near Fremont where portions are intentionally absurd. Over 350 lbs eats free. Not for the health conscious but an unforgettable experience.",g:"Heart Attack Grill Las Vegas",tg:["Unique","Food"]},
{id:948,a:"downtown",c:"Culture",t:"Burlesque Hall of Fame Events",e:"\uD83C\uDFAD",d:"Beyond the museum, the Burlesque Hall hosts live shows, workshops, and the annual Miss Exotic World pageant. Check their calendar for upcoming performances.",g:"Burlesque Hall of Fame Events Las Vegas",tg:["Art","Unique","Entertainment"]},
{id:949,a:"henderson",c:"Food & Drink",t:"Echo & Rig at Tivoli",e:"\uD83E\uDD69",d:"A butcher shop and restaurant with a glass-walled meat aging room. Pick your cut, they cook it. The bone marrow and the dry-aged ribeye are exceptional.",g:"Echo & Rig at Tivoli Las Vegas",tg:["Dining","Local"]},
{id:950,a:"summerlin",c:"Outdoors",t:"Keystone Thrust Overlook",e:"\u26F0\uFE0F",d:"The upper section of the Keystone Thrust trail gives you a clear view of where two tectonic plates collided 65 million years ago. Geology made visible.",g:"Keystone Thrust Trail Red Rock Canyon",tg:["Hiking","Views","Nature","Free"]},
{id:951,a:"the-strip",c:"Food & Drink",t:"Herbs & Rye Happy Hour",e:"\uD83C\uDF78",d:"Half off all cocktails from 5-8pm at one of the best bars in Vegas. The bone marrow and the classic cocktails are world class. Just off the Strip on W Sahara.",g:"Herbs & Rye Happy Hour Las Vegas",tg:["Nightlife","Local","Cheap"]},
{id:952,a:"downtown",c:"Food & Drink",t:"Goodwich",e:"\uD83E\uDD6A",d:"A tiny sandwich shop in the Arts District that makes creative, elevated sandwiches. The fried chicken sandwich and the Italian are both excellent. Cash or card.",g:"Goodwich Las Vegas",tg:["Local","Cheap","Food"]},
{id:953,a:"the-strip",c:"Experience",t:"Wynn Golf Club",e:"\u26F3",d:"An 18-hole golf course on the Strip. One of the most exclusive courses in Vegas with perfect conditioning and views of the Wynn tower. Expensive but unforgettable.",g:"Wynn Golf Club Las Vegas",tg:["Sports","Unique"]},
{id:954,a:"north-lv",c:"Food & Drink",t:"Tacos El Compita NLV",e:"\uD83C\uDF2E",d:"A street taco stand in a NLV parking lot that makes some of the best birria tacos in the valley. The consomme for dipping is rich and perfect. Cash only.",g:"Tacos El Compita North Las Vegas",tg:["Local","Authentic","Cheap"]},
{id:955,a:"henderson",c:"Experience",t:"The District Shopping",e:"\uD83D\uDED2",d:"An outdoor shopping and dining district at Green Valley Ranch with local boutiques, restaurants, and a central fountain plaza. Free live music some evenings.",g:"The District Shopping Las Vegas",tg:["Shopping","Free","Local"]},
{id:956,a:"centennial",c:"Food & Drink",t:"Artisan Booze & Bites",e:"\uD83C\uDF78",d:"A craft cocktail bar in the Centennial area with rotating seasonal menus and creative small plates. The Old Fashioned flight lets you try three variations.",g:"Artisan Booze & Bites Las Vegas",tg:["Nightlife","Local"]},
{id:957,a:"enterprise",c:"Experience",t:"Ethel M Factory Tour",e:"\uD83C\uDF6B",d:"A free self-guided tour of the Ethel M Chocolate Factory followed by a free chocolate sample. Then walk the botanical cactus garden. All free.",g:"Ethel M Factory Tour Las Vegas",tg:["Free","Family","Unique"]},
{id:958,a:"mt-charleston",c:"Outdoors",t:"Harris Springs Trail",e:"\uD83C\uDF32",d:"A quiet trail on the west side of the mountain with aspen groves and meadow views. Less trafficked and full of wildflowers in late spring.",g:"Harris Springs Trail Mt Charleston",tg:["Hiking","Nature","Hidden","Free"]},
{id:959,a:"the-strip",c:"Food & Drink",t:"Oscar's Steakhouse",e:"\uD83E\uDD69",d:"A classic steakhouse at the top of the Plaza Hotel dome downtown with panoramic views of Fremont Street. Named after former mayor Oscar Goodman. Old Vegas elegance.",g:"Oscar's Steakhouse Las Vegas",tg:["Dining","Views","Iconic"]},
{id:960,a:"summerlin",c:"Experience",t:"Gilcrease Orchard Pumpkin Patch",e:"\uD83C\uDF83",d:"Every October, Gilcrease Orchard opens for pumpkin picking, a corn maze, and fall festivals. A beloved local tradition in the northwest valley.",g:"Gilcrease Orchard Pumpkin Patch Las Vegas",tg:["Family","Seasonal","Community"]},
{id:961,a:"the-strip",c:"Experience",t:"Criss Angel Mindfreak",e:"\uD83C\uDFA9",d:"The longest running magic show in Vegas history. Illusions, levitations, and audience participation. At Planet Hollywood nightly.",g:"Criss Angel Mindfreak Las Vegas",tg:["Entertainment","Shows"]},
{id:962,a:"the-strip",c:"Food & Drink",t:"Kung Fu Thai & Chinese",e:"\uD83C\uDF5C",d:"Open until 3am in Chinatown. The wonton soup, the garlic noodles, and the Thai iced tea are all perfect. Late night staple for locals coming off the Strip.",g:"Kung Fu Thai & Chinese Las Vegas",tg:["Local","Late Night","Authentic"]},
{id:963,a:"downtown",c:"Experience",t:"Fergusons Downtown",e:"\uD83C\uDFE1",d:"A former motel turned into a creative community space with shops, a bar, event space, and rotating pop-ups. The heart of the downtown creative scene.",g:"Fergusons Downtown Las Vegas",tg:["Local","Art","Unique","Free"]},
{id:964,a:"henderson",c:"Outdoors",t:"Sunset Viewing from Lake Mead Overlook",e:"\uD83C\uDF05",d:"Drive to the Lake Mead overlook on Lakeshore Road for one of the most dramatic sunsets in the valley. The water reflects the colors. Free and uncrowded.",g:"Lake Mead Overlook Lakeshore Road",tg:["Sunset","Views","Free"]},
{id:965,a:"summerlin",c:"Food & Drink",t:"Lazy Dog Restaurant",e:"\uD83C\uDF7D\uFE0F",d:"A comfortable neighborhood restaurant at Downtown Summerlin with a massive menu, a dog-friendly patio, and a weekend brunch that locals love.",g:"Lazy Dog Restaurant Las Vegas",tg:["Family","Local","Dining"]},
{id:966,a:"centennial",c:"Nature",t:"Painted Desert Trail",e:"\uD83C\uDFDC\uFE0F",d:"A short desert trail in the Centennial area with colored rock formations and views of the Spring Mountains. Easy walking and rarely crowded.",g:"Painted Desert Trail Las Vegas",tg:["Nature","Free","Hidden"]},
{id:967,a:"enterprise",c:"Food & Drink",t:"Shang Artisan Noodle",e:"\uD83C\uDF5C",d:"Hand-pulled noodles made in front of you at this Chinatown adjacent spot. The spicy beef noodle soup and the cold skin noodles are the orders. Fast, cheap, mesmerizing.",g:"Shang Artisan Noodle Las Vegas",tg:["Local","Authentic","Cheap"]},
{id:968,a:"north-lv",c:"Experience",t:"Fiesta Rancho Casino",e:"\uD83C\uDFB0",d:"A locals casino in NLV with ice skating, bowling, and cheap food. The ice rink is open year round. Budget entertainment hub.",g:"Fiesta Rancho Casino Las Vegas",tg:["Cheap","Family","Local"]},
{id:969,a:"mt-charleston",c:"Nature",t:"Mahogany Grove Picnic Area",e:"\uD83C\uDF32",d:"A shaded picnic area at 7,800 feet surrounded by mountain mahogany trees. Cooler temps, BBQ grills, and peace. First come, first served.",g:"Mahogany Grove Mt Charleston",tg:["Nature","Free","Relaxing"]},
{id:970,a:"the-strip",c:"Food & Drink",t:"Lavo Italian at Palazzo",e:"\uD83C\uDF5D",d:"Italian food at the Palazzo that transitions into a nightclub after 10pm. The meatball appetizer is massive and the pasta portions are generous.",g:"Lavo Italian at Palazzo Las Vegas",tg:["Dining","Nightlife"]},
{id:971,a:"henderson",c:"Experience",t:"Henderson Bird Preserve Sunrise Walk",e:"\uD83E\uDDA2",d:"Visit the bird preserve at sunrise when the birds are most active. Bring binoculars. Over 200 species have been documented here. Free and open dawn to dusk.",g:"Henderson Bird Preserve Sunrise Walk Las Vegas",tg:["Nature","Sunrise","Free"]},
{id:972,a:"summerlin",c:"Experience",t:"Boca Park Shopping",e:"\uD83D\uDED2",d:"A popular shopping center in Summerlin with a mix of local and national stores, restaurants, and a movie theater. Less hectic than Downtown Summerlin.",g:"Boca Park Shopping Las Vegas",tg:["Shopping","Local"]},
];

  trig.addEventListener("click",()=>{
    if(openDrop===dropId){closeAllDrops();return;}
    closeAllDrops();
    // Position dropdown below the filter bar
    const bar=$("filterBar");
    const rect=bar.getBoundingClientRect();
    drop.style.top=(rect.bottom+6)+"px";
    drop.classList.add("open");
    filterBack.classList.add("open");
    openDrop=dropId;
  });

  updateTrig(trigId,label,selSet);
}

function updateTrig(trigId,label,selSet){
  const trig=$(trigId);
  const hasSel=selSet.size>0;
  trig.classList.toggle("has-sel",hasSel);
  const svg='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>';
  if(hasSel){
    trig.innerHTML=label+' <span class="filter-cnt">'+selSet.size+'</span> '+svg;
  } else {
    trig.innerHTML=label+' '+svg;
  }
}

function updateClear(){
  const total=selAreas.size+selCats.size+selTags.size;
  $("clearAll").classList.toggle("show",total>0);
}

$("clearAll").addEventListener("click",()=>{
  selAreas.clear();selCats.clear();selTags.clear();
  document.querySelectorAll(".fdrop-opt").forEach(o=>o.classList.remove("sel"));
  updateTrig("areaTrig","Area",selAreas);
  updateTrig("catTrig","Type",selCats);
  updateTrig("tagTrig","Vibe",selTags);
  updateClear();
  render();
});

// ═══════════════════════════════════════════════════
// FILTER + RENDER
// ═══════════════════════════════════════════════════
function getFiltered(){
  return D.filter(act=>{
    if(selAreas.size>0&&!selAreas.has(act.a))return false;
    if(selCats.size>0&&!selCats.has(act.c))return false;
    if(selTags.size>0){
      if(!act.tg||!act.tg.some(t=>selTags.has(t)))return false;
    }
    return true;
  });
}

function render(){
  const results=getFiltered();
  lastResults=results;
  const grid=$("resultsGrid");
  const empty=$("emptyState");
  const count=$("resultCount");

  count.textContent=results.length+" result"+(results.length!==1?"s":"");

  if(results.length===0){
    grid.innerHTML="";
    empty.style.display="flex";
    return;
  }
  empty.style.display="none";
  grid.innerHTML="";

  results.forEach(act=>{
    const card=document.createElement("div");
    card.className="gcard";
    const isSaved=favs.some(f=>f.id===act.id);
    card.innerHTML=`
      <div class="gc-emoji" data-c="${act.c}">${act.e}</div>
      <div class="gc-info">
        <div class="gc-cat">${act.c}</div>
        <div class="gc-title">${act.t}</div>
        <div class="gc-area">${AN[act.a]||""}</div>
      </div>
      <button class="gc-heart ${isSaved?'saved':''}" data-id="${act.id}">
        <svg viewBox="0 0 24 24" ${isSaved?'fill="currentColor"':'fill="none"'} stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      </button>`;
    card.addEventListener("click",e=>{
      if(e.target.closest(".gc-heart"))return;
      openDetail(act);
    });
    card.querySelector(".gc-heart").addEventListener("click",e=>{
      e.stopPropagation();
      toggleFav(act);
      render();
    });
    grid.appendChild(card);
  });
  // Update map if visible
  if(currentView==="map"){if(mapReady)updateMapPins(results);renderMapCards(results);}
}

// ═══════════════════════════════════════════════════
// FAVORITES
// ═══════════════════════════════════════════════════
function toggleFav(act){
  const idx=favs.findIndex(f=>f.id===act.id);
  if(idx>-1)favs.splice(idx,1);else favs.push(act);
  try{localStorage.setItem("sevn_f",JSON.stringify(favs));}catch(e){}
}

// ═══════════════════════════════════════════════════
// DETAIL MODAL
// ═══════════════════════════════════════════════════
let detailAct=null;
function openDetail(act){
  detailAct=act;
  $("dEmoji").textContent=act.e;
  $("dCat").textContent=act.c;
  $("dTitle").textContent=act.t;
  $("dDesc").textContent=act.d;
  const tip=TIPS[act.id];
  if(tip){$("dTip").innerHTML='<strong>Local Tip</strong>'+linkify(tip);$("dTip").style.display="block";}
  else{$("dTip").style.display="none";}
  if(act.s){$("dSeason").innerHTML='\u{1F5D3}\uFE0F '+act.s;$("dSeason").style.display="inline-flex";}
  else{$("dSeason").style.display="none";}
  // Tags
  const tags=$("dTags");
  if(act.tg&&act.tg.length){
    tags.innerHTML=act.tg.map(t=>'<span class="dtag">'+t+'</span>').join("");
    tags.style.display="flex";
  } else {tags.style.display="none";}
  const isSaved=favs.some(f=>f.id===act.id);
  $("dSaveBtn").textContent=isSaved?"\u2713 Saved":"Save";
  $("dSaveBtn").classList.toggle("saved",isSaved);
  // Affiliate link
  const bookBtn=$("dBookBtn");
  // Directions
  const dirBtn=$("dDirBtn");
  if(act.g){dirBtn.href="https://www.google.com/maps/search/?api=1&query="+encodeURIComponent(act.g);dirBtn.classList.add("show");}else{dirBtn.classList.remove("show");}
  if(LINKS[act.id]){bookBtn.href=LINKS[act.id];bookBtn.classList.add("show");}
  else{bookBtn.classList.remove("show");}
  $("dMod").classList.add("open");
}
function closeDetail(){$("dMod").classList.remove("open");}
$("dX").addEventListener("click",closeDetail);
$("dBg").addEventListener("click",closeDetail);
$("dSaveBtn").addEventListener("click",()=>{
  if(!detailAct)return;
  toggleFav(detailAct);
  const isSaved=favs.some(f=>f.id===detailAct.id);
  $("dSaveBtn").textContent=isSaved?"\u2713 Saved":"Save";
  $("dSaveBtn").classList.toggle("saved",isSaved);
  render();
});
document.addEventListener("keydown",e=>{if(e.key==="Escape")closeDetail();});

// ═══════════════════════════════════════════════════
// CHECK URL PARAMS (deep link from main page)
// ═══════════════════════════════════════════════════
const params=new URLSearchParams(window.location.search);
if(params.get("area")){
  const a=params.get("area");
  if(AN[a])selAreas.add(a);
}
if(params.get("cat")){selCats.add(params.get("cat"));}
if(params.get("tag")){selTags.add(params.get("tag"));}

// ═══════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════
buildChips();
updateClear();
render();


// ═══════════════════════════════════════════════════
// MAP VIEW
// ═══════════════════════════════════════════════════

function loadLeaflet(cb){
  if(window.L){cb();return;}
  var link=document.createElement("link");
  link.rel="stylesheet";link.href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css";
  document.head.appendChild(link);
  var s=document.createElement("script");
  s.src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js";
  s.onload=cb;
  s.onerror=function(){$("mapCards").innerHTML='<div class="mc-loc-banner">Map could not load. Check your connection.</div>';};
  document.head.appendChild(s);
}

function initMap(){
  if(mapReady)return;
  if(!window.L){loadLeaflet(initMap);return;}
  map=L.map("mapEl",{zoomControl:true,attributionControl:true}).setView([36.115,-115.17],11);
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{
    attribution:'&copy; OpenStreetMap',maxZoom:18
  }).addTo(map);
  mapReady=true;
  // Now that map is ready, load pins
  if(lastResults.length)updateMapPins(lastResults);
  requestLocation();
  renderMapCards(lastResults);
}

function updateMapPins(results){
  if(!mapReady)return;
  markers.forEach(m=>map.removeLayer(m));
  markers=[];
  const bounds=[];
  results.forEach(act=>{
    if(!GEO[act.id])return;
    const ll=GEO[act.id];
    const m=L.marker([ll[0],ll[1]],{icon:L.divIcon({className:'map-pin',html:'<div class="mp-dot"><span>'+act.e+'</span></div>',iconSize:[32,32],iconAnchor:[16,32],popupAnchor:[0,-28]})}).addTo(map);
    m.bindPopup(
      '<div class="map-popup-emoji">'+act.e+'</div>'+
      '<div class="map-popup-title">'+act.t+'</div>'+
      '<div class="map-popup-cat">'+act.c+' &middot; '+(AREA_NAMES[act.a]||act.a)+'</div>'+
      '<div class="map-popup-loc">'+(act.g||'')+'</div>'+
      '<div class="map-popup-desc">'+act.d+'</div>'+
      '<a class="map-popup-btn" onclick="closeMapPopup();openDetail(D.find(x=>x.id==='+act.id+'))">View Details</a>',
      {maxWidth:260}
    );
    markers.push(m);
    bounds.push([ll[0],ll[1]]);
  });
  if(bounds.length>0){
    if(bounds.length===1)map.setView(bounds[0],14);
    else map.fitBounds(bounds,{padding:[30,30],maxZoom:15});
  }
}
function closeMapPopup(){map.closePopup();}

const AREA_NAMES={"the-strip":"The Strip","downtown":"Downtown","summerlin":"Summerlin","henderson":"Henderson","north-lv":"N. Las Vegas","centennial":"Centennial","enterprise":"Enterprise","mt-charleston":"Mt. Charleston"};

$("listBtn").addEventListener("click",function(){
  if(currentView==="list")return;
  currentView="list";
  this.classList.add("active");$("mapBtn").classList.remove("active");
  $("resultsGrid").style.display="";$("mapWrap").style.display="none";
});
$("mapBtn").addEventListener("click",function(){
  if(currentView==="map")return;
  currentView="map";
  this.classList.add("active");$("listBtn").classList.remove("active");
  $("resultsGrid").style.display="none";$("mapWrap").style.display="block";
  if(!mapReady)initMap();
  if(!lastResults.length)lastResults=getFiltered();
  if(!mapReady){
    // initMap will handle everything once Leaflet loads
    renderMapCards(lastResults);
    return;
  }
  setTimeout(()=>{
    map.invalidateSize();
    updateMapPins(lastResults);
    requestLocation();
    renderMapCards(lastResults);
  },150);
});



// ═══ LOCATION & DISTANCE ═══

function requestLocation(){
  if(userLat&&userLng){renderMapCards(lastResults);return;}
  if(!navigator.geolocation){renderMapCards(lastResults);return;}
  navigator.geolocation.getCurrentPosition(
    pos=>{
      userLat=pos.coords.latitude;userLng=pos.coords.longitude;
      if(mapReady){
        if(userMarker)map.removeLayer(userMarker);
        const icon=L.divIcon({className:'',html:'<div style="width:14px;height:14px;background:#4285f4;border:3px solid #fff;border-radius:50%;box-shadow:0 1px 4px rgba(0,0,0,.3)"></div>',iconSize:[20,20],iconAnchor:[10,10]});
        userMarker=L.marker([userLat,userLng],{icon:icon,zIndex:1000}).addTo(map);
        userMarker.bindPopup("You are here");
      }
      renderMapCards(lastResults);
      // Re-fit map to include user location
      if(mapReady&&map&&markers.length>0){
        const allPts=markers.map(m=>[m.getLatLng().lat,m.getLatLng().lng]);
        allPts.push([userLat,userLng]);
        map.fitBounds(allPts,{padding:[40,40],maxZoom:14});
      }
    },
    ()=>{renderMapCards(lastResults);},
    {enableHighAccuracy:false,timeout:8000}
  );
}

function haversine(lat1,lng1,lat2,lng2){
  const R=3958.8;
  const dLat=(lat2-lat1)*Math.PI/180;
  const dLng=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dLat/2)*Math.sin(dLat/2)+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)*Math.sin(dLng/2);
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function renderMapCards(results){
  const wrap=$("mapCards");
  const header=$("mapCardsHeader");
  const title=$("mapCardsTitle");
  const count=$("mapCardsCount");
  wrap.innerHTML="";

  if(!userLat||!userLng){
    // Show enable location prompt
    header.style.display="none";
    const banner=document.createElement("div");
    banner.className="mc-loc-banner";
    banner.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 2v4m0 12v4M2 12h4m12 0h4"/></svg> Enable location to see what is closest to you';
    banner.addEventListener("click",()=>{locRequested=false;requestLocation();});
    wrap.appendChild(banner);
    return;
  }

  // Calculate distances and sort
  const withDist=results.filter(a=>GEO[a.id]).map(a=>{
    const ll=GEO[a.id];
    const dist=haversine(userLat,userLng,ll[0],ll[1]);
    return {act:a,dist:dist};
  }).sort((a,b)=>a.dist-b.dist);

  header.style.display="flex";
  title.textContent="Closest to you";
  count.textContent=withDist.length+" spots";

  withDist.forEach(({act,dist})=>{
    const card=document.createElement("div");
    card.className="mc";
    const distStr=dist<0.1?(Math.round(dist*5280)+" ft"):(dist<10?dist.toFixed(1):Math.round(dist));
    const unitStr=dist<0.1?"away":(dist<10?"mi":"mi");
    card.innerHTML='<div class="mc-emoji">'+act.e+'</div>'
      +'<div class="mc-info"><div class="mc-title">'+act.t+'</div><div class="mc-sub">'+act.c+' &middot; '+(AREA_NAMES[act.a]||act.a)+'</div></div>'
      +'<div class="mc-dist"><div class="mc-mi">'+distStr+'</div><div class="mc-unit">'+unitStr+'</div></div>';
    card.addEventListener("click",()=>openDetail(act));
    wrap.appendChild(card);
  });
}


// ═══ MAP EXPAND / DISMISS ═══
$("mapExpand").addEventListener("click",function(e){
  e.stopPropagation();
  const c=$("mapContainer");
  c.classList.add("expanded");
  document.body.style.overflow="hidden";
  if(map)setTimeout(()=>{map.invalidateSize();},200);
});
$("mapDismiss").addEventListener("click",function(e){
  e.stopPropagation();
  const c=$("mapContainer");
  c.classList.remove("expanded");
  document.body.style.overflow="";
  if(map)setTimeout(()=>{map.invalidateSize();},200);
});

</script>
