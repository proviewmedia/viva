{id:417,a:"north-lv",c:"Experience",t:"Dig This! Heavy Equipment",e:"\uD83D\uDE9C",d:"Operate bulldozers and excavators in a giant sandbox. Stack tires, dig trenches, and build mounds. A uniquely Vegas experience for adults.",g:"Dig This Las Vegas",tg:["Unique","Fun"],p:"$$$"},
{id:418,a:"north-lv",c:"Food & Drink",t:"Aliante Casino Dining",e:"\uD83C\uDF74",d:"MRKT Sea & Land offers upscale dining with a seafood focus. The resort also has Farm 24/7 for casual eats and a solid sports bar.",g:"Aliante Casino Hotel N. Las Vegas dining",tg:["Dining","Casino"],p:"$$"},
{id:419,a:"north-lv",c:"Experience",t:"Nellis AFB Air Show",e:"\u2708\uFE0F",d:"The annual Aviation Nation air show at Nellis Air Force Base features the Thunderbirds, military displays, and incredible aerial performances. Free admission.",g:"Nellis Air Force Base air show Las Vegas",tg:["Aviation","Free"],p:"Free"},
{id:420,a:"north-lv",c:"Experience",t:"Craig Ranch Skate Park",e:"\uD83D\uDEF9",d:"One of the largest free public skate parks in the valley. Well-maintained bowls, rails, and street features. Helmets required for minors.",g:"Craig Ranch Regional Park skate park",tg:["Skating","Free"],p:"Free"},
{id:421,a:"north-lv",c:"Food & Drink",t:"Mabel's BBQ",e:"\uD83C\uDF56",d:"Celebrity chef Michael Symon's BBQ joint at the Palms. Cleveland-style BBQ with Eastern European spice influences. The brisket is phenomenal.",g:"Mabels BBQ Las Vegas",tg:["BBQ","Celebrity Chef"],p:"$$"},
{id:422,a:"north-lv",c:"Outdoors",t:"Desert National Wildlife Refuge",e:"\uD83E\uDD85",d:"The largest wildlife refuge in the lower 48 states. Bighorn sheep habitat, desert hiking, and vast solitude. Free to enter. Bring lots of water.",g:"Desert National Wildlife Refuge Las Vegas",tg:["Wildlife","Solitude"],p:"Free"},
{id:423,a:"north-lv",c:"Experience",t:"Cannery Casino Entertainment",e:"\uD83C\uDFB5",d:"A locals casino with surprisingly good live entertainment, a movie theater, and affordable dining. The Star of the Desert Arena hosts concerts and events.",g:"Cannery Casino N. Las Vegas",tg:["Entertainment","Budget"],p:"$"},
{id:424,a:"north-lv",c:"Food & Drink",t:"Hainan Chicken at Mama's",e:"\uD83C\uDF57",d:"Mama's Kitchen in N. Las Vegas serves some of the best Chinese comfort food in the valley. Known for generous portions and authentic flavors.",g:"Mamas Kitchen North Las Vegas",tg:["Chinese","Local"],p:"$"},
{id:425,a:"north-lv",c:"Experience",t:"Vegas Indoor Skydiving",e:"\uD83E\uDE82",d:"Experience freefall in a vertical wind tunnel without jumping from a plane. Professional instructors guide you through the flight. All skill levels.",g:"Vegas Indoor Skydiving",tg:["Thrill","Indoor"],p:"$$"},
{id:426,a:"mt-charleston",c:"Outdoors",t:"Mt Charleston Day Trip",e:"\uD83C\uDFD4\uFE0F",d:"Drive 45 minutes to drop 30 degrees in temperature. Pine forests, hiking trails, and even skiing in winter. A complete escape from the desert.",g:"Mount Charleston Las Vegas",tg:["Mountains","Escape"],p:"Free"},
{id:427,a:"north-lv",c:"Experience",t:"N. Las Vegas Airport Scenic Flight",e:"\u2708\uFE0F",d:"Small plane scenic flights depart from North LV Airport over Red Rock Canyon and the Strip. More affordable than Strip helicopter tours.",g:"North Las Vegas Airport scenic flights",tg:["Scenic","Views"],p:"$$"},
{id:428,a:"north-lv",c:"Food & Drink",t:"Roberto's Taco Shop",e:"\uD83C\uDF2F",d:"A Vegas institution with multiple locations. The carne asada burritos and green sauce are legendary. Open late, always packed, always worth it.",g:"Robertos Taco Shop Las Vegas",tg:["Mexican","Late Night"],p:"$"},
{id:429,a:"north-lv",c:"Experience",t:"Speedvegas Exotic Driving",e:"\uD83C\uDFCE\uFE0F",d:"Drive Ferraris, Lamborghinis, and Porsches on a 1.5-mile racetrack. Multiple packages from ride-alongs to full driving experiences.",g:"Speedvegas Las Vegas",tg:["Cars","Thrill"],p:"$$$"},
{id:430,a:"north-lv",c:"Experience",t:"Escape Room Challenge",e:"\uD83D\uDD10",d:"Several escape room venues in North LV offer themed puzzle experiences. Great for groups who want something different beyond the casino floor.",g:"escape rooms N. Las Vegas",tg:["Puzzles","Group"],p:"$$"},

// CENTENNIAL PAID (15 more = 30 total)
{id:516,a:"centennial",c:"Food & Drink",t:"DW Bistro",e:"\uD83C\uDF74",d:"A beloved local restaurant blending New Mexican and Jamaican flavors. Green chile cheeseburgers, jerk chicken, and a fantastic patio vibe.",g:"DW Bistro Las Vegas",tg:["Fusion","Local Fave"],p:"$$"},
{id:517,a:"centennial",c:"Experience",t:"Tivoli Village Dining & Wine",e:"\uD83C\uDF77",d:"Mediterranean-themed outdoor village with upscale restaurants, wine bars, and boutique shopping. A European-style evening out on the west side.",g:"Tivoli Village Las Vegas",tg:["Dining","Shopping"],p:"$$"},
{id:518,a:"centennial",c:"Food & Drink",t:"Lindo Michoacan",e:"\uD83C\uDF2E",d:"Authentic regional Mexican cuisine with a massive menu and vibrant atmosphere. Known for the mole and the lively weekend scene. A local institution.",g:"Lindo Michoacan Las Vegas",tg:["Mexican","Authentic"],p:"$"},
{id:519,a:"centennial",c:"Experience",t:"Skye Canyon Community Events",e:"\uD83C\uDF89",d:"The newest master-planned community hosts free events like outdoor movies, food truck festivals, and holiday celebrations at Skye Canyon Park.",g:"Skye Canyon events Las Vegas",tg:["Community","Free"],p:"Free"},
{id:521,a:"centennial",c:"Food & Drink",t:"Pizza Rock",e:"\uD83C\uDF55",d:"Award-winning pizza from a World Pizza Champion. Multiple styles from Neapolitan to New York. Creative pies and a great beer selection.",g:"Pizza Rock Las Vegas",tg:["Pizza","Award-Winning"],p:"$"},
{id:522,a:"centennial",c:"Experience",t:"Suncoast Casino Movies & Bowling",e:"\uD83C\uDFAC",d:"A locals casino with a 16-screen movie theater, 64-lane bowling center, bingo, and affordable dining. Solid entertainment for the whole family.",g:"Suncoast Hotel Casino Las Vegas",tg:["Movies","Bowling"],p:"$"},
{id:524,a:"centennial",c:"Food & Drink",t:"Avery's Coffee",e:"\u2615",d:"A local coffee roaster with a cozy shop perfect for morning work sessions. Single-origin pour-overs and pastries in a welcoming space.",g:"Averys Coffee Las Vegas",tg:["Coffee","Local"],p:"$"},
{id:525,a:"centennial",c:"Experience",t:"Santa Fe Station Bowling",e:"\uD83C\uDFB3",d:"A locals casino with a well-maintained bowling center, movie theater, and surprisingly good sushi restaurant. Great value entertainment.",g:"Santa Fe Station Las Vegas",tg:["Bowling","Casino"],p:"$"},
{id:526,a:"mt-charleston",c:"Outdoors",t:"Bristlecone Loop Trail",e:"\uD83C\uDF32",d:"A moderate 6-mile loop through ancient bristlecone pines on Mt Charleston. Some of the oldest living trees on Earth in a stunning alpine setting.",g:"Bristlecone Loop Trail Mount Charleston",tg:["Hiking","Ancient"],p:"Free"},
{id:527,a:"centennial",c:"Food & Drink",t:"Hash House A Go Go",e:"\uD83E\uDD5E",d:"Twisted Farm Food with massive portions. The Sage Fried Chicken Benedict and Chicken & Waffles are legendary. Come very hungry.",g:"Hash House A Go Go Las Vegas",tg:["Breakfast","Huge Portions"],p:"$$"},
{id:529,a:"centennial",c:"Food & Drink",t:"Freed's Bakery",e:"\uD83C\uDF82",d:"A Las Vegas institution since 1959 making cakes, pastries, and cupcakes. Featured on TV multiple times. The cupcakes alone are worth the trip.",g:"Freeds Bakery Las Vegas",tg:["Bakery","Institution"],p:"$"},
{id:530,a:"centennial",c:"Experience",t:"Gilcrease Orchard U-Pick",e:"\uD83C\uDF4E",d:"A working farm in the northwest valley offering seasonal u-pick produce. Peaches in summer, pumpkins in fall. A slice of rural life in the city.",g:"Gilcrease Orchard Las Vegas",tg:["Farm","Seasonal"],p:"$"},

// ENTERPRISE PAID (15 more = 30 total)
{id:616,a:"enterprise",c:"Experience",t:"Town Square Events & Dining",e:"\uD83C\uDF33",d:"Outdoor shopping center with a central park, splash pad, free live events, and great restaurants like Yard House and Tommy Bahama.",g:"Town Square Las Vegas",tg:["Shopping","Family"],p:"Free Entry"},
{id:617,a:"enterprise",c:"Food & Drink",t:"Grape Street Wine Bar",e:"\uD83C\uDF77",d:"A casual wine bar and bistro at Town Square with an extensive by-the-glass list, flatbreads, and a gorgeous patio. Date night favorite.",g:"Grape Street Wine Bar Las Vegas",tg:["Wine","Patio"],p:"$$"},
{id:618,a:"enterprise",c:"Experience",t:"Allegiant Stadium Event",e:"\uD83C\uDFC8",d:"Home of the Raiders and host to massive concerts, soccer matches, and special events. The $1.9 billion stadium is an architectural marvel.",g:"Allegiant Stadium Las Vegas",tg:["Sports","Concerts"],p:"$$"},
{id:619,a:"enterprise",c:"Food & Drink",t:"Tacotarian",e:"\uD83C\uDF2E",d:"Award-winning plant-based Mexican food that even meat lovers rave about. Creative vegan tacos, burritos, and nachos. Nationally recognized.",g:"Tacotarian Las Vegas",tg:["Vegan","Mexican"],p:"$"},
{id:620,a:"enterprise",c:"Experience",t:"Topgolf Las Vegas",e:"\u26F3",d:"Multi-level driving range with Strip views, a rooftop terrace, full bar, and great food. Climate-controlled bays and live music.",g:"Topgolf Las Vegas",tg:["Sports","Social"],p:"$$"},
{id:621,a:"enterprise",c:"Outdoors",t:"Sloan Canyon Conservation Hike",e:"\uD83E\uDDED",d:"Southern approach to Sloan Canyon for fewer crowds and raw desert hiking. Ancient petroglyphs and desert tortoise habitat.",g:"Sloan Canyon National Conservation Area",tg:["Hiking","Desert"],p:"Free"},
{id:622,a:"enterprise",c:"Food & Drink",t:"The Stove",e:"\uD83C\uDF73",d:"All-day brunch spot with creative dishes and a warm atmosphere. The cinnamon roll pancakes and lobster mac are fan favorites.",g:"The Stove Las Vegas",tg:["Brunch","Creative"],p:"$$"},
{id:623,a:"enterprise",c:"Experience",t:"South Point Arena & Events",e:"\uD83C\uDFAA",d:"An equestrian arena and events center hosting rodeos, horse shows, concerts, and community events. Check the calendar for free events.",g:"South Point Arena Las Vegas",tg:["Events","Entertainment"],p:"$"},
{id:624,a:"the-strip",c:"Food & Drink",t:"Pin-Up Pizza at Planet Hollywood",e:"\uD83C\uDF55",d:"Massive 24-inch slices at Planet Hollywood. Consistently voted among the best pizza on the Strip. A great late-night option.",g:"Pin-Up Pizza Las Vegas",tg:["Pizza","Late Night"],p:"$"},
{id:625,a:"enterprise",c:"Experience",t:"Silverton Aquarium",e:"\uD83D\uDC20",d:"A 117,000-gallon saltwater aquarium inside Silverton Casino with stingrays, sharks, and free mermaid shows. Completely free to watch.",g:"Silverton Casino Aquarium Las Vegas",tg:["Family","Free"],p:"Free"},
{id:626,a:"enterprise",c:"Food & Drink",t:"Yard House at Town Square",e:"\uD83C\uDF7A",d:"Over 100 beers on tap, a massive menu, and a great patio at Town Square. The gardein orange chicken is shockingly good.",g:"Yard House Town Square Las Vegas",tg:["Beer","Casual"],p:"$$"},
{id:627,a:"enterprise",c:"Outdoors",t:"Blue Diamond Trail System",e:"\uD83D\uDEB4",d:"Mountain bike and hiking trails southwest of Enterprise near the village of Blue Diamond. Rocky desert terrain with Red Rock views.",g:"Blue Diamond trails Las Vegas",tg:["Biking","Desert"],p:"Free"},
{id:628,a:"the-strip",c:"Food & Drink",t:"Other Mama Sushi & Izakaya",e:"\uD83C\uDF63",d:"A trendy neighborhood sushi and izakaya spot with creative rolls, sake, and a late-night menu. A local favorite on Spring Mountain.",g:"Other Mama Las Vegas",tg:["Sushi","Late Night"],p:"$$"},
{id:629,a:"enterprise",c:"Experience",t:"Pioneer Saloon Goodsprings",e:"\uD83E\uDD20",d:"A genuine 1913 saloon in the ghost town of Goodsprings, 35 min south. Bullet holes in the walls, cold beer, and real Nevada history.",g:"Pioneer Saloon Goodsprings Nevada",tg:["History","Saloon"],p:"$"},
{id:630,a:"enterprise",c:"Experience",t:"Las Vegas South Premium Outlets",e:"\uD83D\uDECD\uFE0F",d:"Over 140 designer outlet stores in an open-air setting south of the Strip. Nike, Coach, Kate Spade, and more at discount prices.",g:"Las Vegas South Premium Outlets",tg:["Shopping","Deals"],p:"Free Entry"},
{id:701,a:"mt-charleston",c:"Outdoors",t:"Mary Jane Falls Trail",e:"\uD83D\uDCA7",d:"One of the most popular hikes on the mountain. A 3-mile round trip with 1,000 feet of elevation gain through pine forest to a stunning waterfall fed by snowmelt. Moderately challenging.",g:"Mary Jane Falls Trail Mt Charleston",tg:["Hiking","Waterfall"],p:"Free"},
{id:702,a:"mt-charleston",c:"Outdoors",t:"Cathedral Rock Trail",e:"\u26F0\uFE0F",d:"A 2.8-mile round trip to a dramatic rock formation with panoramic views. The fall colors along this trail are the best on the mountain. Popular with families and photographers.",g:"Cathedral Rock Trail Mt Charleston",tg:["Hiking","Views"],p:"Free"},
{id:703,a:"mt-charleston",c:"Experience",t:"Lee Canyon Ski Resort",e:"\u26F7\uFE0F",d:"Las Vegas's only ski resort at 8,500 feet. Skiing, snowboarding, and tubing in winter. Summer operations include scenic chair rides, mountain biking, disc golf, and axe throwing.",g:"Lee Canyon Las Vegas",tg:["Skiing","Adventure"],p:"$$"},
{id:704,a:"mt-charleston",c:"Outdoors",t:"Charleston Peak Summit",e:"\uD83C\uDFD4\uFE0F",d:"The highest point in Southern Nevada at 11,916 feet. A grueling 17-mile round trip via South Loop or North Loop trails. One of the most rewarding summit hikes in the state.",g:"Charleston Peak summit trail",tg:["Summit","Advanced"],p:"Free"},
{id:705,a:"mt-charleston",c:"Outdoors",t:"Fletcher Canyon Trail",e:"\uD83C\uDF32",d:"A peaceful 3.6-mile round trip through a shaded canyon. No waterfall at the end, just solitude and natural beauty. One of the quieter trails on the mountain. Easy to moderate.",g:"Fletcher Canyon Trail Mt Charleston",tg:["Hiking","Peaceful"],p:"Free"},
{id:706,a:"mt-charleston",c:"Food & Drink",t:"Canyon Restaurant at The Retreat",e:"\uD83C\uDF7D\uFE0F",d:"Gourmet American comfort food at 6,700 feet elevation in Kyle Canyon. Open to the public with mountain views, a cozy fireplace, and fresh baked goods from the 24-hour cafe.",g:"Canyon Restaurant Retreat on Charleston Peak",tg:["Dining","Mountain"],p:"$$"},
{id:707,a:"mt-charleston",c:"Experience",t:"Mt. Charleston Lodge Cabins",e:"\uD83C\uDFE0",d:"23 rustic log cabins at 7,717 feet. The historic lodge is being rebuilt after fire but the cabins remain open. Fireplaces, forest views, and total seclusion from city life.",g:"Mt Charleston Lodge cabins",tg:["Lodging","Rustic"],p:"$$$"},
{id:708,a:"mt-charleston",c:"Outdoors",t:"Bristlecone Trail",e:"\uD83C\uDF3F",d:"A 6-mile loop through groves of ancient bristlecone pines, some of the oldest living organisms on Earth. The twisted, weathered trunks are endlessly photogenic. Moderate difficulty.",g:"Bristlecone Trail Mt Charleston",tg:["Hiking","Ancient Trees"],p:"Free"},
{id:709,a:"mt-charleston",c:"Experience",t:"Kyle Canyon Scenic Byway",e:"\uD83D\uDE97",d:"The drive up Kyle Canyon Road (SR-157) is a dramatic journey from desert floor to alpine forest. Temperature drops 20-30 degrees. Multiple pullouts for photos. One of the best drives near Vegas.",g:"Kyle Canyon Road scenic drive",tg:["Scenic Drive","Photography"],p:"Free"},
{id:710,a:"mt-charleston",c:"Outdoors",t:"Big Falls / Waterfall Hike",e:"\uD83C\uDFDE\uFE0F",d:"Beyond Mary Jane Falls, Big Falls rewards the extra effort with a larger cascade fed entirely by snowmelt. Best flow in spring after heavy winter snow. The trail is steep and rocky.",g:"Big Falls Mt Charleston",tg:["Waterfall","Advanced"],p:"Free"},
{id:711,a:"mt-charleston",c:"Nature",t:"Spring Mountains Wildlife",e:"\uD83E\uDD8C",d:"The Spring Mountains host mule deer, wild horses, Palmer chipmunks (found nowhere else on Earth), and a rich variety of bird species. Seven distinct climate zones in one mountain range.",g:"Spring Mountains National Recreation Area wildlife",tg:["Wildlife","Nature"],p:"Free"},
{id:712,a:"mt-charleston",c:"Experience",t:"Retreat on Charleston Peak Hotel",e:"\uD83C\uDFE8",d:"A rustic, pet-friendly hotel in mid-Kyle Canyon at 6,700 feet. Rooms, a lounge, restaurant, and banquet facilities. A genuine mountain retreat 45 minutes from the Strip.",g:"Retreat on Charleston Peak hotel",tg:["Lodging","Resort"],p:"$$"},
{id:713,a:"mt-charleston",c:"Outdoors",t:"Lee Meadows Picnic Area",e:"\uD83E\uDDFA",d:"A wide open mountain meadow perfect for picnics, reading, or just breathing cool pine-scented air. No reservation needed for groups under 20. Open dawn to dusk. Free.",g:"Lee Meadows Mt Charleston",tg:["Picnic","Family","Free"],p:"Free"},
{id:714,a:"mt-charleston",c:"Outdoors",t:"Sawmill Trailhead Loop",e:"\uD83D\uDC0E",d:"Access to over 35 miles of trails for hikers, equestrians, and mountain bikers. Views of Mummy Mountain. The multi-use trail system is the most extensive on the mountain.",g:"Sawmill Trailhead Mt Charleston",tg:["Multi-Use","Equestrian"],p:"Free"},
{id:715,a:"mt-charleston",c:"Experience",t:"Lee Canyon Summer Activities",e:"\uD83C\uDFAF",d:"When the snow melts, Lee Canyon transforms into a summer adventure park. Scenic chair rides, mountain biking, disc golf, axe throwing, and archery. Open daily May through September.",g:"Lee Canyon summer activities",tg:["Adventure","Summer"],p:"$$"},
{id:716,a:"mt-charleston",c:"Culture",t:"Cold War Memorial",e:"\uD83C\uDFDB\uFE0F",d:"The nation's first memorial dedicated to Cold War veterans. Located within the Spring Mountains National Recreation Area. A solemn and meaningful stop on the mountain.",g:"Cold War Memorial Mt Charleston",tg:["Memorial","History"],p:"Free"},
{id:717,a:"mt-charleston",c:"Outdoors",t:"Fletcher View Campground",e:"\u26FA",d:"One of the most popular campgrounds on the mountain at 7,000 feet. Pine-shaded sites with tables, fire rings, and vault toilets. First come, first served. Open May through September.",g:"Fletcher View Campground Mt Charleston",tg:["Camping","Forest"],p:"$"},
{id:725,a:"mt-charleston",c:"Food & Drink",t:"Bighorn Grill at Lee Canyon",e:"\uD83C\uDF54",d:"Casual mountain dining at the ski resort base. Burgers, sandwiches, and comfort food after a day on the slopes or trails. The Brewin Burro coffee shop is open for morning hikers.",g:"Bighorn Grill Lee Canyon",tg:["Casual","Mountain"],p:"$"},
{id:726,a:"mt-charleston",c:"Outdoors",t:"McWilliams Campground",e:"\uD83C\uDFD5\uFE0F",d:"A quieter alternative to Fletcher View at 8,400 feet elevation. 40 sites surrounded by dense pine forest. Tables, fire rings, vault toilets. Reservation or first come first served.",g:"McWilliams Campground Mt Charleston",tg:["Camping","Quiet"],p:"$"},
{id:727,a:"mt-charleston",c:"Nature",t:"Fall Colors on the Mountain",e:"\uD83C\uDF42",d:"September through October, the aspens and oaks on Mt. Charleston turn brilliant gold, orange, and crimson. Cathedral Rock Trail and Kyle Canyon Road offer the best displays. Peak color varies yearly.",g:"Mt Charleston fall colors",tg:["Seasonal","Photography"],p:"Free"},
{id:728,a:"mt-charleston",c:"Outdoors",t:"South Loop to Charleston Peak",e:"\uD83E\uDD7E",d:"The more popular of two routes to the 11,916-foot summit. 8.4 miles one way with 4,300 feet of elevation gain. Passes through five climate zones. Start before dawn in summer.",g:"South Loop Trail Charleston Peak",tg:["Summit","Strenuous"],p:"Free"},
{id:729,a:"mt-charleston",c:"Experience",t:"Spring Mountains Visitor Gateway",e:"\uD83D\uDCCD",d:"The US Forest Service visitor center at the base of Kyle Canyon. Maps, trail conditions, ranger programs, and a gift shop. The best first stop for anyone new to the mountain.",g:"Spring Mountains Visitor Gateway",tg:["Visitor Center","Info"],p:"Free"},
{id:730,a:"mt-charleston",c:"Views",t:"Mummy Mountain Viewpoint",e:"\uD83D\uDC41\uFE0F",d:"Named for its profile resembling a mummy lying down, this 11,528-foot peak is visible from many trails. The best views are from Sawmill Trailhead and the Bristlecone Trail.",g:"Mummy Mountain Mt Charleston",tg:["Views","Landmark"],p:"Free"},
,

// HIDDEN GEMS & HOLE-IN-THE-WALL
{id:751,a:"the-strip",c:"Food & Drink",t:"Tacos El Gordo",e:"\uD83C\uDF2E",d:"Street-style Tijuana tacos that locals line up for at 2am. The adobada is carved off a rotating spit right in front of you. Cash only, no frills, just incredible tacos.",g:"Tacos El Gordo Las Vegas Blvd",tg:["Local","Late Night","Cheap"]},
{id:752,a:"the-strip",c:"Food & Drink",t:"Secret Pizza at Cosmo Level 3",e:"\uD83C\uDF55",d:"No sign, no menu on the wall. Take the elevator to the 3rd floor of the Cosmopolitan and follow the hallway with the records on the wall. New York style slices, open late.",g:"Secret Pizza Cosmopolitan Las Vegas",tg:["Local","Late Night","Hidden"]},
{id:753,a:"the-strip",c:"Experience",t:"Pinball Hall of Fame Free Play",e:"\uD83C\uDFAE",d:"Over 200 playable pinball machines from every era. Most games are 25 to 50 cents. Tim Arnold's personal collection turned into the world's largest pinball museum. Free to walk in.",g:"Pinball Hall of Fame Las Vegas",tg:["Unique","Cheap","Family","Free"]},
{id:754,a:"downtown",c:"Food & Drink",t:"Tacotarian Downtown",e:"\uD83C\uDF2E",d:"Plant-based Mexican food that makes meat eaters do a double take. The birria tacos are unreal. Tiny spot on Fremont East, order at the window and eat on the patio.",g:"Tacotarian Downtown Las Vegas",tg:["Local","Vegan","Casual"]},
{id:755,a:"downtown",c:"Food & Drink",t:"Makers & Finders",e:"\u2615",d:"Latin inspired coffee shop with arepas, empanadas, and one of the best cortados in town. The Arts District location has become a morning ritual for a lot of locals.",g:"Makers & Finders Las Vegas",tg:["Local","Coffee","Brunch"]},
{id:756,a:"downtown",c:"Experience",t:"Burlesque Hall of Fame",e:"\uD83C\uDFAD",d:"A small museum dedicated to the art of burlesque from the 1860s through today. Costumes, props, and history you will not find anywhere else. Tucked away in the Arts District.",g:"Burlesque Hall of Fame Las Vegas",tg:["Unique","History","Art"]},
{id:757,a:"downtown",c:"Food & Drink",t:"Cornish Pasty Co. Late Night",e:"\uD83E\uDD5F",d:"Open until 4am, this is where industry workers go after their shifts. Savory hand pies with fillings like tikka masala, bangers and mash, and green chile stew. Weird and wonderful.",g:"Cornish Pasty Co Las Vegas",tg:["Late Night","Local","Unique"]},
{id:758,a:"downtown",c:"Culture",t:"The Writer's Block",e:"\uD83D\uDCDA",d:"Independent bookstore and writing workshop space in the Arts District. A stuffed bird named Lemon Drop greets you at the door. Great curated selection, local author events, and a calm escape.",g:"The Writer's Block Las Vegas",tg:["Local","Art","Unique"]},
{id:759,a:"the-strip",c:"Food & Drink",t:"Chinatown Spring Mountain Road",e:"\uD83C\uDF5C",d:"Forget the Strip buffets. The 3-mile stretch of Spring Mountain Road is where Vegas actually eats. Ramen, dim sum, pho, KBBQ, boba, all of it. Start at any plaza and explore.",g:"Chinatown Las Vegas Spring Mountain",tg:["Local","Food","Authentic"]},
{id:760,a:"the-strip",c:"Food & Drink",t:"Lotus of Siam",e:"\uD83C\uDF36\uFE0F",d:"Northern Thai food that Gourmet Magazine once called the best Thai restaurant in North America. The garlic prawns and crispy rice salad are legendary. Reservation only.",g:"Lotus of Siam Las Vegas",tg:["Local","Fine Dining","Iconic"]},
{id:761,a:"summerlin",c:"Food & Drink",t:"Nittaya's Secret Kitchen",e:"\uD83C\uDF5B",d:"A tiny Thai spot in a strip mall that locals guard like a secret. Everything is made from scratch and the flavors are absurdly good. The panang curry will ruin other Thai food for you.",g:"Nittaya's Secret Kitchen Las Vegas",tg:["Local","Hidden","Authentic"]},
{id:762,a:"summerlin",c:"Food & Drink",t:"Egg Works",e:"\uD83C\uDF73",d:"Cash only breakfast spot where the portions are enormous and the regulars have been coming for years. Nothing fancy, just perfectly executed diner food with a local crowd.",g:"Egg Works Summerlin Las Vegas",tg:["Local","Brunch","Cheap"]},
{id:763,a:"henderson",c:"Food & Drink",t:"Goldbergs Fine Foods Deli",e:"\uD83E\uDD6A",d:"Old school deli with sandwiches piled high. The pastrami is legit, the matzo ball soup hits, and the vibe is straight out of a New York neighborhood spot. Henderson locals swear by it.",g:"Goldbergs Fine Foods Henderson",tg:["Local","Casual","Authentic"]},
{id:764,a:"henderson",c:"Nature",t:"Anthem Overlook Trail at Sunrise",e:"\uD83C\uDF05",d:"A short scramble up the rocks behind Anthem gives you a panoramic view of the entire valley. Go at sunrise when the light hits the Strip. Almost nobody is up here.",g:"Anthem Hills Henderson",tg:["Views","Sunrise","Hidden"]},
{id:765,a:"enterprise",c:"Food & Drink",t:"Lindo Michoacan South",e:"\uD83C\uDF2E",d:"A massive Mexican restaurant that has been a Vegas institution for decades. The mole is rich and complex, the portions are huge, and it feels like a family party on weekends. Live mariachi on Fridays.",g:"Lindo Michoacan Las Vegas",tg:["Local","Family","Authentic"]},
{id:766,a:"enterprise",c:"Experience",t:"Sunset Park Drum Circle",e:"\uD83E\uDD41",d:"On weekend evenings, musicians gather near the lake at Sunset Park for an informal drum circle. Bring a chair, bring a drum, or just listen. One of the most organic community moments in Vegas.",g:"Sunset Park Las Vegas",tg:["Free","Community","Unique"]},
{id:767,a:"north-lv",c:"Food & Drink",t:"Chayo Taco Stand",e:"\uD83C\uDF2E",d:"A walk-up taco window in a gas station parking lot that somehow makes the best al pastor in the valley. Cash only, limited hours, and there is always a line. Worth every minute.",g:"North Las Vegas taco stand",tg:["Local","Cheap","Hidden"]},
{id:768,a:"north-lv",c:"Experience",t:"Broadacres Swap Meet",e:"\uD83D\uDED2",d:"An outdoor flea market that feels like a different world. Fresh fruit vendors, vintage finds, cheap tools, elote carts, and the most diverse crowd in Vegas. Weekend mornings only.",g:"Broadacres Marketplace North Las Vegas",tg:["Local","Cheap","Unique"]},
{id:769,a:"centennial",c:"Food & Drink",t:"John Mull's Meats & Road Kill Grill",e:"\uD83C\uDF56",d:"A butcher shop with a grill in the back that serves some of the best BBQ in Vegas. The tri-tip sandwich is massive. Locals have been coming here for 30 years. Do not let the name scare you.",g:"John Mull's Meats Las Vegas",tg:["Local","BBQ","Iconic"]},
{id:770,a:"centennial",c:"Experience",t:"Paiute Golf Resort",e:"\u26F3",d:"Three championship courses run by the Las Vegas Paiute Tribe in the northwest valley. Some of the best public golf in the state with mountain views and affordable rates.",g:"Las Vegas Paiute Golf Resort",tg:["Sports","Nature","Local"]},
{id:771,a:"the-strip",c:"Food & Drink",t:"Ronald's Donuts",e:"\uD83C\uDF69",d:"A no-frills donut shop on Spring Mountain that opens at midnight. The fried chicken and donuts combo should not work but it absolutely does. Cash only, weird hours, perfect.",g:"Ronald's Donuts Las Vegas",tg:["Local","Late Night","Cheap"]},
{id:772,a:"downtown",c:"Food & Drink",t:"7th & Carson",e:"\uD83C\uDF78",d:"A cocktail bar disguised as a bodega. Walk through the convenience store front and the bar is hidden in the back. Creative drinks, low key vibe, and one of the best kept secrets downtown.",g:"7th and Carson Las Vegas",tg:["Hidden","Nightlife","Local"]},
{id:773,a:"the-strip",c:"Food & Drink",t:"Peppermill Fireside Lounge",e:"\uD83D\uDD25",d:"A retro lounge that has not changed since the 70s and that is exactly why it is perfect. Neon, fire pits, massive scorpion bowls, and a feeling that time stopped. Open 24 hours.",g:"Peppermill Las Vegas",tg:["Iconic","Romantic","Late Night"]},
{id:774,a:"downtown",c:"Food & Drink",t:"La Comida",e:"\uD83C\uDF2E",d:"Mexican food on Fremont East with a Day of the Dead vibe and a mezcal bar that goes deep. The street corn and short rib tacos are standouts. Great patio for people watching.",g:"La Comida Las Vegas",tg:["Local","Nightlife","Food"]},
{id:775,a:"summerlin",c:"Outdoors",t:"Blue Diamond Ride or Walk",e:"\uD83D\uDEB2",d:"The tiny town of Blue Diamond just past Red Rock has a general store, a saloon, and zero traffic. Ride your bike out there on a Saturday morning and feel like you left Vegas entirely.",g:"Blue Diamond Nevada",tg:["Local","Adventure","Hidden"]},
{id:776,a:"henderson",c:"Food & Drink",t:"Leticia's Mexican Cocina",e:"\uD83C\uDF2F",d:"Family-run Mexican restaurant in a strip mall that serves green chile enchiladas that will end your search for good enchiladas. The salsa bar alone is worth the trip.",g:"Leticia's Mexican Cocina Henderson",tg:["Local","Authentic","Family"]},
{id:777,a:"enterprise",c:"Outdoors",t:"Wetlands Park Sunset Walk",e:"\uD83C\uDF05",d:"Most people do not know Vegas has a 2,900-acre wetlands preserve. Miles of boardwalks through marshes, bird watching spots, and some of the best sunsets in the valley. Completely free.",g:"Clark County Wetlands Park Las Vegas",tg:["Free","Nature","Hidden"]},
{id:778,a:"the-strip",c:"Experience",t:"The Nerd Bar",e:"\uD83C\uDFAE",d:"A bar where you can play retro arcade games, board games, and N64 while drinking themed cocktails. Small, nerdy, and nothing like the club scene. In the Arts District off the Strip.",g:"The Nerd Las Vegas",tg:["Local","Unique","Nightlife"]},
{id:779,a:"downtown",c:"Experience",t:"Pawn Plaza Food Trucks",e:"\uD83D\uDE9A",d:"The parking lot next to Gold and Silver Pawn Shop became a food truck park. Rick's Rollin Smoke BBQ is the move. Yes, the pawn shop from the TV show is right there.",g:"Pawn Plaza Las Vegas",tg:["Local","Cheap","Food"]},
{id:780,a:"north-lv",c:"Nature",t:"Tule Springs After Rain",e:"\uD83C\uDF3F",d:"After a rare Vegas rainstorm, Tule Springs comes alive. The ponds fill up, birds show up, and the desert greens overnight. One of the most beautiful and underrated spots in the whole valley.",g:"Floyd Lamb Park Tule Springs",tg:["Nature","Hidden","Photography"]},
{id:781,a:"the-strip",c:"Food & Drink",t:"Oyster Bar at Palace Station",e:"\uD83E\uDD9E",d:"There is always a line and no reservations. This tiny counter inside Palace Station serves pan roasts and gumbo that people have been coming back for since the 80s. The wait is part of the experience.",g:"Oyster Bar Palace Station Las Vegas",tg:["Iconic","Local","Food"]},
{id:782,a:"summerlin",c:"Experience",t:"Springs Preserve Hidden Trails",e:"\uD83C\uDF35",d:"Most people hit the main museum and leave. But the back trails wind through real desert with wildlife, old train tracks, and views of the Strip from the west side that few people see.",g:"Springs Preserve Las Vegas",tg:["Hidden","Nature","Family"]},
{id:783,a:"henderson",c:"Experience",t:"Railroad Pass Casino",e:"\uD83C\uDFB0",d:"The oldest continuously operating casino in Nevada. It is tiny, it is old, and it is exactly what Vegas used to be. Cheap breakfast, penny slots, and zero tourists. A time capsule.",g:"Railroad Pass Casino Henderson",tg:["History","Local","Cheap"]},
{id:784,a:"downtown",c:"Culture",t:"Meow Wolf vs First Friday",e:"\uD83C\uDFA8",d:"On First Friday, walk the Arts District gallery openings, food trucks, and live music. Then contrast it with Omega Mart at AREA15. Two wildly different art experiences in one night.",g:"Arts District Las Vegas First Friday",tg:["Art","Community","Free"]},

// SPEAKEASIES & HIDDEN BARS
{id:785,a:"the-strip",c:"Nightlife",t:"The Barbershop Cuts & Cocktails",e:"\u2702\uFE0F",d:"Walk into what looks like an actual barbershop inside the Cosmo. Give the password to the host and a hidden door opens into a Prohibition-era cocktail lounge. Live music, craft cocktails, and a vibe that feels like a secret.",g:"Barbershop Cuts Cocktails Cosmopolitan",tg:["Speakeasy","Hidden","Nightlife"]},
{id:786,a:"the-strip",c:"Nightlife",t:"Ghost Donkey",e:"\uD83E\uDD43",d:"A mezcal and tequila bar hidden behind an unmarked door inside the Block 16 food hall at the Cosmo. Tiny, loud, and full of character. The margaritas are some of the best on the Strip.",g:"Ghost Donkey Cosmopolitan Las Vegas",tg:["Speakeasy","Hidden","Nightlife"]},
{id:787,a:"the-strip",c:"Nightlife",t:"The Laundry Room",e:"\uD83E\uDDFA",d:"Text a phone number. Get a reservation. Show up at an unmarked door. Inside is a 30-seat cocktail bar where drinks are made one at a time with no menu. Tell the bartender what you like, they build it. One of the hardest reservations in Vegas.",g:"The Laundry Room Las Vegas",tg:["Speakeasy","Hidden","Romantic"]},
{id:788,a:"the-strip",c:"Nightlife",t:"Parasol Up / Parasol Down",e:"\u2602\uFE0F",d:"Not exactly hidden, but most tourists walk right past it. Two connected bars at the Wynn separated by an escalator, surrounded by parasol sculptures and overlooking the Lake of Dreams. A gorgeous, low-key drink spot.",g:"Parasol Down Wynn Las Vegas",tg:["Nightlife","Romantic","Views"]},
{id:789,a:"the-strip",c:"Nightlife",t:"Herbs & Rye",e:"\uD83C\uDF3F",d:"A pre-Prohibition style cocktail bar just off the Strip that bartenders consider the best bar in Vegas. The happy hour (5-8pm) is half off all cocktails. The bone marrow appetizer is legendary.",g:"Herbs and Rye Las Vegas",tg:["Speakeasy","Local","Nightlife"]},
{id:790,a:"downtown",c:"Nightlife",t:"The Underground at The Mob Museum",e:"\uD83C\uDF7A",d:"A fully operational Prohibition-era speakeasy in the basement of the Mob Museum. You can enter through the museum or a separate alley entrance. They distill their own moonshine on site.",g:"The Underground Mob Museum Las Vegas",tg:["Speakeasy","History","Hidden"]},
{id:791,a:"downtown",c:"Nightlife",t:"Velveteen Rabbit",e:"\uD83D\uDC07",d:"An Arts District cocktail bar with a massive patio, rotating art installations, and creative drinks using house-made ingredients. The vibe shifts from chill afternoon to packed party by midnight.",g:"Velveteen Rabbit Las Vegas",tg:["Local","Art","Nightlife"]},
{id:792,a:"the-strip",c:"Nightlife",t:"Juniper Cocktail Lounge",e:"\uD83C\uDF3F",d:"A gin-focused cocktail bar tucked inside a quiet corner of the Park MGM. Over 100 gins and botanical cocktails. Low lighting, velvet seating, and nobody rushing you. A grown-up drinking experience.",g:"Juniper Cocktail Lounge Park MGM",tg:["Nightlife","Romantic","Hidden"]},
{id:793,a:"the-strip",c:"Food & Drink",t:"EDO Gastro Tapas & Wine",e:"\uD83C\uDF77",d:"A small plates spot off the Strip that feels like it belongs in Madrid. Spanish wines, charcuteria, and tapas made by a chef who trained in Spain. Locals come here for date night.",g:"EDO Gastro Tapas Wine Las Vegas",tg:["Local","Romantic","Dining"]},
{id:794,a:"the-strip",c:"Food & Drink",t:"Raku",e:"\uD83C\uDF62",d:"A Japanese charcoal grill in Chinatown that chefs eat at after their shifts. No sushi. Just perfect grilled skewers, homemade tofu, and seasonal small plates. Late night, no reservations, always a wait. Worth it.",g:"Raku Las Vegas",tg:["Local","Authentic","Late Night"]},
{id:795,a:"the-strip",c:"Food & Drink",t:"Sparrow + Wolf",e:"\uD83D\uDC26",d:"An Arts District restaurant where the chef changes the menu constantly based on what is good that week. Asian-American fusion, creative cocktails, and one of the best dining experiences in Vegas that most tourists never find.",g:"Sparrow Wolf Las Vegas",tg:["Local","Hidden","Dining"]},
{id:796,a:"downtown",c:"Food & Drink",t:"PublicUs",e:"\u2615",d:"A cafe, restaurant, and cocktail bar in one space in the Arts District. Avocado toast and lattes by day, natural wines and small plates by night. The kind of place where you come for coffee and end up staying for dinner.",g:"PublicUs Las Vegas",tg:["Local","Brunch","Nightlife"]},
{id:797,a:"the-strip",c:"Nightlife",t:"Oddwood",e:"\uD83C\uDF42",d:"A cocktail bar inside the Venetian with a woodland cabin theme. Taxidermy, leather booths, and drinks made with house-infused spirits. Easy to miss because it looks like a wall from outside. That is the point.",g:"Oddwood Venetian Las Vegas",tg:["Speakeasy","Hidden","Nightlife"]},
{id:798,a:"henderson",c:"Food & Drink",t:"Ohlala French Bistro Henderson",e:"\uD83E\uDD50",d:"A tiny French restaurant in a strip mall serving legit croissants, croque monsieurs, and steak frites. The owner is from Paris and it shows. BYOB wine with a small corkage fee.",g:"Ohlala French Bistro Henderson",tg:["Local","Authentic","Romantic"]},
{id:799,a:"the-strip",c:"Nightlife",t:"Easy's Cocktail Lounge",e:"\uD83C\uDF79",d:"Hidden behind a fake janitor closet door inside the Aria food court. A speakeasy with neon signs, vinyl booths, and cocktails that are better than they have any right to be considering you walked through a broom closet to get here.",g:"Easy's Cocktail Lounge Aria Las Vegas",tg:["Speakeasy","Hidden","Nightlife"]},
{id:800,a:"the-strip",c:"Food & Drink",t:"Estiatorio Milos at The Cosmo",e:"\uD83D\uDC1F",d:"You pick your whole fish from ice at the display, they weigh it and grill it. Mediterranean seafood at its purest. Expensive but the lunch prix fixe is one of the best deals on the Strip.",g:"Estiatorio Milos Cosmopolitan Las Vegas",tg:["Dining","Fine Dining","Iconic"]},
{id:801,a:"the-strip",c:"Food & Drink",t:"District One Kitchen & Bar",e:"\uD83C\uDF5C",d:"Vietnamese food in Chinatown that locals argue is the best pho in Vegas. The bone broth is simmered for 24 hours. Also excellent bun bo hue and shaking beef. Go early, it fills fast.",g:"District One Las Vegas",tg:["Local","Authentic","Food"]},
{id:802,a:"summerlin",c:"Food & Drink",t:"Kabuto Edomae Sushi",e:"\uD83C\uDF63",d:"An omakase counter in Chinatown West where the chef trained in Tokyo. 20 courses of traditional Edomae sushi. No menu, no California rolls, just the real thing. Reservation required.",g:"Kabuto Las Vegas",tg:["Local","Fine Dining","Authentic"]},
{id:803,a:"downtown",c:"Nightlife",t:"Millennium Fandom Bar",e:"\uD83D\uDE80",d:"A sci-fi and fantasy themed bar in the Arts District. Star Wars pinball, themed cocktails, cosplay nights, and a crowd that is genuinely passionate about fandoms. Nerd bar done right.",g:"Millennium Fandom Bar Las Vegas",tg:["Unique","Local","Nightlife"]},
// 500+ ACTIVITIES UPDATE
{id:804,a:"the-strip",c:"Food & Drink",t:"In-N-Out Burger Strip View",e:"\uD83C\uDF54",d:"The only In-N-Out with a view of the Strip. Grab a Double-Double and eat on the outdoor patio watching planes land at Harry Reid. Open late.",g:"In-N-Out Burger Strip View Las Vegas",tg:["Local","Cheap","Late Night"]},
{id:805,a:"the-strip",c:"Experience",t:"Bellagio Gallery of Fine Art",e:"\uD83D\uDDBC\uFE0F",d:"A rotating gallery inside the Bellagio featuring world-class exhibitions from major museums. Small admission fee, big reward. Usually takes about an hour.",g:"Bellagio Gallery of Fine Art Las Vegas",tg:["Art","Culture"]},
{id:806,a:"the-strip",c:"Food & Drink",t:"Nacho Daddy Fremont",e:"\uD83E\uDDC0",d:"Massive loaded nachos and a scorpion shot if you dare. The Las Vegas location has a rooftop patio with Fremont Street views.",g:"Nacho Daddy Fremont Las Vegas",tg:["Food","Fun","Local"]},
{id:807,a:"the-strip",c:"Experience",t:"PopStroke Mini Golf",e:"\u26F3",d:"Tiger Woods designed mini golf with 36 holes, a full restaurant and bar, and putting greens that feel like real PGA tour courses. Family friendly during the day, date night at night.",g:"PopStroke Mini Golf Las Vegas",tg:["Family","Sports","Fun"]},
{id:808,a:"the-strip",c:"Experience",t:"Electric Playhouse",e:"\uD83C\uDFAE",d:"An interactive gaming experience at the Forum Shops where the floors, walls, and tables are all part of the game. Competitive, fun, and unlike anything else on the Strip.",g:"Electric Playhouse Las Vegas",tg:["Unique","Family","Fun"]},
{id:809,a:"the-strip",c:"Food & Drink",t:"Eggslut at The Cosmo",e:"\uD83C\uDF73",d:"LA's famous egg sandwich shop brought to Vegas. The Slut (coddled egg on potato puree) and the Fairfax (soft scramble on a brioche bun) are both essential. Always a line, moves fast.",g:"Eggslut at The Cosmo Las Vegas",tg:["Brunch","Food"]},
{id:810,a:"the-strip",c:"Experience",t:"Fly LINQ Zipline",e:"\uD83E\uDD85",d:"A 1,121 foot zipline that launches from the top of the LINQ Promenade 12 stories above the ground. You fly seated, Superman-style, with Strip views the whole way down.",g:"Fly LINQ Zipline Las Vegas",tg:["Thrill","Views"]},
{id:811,a:"the-strip",c:"Culture",t:"Real Bodies at Horseshoe",e:"\uD83E\uDEC0",d:"Similar to Bodies Exhibition but with a different collection. Preserved human specimens showing every system in the body. Fascinating and a little unsettling.",g:"Real Bodies at Horseshoe Las Vegas",tg:["Unique","Culture"]},
{id:812,a:"the-strip",c:"Food & Drink",t:"Hattie B's Hot Chicken",e:"\uD83C\uDF57",d:"Nashville hot chicken on the Strip at the Cosmo. Order by heat level from Southern to Shut the Cluck Up. The mac and cheese is a must side.",g:"Hattie B's Hot Chicken Las Vegas",tg:["Food","Local"]},
{id:813,a:"the-strip",c:"Experience",t:"Casino Royale $1 Blackjack",e:"\uD83C\uDCCF",d:"The last true low-roller casino on the Strip. Dollar blackjack tables, cheap beer, and a vibe that feels like old Vegas. No resort fee, no pretension.",g:"Casino Royale $1 Blackjack Las Vegas",tg:["Cheap","Local","Fun"]},
{id:814,a:"the-strip",c:"Food & Drink",t:"Baguette Cafe",e:"\uD83E\uDD56",d:"A Vietnamese banh mi shop in Chinatown that locals consider the best sandwich in Vegas. Under $8 for a perfect baguette. Cash preferred.",g:"Baguette Cafe Chinatown Las Vegas",tg:["Local","Cheap","Authentic"]},
{id:815,a:"the-strip",c:"Experience",t:"Resorts World Shows",e:"\uD83C\uDFA4",d:"The newest megaresort on the Strip with rotating headliners, a massive LED exterior, and some of the best production shows in town.",g:"Resorts World Shows Las Vegas",tg:["Entertainment","Shows"]},
{id:816,a:"the-strip",c:"Food & Drink",t:"Yardbird Southern Table",e:"\uD83C\uDF57",d:"Southern comfort food at the Venetian. The chicken and waffles with bourbon maple syrup is the signature dish. Brunch is excellent.",g:"Yardbird Southern Table Las Vegas",tg:["Dining","Brunch"]},
{id:817,a:"the-strip",c:"Experience",t:"Omega Mart Gift Shop Only",e:"\uD83D\uDED2",d:"You can browse the fake grocery store section of Omega Mart at AREA15 without a full ticket during certain hours. Weird products, immersive detail, and free to look around the lobby.",g:"Omega Mart Gift Shop Only Las Vegas",tg:["Free","Art","Unique"]},
{id:818,a:"downtown",c:"Food & Drink",t:"Donut Bar",e:"\uD83C\uDF69",d:"Gourmet donuts the size of your face. The creme brulee donut gets torched to order. In the El Cortez building, open early until sold out.",g:"Donut Bar Las Vegas",tg:["Brunch","Local"]},
{id:819,a:"downtown",c:"Experience",t:"Axe Monkeys Throwing",e:"\uD83E\uDE93",d:"An axe throwing lounge downtown. BYOB, book a lane, and compete with your friends. Surprisingly addictive and oddly therapeutic.",g:"Axe Monkeys Throwing Las Vegas",tg:["Fun","Unique"]},
{id:820,a:"downtown",c:"Culture",t:"DISCOVERY Children's Museum",e:"\uD83E\uDDEA",d:"Nine themed halls of hands-on exhibits for kids. Water play, building zones, art studios, and a toddler town. Best rainy day option in Vegas.",g:"DISCOVERY Children's Museum Las Vegas",tg:["Family","Kids"]},
{id:821,a:"downtown",c:"Food & Drink",t:"Triple George Grill",e:"\uD83E\uDD69",d:"An old school chophouse downtown that locals have been going to for years. The shrimp cocktail and the ribeye are the moves. Feels like a power lunch spot from the 60s.",g:"Triple George Grill Las Vegas",tg:["Local","Dining"]},
{id:822,a:"downtown",c:"Experience",t:"Vegas Vic Neon Sign",e:"\uD83E\uDD20",d:"The 40-foot tall neon cowboy that has been waving since 1951. One of the most iconic pieces of Americana still standing. Best photographed at dusk when the neon pops.",g:"Vegas Vic Neon Sign Las Vegas",tg:["Iconic","Free","Photography"]},
{id:823,a:"downtown",c:"Food & Drink",t:"Jammyland Reggae Bar",e:"\uD83C\uDFB6",d:"A Caribbean themed bar in the Arts District with rum cocktails, jerk chicken, and reggae on the sound system. Outdoor patio with string lights. Relaxed and real.",g:"Jammyland Reggae Bar Las Vegas",tg:["Local","Nightlife"]},
{id:824,a:"downtown",c:"Culture",t:"The Smith Center",e:"\uD83C\uDFAD",d:"Vegas's premier performing arts center. Broadway tours, the Nevada Ballet, Las Vegas Philharmonic, and touring acts. Art deco architecture inspired by Hoover Dam.",g:"The Smith Center Las Vegas",tg:["Culture","Shows"]},
{id:825,a:"downtown",c:"Food & Drink",t:"VegeNation",e:"\uD83E\uDD57",d:"A 100% plant based restaurant downtown that even meat eaters love. The buffalo cauliflower and the mushroom tacos are standouts. Great cocktails too.",g:"VegeNation Las Vegas",tg:["Local","Vegan","Food"]},
{id:826,a:"downtown",c:"Experience",t:"Cheapshot Bar",e:"\uD83C\uDF7A",d:"A tiny bar on Fremont East where every drink is $5 or less. No frills, no cocktail menu, just cold cheap drinks and good people. The anti-Vegas bar.",g:"Cheapshot Bar Las Vegas",tg:["Cheap","Local","Nightlife"]},
{id:827,a:"downtown",c:"Culture",t:"Natural History Museum",e:"\uD83E\uDD96",d:"Dinosaur skeletons, Egyptian artifacts, live sharks, and a marine life gallery. The T-Rex gallery alone is worth the visit. Great for kids and anyone who likes weird old museums.",g:"Natural History Museum Las Vegas",tg:["Family","Culture"]},
{id:828,a:"downtown",c:"Food & Drink",t:"Main Street Provisions",e:"\u2615",d:"A minimalist coffee shop in the Arts District serving specialty pour-overs and pastries. Clean space, good wifi, and a neighborhood feel.",g:"Main Street Provisions Las Vegas",tg:["Coffee","Local"]},
{id:829,a:"downtown",c:"Experience",t:"Fremont Street Buskers",e:"\uD83C\uDFA4",d:"Free street performers every night on Fremont. Magicians, musicians, living statues, and the occasional wild card. Quality varies but the energy is always there.",g:"Fremont Street Buskers Las Vegas",tg:["Free","Nightlife","Fun"]},
{id:830,a:"downtown",c:"Food & Drink",t:"Therapy Lounge",e:"\uD83C\uDF78",d:"A cocktail lounge on Fremont East with creative themed drinks and a moody vibe. The food menu is surprisingly good. Late night crowd is industry people.",g:"Therapy Lounge Las Vegas",tg:["Nightlife","Local"]},
{id:831,a:"downtown",c:"Experience",t:"Neonopolis Complex",e:"\uD83C\uDFAC",d:"A multi-level entertainment complex on Fremont with a movie theater, food options, and event spaces. Less crowded alternative to the main Fremont crowds.",g:"Neonopolis Las Vegas",tg:["Entertainment","Local"]},
{id:832,a:"summerlin",c:"Outdoors",t:"Lost Creek Trail",e:"\uD83C\uDF3F",d:"An easy 0.8 mile walk in Red Rock to a seasonal waterfall. One of the best short hikes for families. Between December and April the waterfall flows strong.",g:"Lost Creek Trail Red Rock Canyon Las Vegas",tg:["Family","Hiking","Nature","Free"]},
{id:833,a:"summerlin",c:"Food & Drink",t:"Grape Street Wine Bar Summerlin",e:"\uD83C\uDF77",d:"A neighborhood wine bar with an extensive by-the-glass menu and a cheese and charcuterie selection that pairs perfectly. Locals gather here on weekday evenings.",g:"Grape Street Wine Bar Summerlin Las Vegas",tg:["Local","Romantic","Dining"]},
{id:834,a:"summerlin",c:"Experience",t:"Downtown Summerlin Ice Rink",e:"\u26F8\uFE0F",d:"A seasonal outdoor ice rink that appears every winter in the Downtown Summerlin plaza. Skate rentals included. Open November through January.",g:"Downtown Summerlin Ice Rink Las Vegas",tg:["Family","Seasonal"]},
{id:835,a:"summerlin",c:"Outdoors",t:"Pine Creek Canyon Trail",e:"\uD83C\uDFD4\uFE0F",d:"A moderate 2-mile trail in Red Rock Canyon that passes through a forested creek bed and ends at the ruins of a historic homestead. Shady and beautiful.",g:"Pine Creek Canyon Trail Red Rock Canyon",tg:["Hiking","Nature","Free"]},
{id:836,a:"summerlin",c:"Food & Drink",t:"DW Bistro Summerlin",e:"\uD83C\uDF7D\uFE0F",d:"A local favorite blending Jamaican and New Mexican flavors. The jerk chicken mac and cheese and the green chile stew are both incredible. BYOB wine.",g:"DW Bistro Summerlin Las Vegas",tg:["Local","Authentic","Food"]},
{id:837,a:"summerlin",c:"Experience",t:"Red Rock Scenic Drive at Sunset",e:"\uD83C\uDF05",d:"The 13-mile loop through Red Rock is stunning any time, but the last entry before closing during golden hour is the best kept secret. The red rocks glow orange and pink.",g:"Red Rock Scenic Drive at Sunset Las Vegas",tg:["Sunset","Views","Photography","Free"]},
{id:838,a:"summerlin",c:"Nature",t:"Calico Basin",e:"\uD83E\uDEB6",d:"A free access area at the south end of Red Rock that does not require the scenic drive reservation. Red sandstone, short trails, and picnic spots. Locals use this entrance to skip the crowds.",g:"Calico Basin Red Rock Las Vegas",tg:["Free","Nature","Hidden"]},
{id:839,a:"summerlin",c:"Food & Drink",t:"Boathouse Asian Eatery",e:"\uD83C\uDF5C",d:"A neighborhood spot in Summerlin with excellent Thai and Japanese food. The pad thai and the sushi combo lunch are both steals. Never crowded, always consistent.",g:"Boathouse Asian Eatery Summerlin Las Vegas",tg:["Local","Authentic","Cheap"]},
{id:840,a:"summerlin",c:"Outdoors",t:"Lone Mountain Peak",e:"\u26F0\uFE0F",d:"A quick but steep scramble to the top of Lone Mountain in the middle of Summerlin. 360 degree views of the entire valley in under 30 minutes. Go at sunrise.",g:"Lone Mountain Peak Summerlin Las Vegas",tg:["Hiking","Views","Sunrise","Free"]},
{id:841,a:"summerlin",c:"Experience",t:"Durango Casino & Resort",e:"\uD83C\uDFB0",d:"The newest Station Casino in Summerlin with a massive food hall, bingo, and a resort pool. The food court has excellent local vendors.",g:"Durango Casino & Resort Las Vegas",tg:["Local","Dining","Entertainment"]},
{id:842,a:"summerlin",c:"Food & Drink",t:"Weiss Deli & Bakery",e:"\uD83E\uDD6A",d:"A real New York style deli in Summerlin. Pastrami, corned beef, bagels, and matzo ball soup. The Reuben is massive and perfect.",g:"Weiss Deli & Bakery Las Vegas",tg:["Local","Brunch","Authentic"]},
{id:843,a:"summerlin",c:"Outdoors",t:"Gateway Canyon Trail",e:"\uD83E\uDEB7",d:"A newer trail at the south end of Red Rock. Less traffic than the main loop trails and beautiful views of the Wilson Cliffs. Moderate difficulty, about 4 miles round trip.",g:"Gateway Canyon Trail Red Rock",tg:["Hiking","Nature","Hidden","Free"]},
{id:844,a:"henderson",c:"Food & Drink",t:"Public School 702",e:"\uD83C\uDF54",d:"A gastropub with creative comfort food. The truffle fries and the PB&J burger are cult favorites. Great local craft beer list. In the District at GVR.",g:"Public School 702 Henderson Las Vegas",tg:["Local","Food","Dining"]},
{id:845,a:"henderson",c:"Nature",t:"Ash Canyon Trail",e:"\uD83C\uDF35",d:"A quiet trail in the Sloan Canyon area with desert wash walking and spring wildflower blooms. Almost nobody out here. Bring water, no shade.",g:"Ash Canyon Trail Henderson Nevada",tg:["Hiking","Nature","Hidden","Free"]},
{id:846,a:"henderson",c:"Experience",t:"Lake Las Vegas Kayak Rental",e:"\uD83D\uDEF6",d:"Rent a kayak or paddleboard on the calm waters of Lake Las Vegas. Mountain views, clear water, and usually very peaceful on weekday mornings.",g:"Lake Las Vegas Kayak Rental Las Vegas",tg:["Adventure","Nature","Relaxing"]},
{id:847,a:"henderson",c:"Food & Drink",t:"The Café at Botanica Henderson",e:"\u2615",d:"A cozy cafe in a plant shop. Coffee, pastries, and surrounded by greenery. A calm morning spot that feels nothing like Vegas.",g:"The Café at Botanica Henderson Las Vegas",tg:["Coffee","Local","Hidden"]},
{id:848,a:"henderson",c:"Outdoors",t:"Historic Railroad Trail",e:"\uD83D\uDEB6",d:"A 3.7 mile paved trail from the Lake Mead parking area through old railroad tunnels to the Hoover Dam overlook. Flat, easy, and the tunnels are incredible photo spots.",g:"Historic Railroad Trail Lake Mead",tg:["Hiking","History","Photography","Free"]},
{id:849,a:"henderson",c:"Experience",t:"Henderson Events Plaza",e:"\uD83C\uDFA4",d:"Free outdoor concerts and community events throughout the year at the Henderson Events Plaza. Check the Henderson Live calendar for what is coming up.",g:"Henderson Events Plaza Nevada",tg:["Free","Community","Entertainment"]},
{id:850,a:"henderson",c:"Food & Drink",t:"Tenaya Creek Brewery Henderson",e:"\uD83C\uDF7A",d:"A local craft brewery with a taproom and food trucks on weekends. The Bonanza Brown and the Hop Ride IPA are both solid. Casual, dog friendly patio.",g:"Tenaya Creek Brewery Henderson Las Vegas",tg:["Local","Food"]},
{id:851,a:"henderson",c:"Nature",t:"Henderson Canyon Trail",e:"\uD83C\uDFDC\uFE0F",d:"A network of desert trails in the McCullough Hills connecting Henderson neighborhoods. Wide paths, mountain views, and a mix of flat and rolling terrain. Good for trail running.",g:"McCullough Hills Trail Henderson",tg:["Hiking","Nature","Free"]},
{id:852,a:"henderson",c:"Food & Drink",t:"Sushi Way Henderson",e:"\uD83C\uDF63",d:"A no-frills strip mall sushi spot where the all-you-can-eat lunch deal is one of the best values in Henderson. Fresh, fast, and cheap. Locals only.",g:"Sushi Way Henderson Nevada",tg:["Local","Cheap","Food"]},
{id:853,a:"henderson",c:"Experience",t:"Water Street District",e:"\uD83D\uDEB6",d:"Henderson's revitalized downtown with locally owned shops, restaurants, murals, and seasonal events. A walkable district that feels like a small town main street.",g:"Water Street District Henderson Nevada",tg:["Local","Free","Community"]},
{id:854,a:"henderson",c:"Outdoors",t:"Three Kids Mine Trail",e:"\u26CF\uFE0F",d:"A desert trail through a former mining area east of Henderson. Interpretive signs explain the history. Rugged terrain and wide open views of the valley.",g:"Three Kids Mine Trail Henderson",tg:["Hiking","History","Hidden","Free"]},
{id:855,a:"north-lv",c:"Food & Drink",t:"Skinny Fat's NLV",e:"\uD83C\uDF54",d:"A build-your-own burger and bowl concept where you can go healthy or indulgent. The smash burgers and the loaded fries are both excellent. Fast casual, big portions.",g:"Skinny Fats North Las Vegas",tg:["Local","Food","Cheap"]},
{id:856,a:"north-lv",c:"Experience",t:"Las Vegas Distillery",e:"\uD83E\uDD43",d:"Nevada's first legal distillery since Prohibition. Free tours and tastings of their whiskey, gin, and vodka. Small operation, big character.",g:"Las Vegas Distillery Las Vegas",tg:["Local","Unique","Free"]},
{id:857,a:"north-lv",c:"Outdoors",t:"Aliante Loop Trail",e:"\uD83D\uDEB6",d:"A paved walking and biking loop around the Aliante master planned community. Flat, safe, and connects multiple parks. Good for morning walks.",g:"Aliante Loop Trail North Las Vegas",tg:["Free","Nature","Family"]},
{id:858,a:"north-lv",c:"Food & Drink",t:"Tacos and Beer NLV",e:"\uD83C\uDF2E",d:"A Mexican restaurant and bar in North Las Vegas with creative tacos (the Korean BBQ taco is excellent) and a great craft beer selection. Patio dining.",g:"Tacos and Beer NLV Las Vegas",tg:["Local","Food"]},
{id:859,a:"north-lv",c:"Nature",t:"Sunrise Trailhead",e:"\uD83C\uDF05",d:"An access point to the northeastern desert trails. Wide open space, jackrabbits, and some of the best sunrise views in the valley. No facilities, just raw desert.",g:"Sunrise Trailhead North Las Vegas",tg:["Sunrise","Nature","Hidden","Free"]},
{id:860,a:"north-lv",c:"Experience",t:"Cannery Casino Concert Venue",e:"\uD83C\uDFA4",d:"A surprisingly good mid-size concert venue inside Cannery Casino. Tribute bands, country acts, and classic rock. Cheap tickets and a local crowd.",g:"Cannery Casino Concert Venue Las Vegas",tg:["Entertainment","Local","Cheap"]},
{id:861,a:"north-lv",c:"Outdoors",t:"Nellis Dunes OHV Area",e:"\uD83C\uDFCD\uFE0F",d:"Over 10,000 acres of sand dunes and desert terrain open for off-road vehicles. Bring your own ATV or rent one from a nearby outfitter. Wild and loud and fun.",g:"Nellis Dunes OHV Area Las Vegas",tg:["Adventure","Thrill"]},
{id:862,a:"north-lv",c:"Food & Drink",t:"Avery's Coffee NLV",e:"\u2615",d:"A locally owned coffee shop with specialty drinks and a cozy atmosphere. The lavender latte is a local favorite. Good wifi for remote work.",g:"Avery's Coffee North Las Vegas",tg:["Coffee","Local"]},
{id:863,a:"north-lv",c:"Experience",t:"Shadow Creek Golf Course",e:"\u26F3",d:"One of the most exclusive golf courses in the world, open only to MGM hotel guests. If you can get on, it is an unforgettable experience in the middle of North Las Vegas.",g:"Shadow Creek Golf Course North Las Vegas",tg:["Sports","Unique"]},
{id:864,a:"north-lv",c:"Nature",t:"Las Vegas Wash Trail",e:"\uD83C\uDF3F",d:"A paved trail system following the Las Vegas Wash toward Lake Mead. Wetlands, birds, and interpretive signs about the desert ecosystem. Easy walking for all ages.",g:"Las Vegas Wash Trail Las Vegas",tg:["Nature","Free","Family"]},
{id:865,a:"north-lv",c:"Food & Drink",t:"Pupuseria Salvadorena",e:"\uD83E\uDED4",d:"A tiny Salvadoran restaurant in North Las Vegas with handmade pupusas, curtido, and plantains. Cash only, family run, and absolutely authentic. The loroco and cheese pupusa is the order.",g:"Pupuseria Salvadorena North Las Vegas",tg:["Local","Authentic","Cheap"]},
{id:866,a:"north-lv",c:"Experience",t:"Jerry Croft Jr Memorial Dog Park",e:"\uD83D\uDC15",d:"One of the best dog parks in the valley with separate areas for large and small dogs, water stations, shade structures, and lots of room to run.",g:"Jerry Croft Jr Dog Park North Las Vegas",tg:["Free","Family","Nature"]},
{id:867,a:"centennial",c:"Food & Drink",t:"Cafe Lola",e:"\u2615",d:"A European style cafe in Centennial with pastries, brunch, and a rose garden patio. The croque madame and the lavender latte are both excellent. Weekend reservations recommended.",g:"Cafe Lola Las Vegas",tg:["Brunch","Local","Romantic"]},
{id:868,a:"centennial",c:"Outdoors",t:"Centennial Hills Trail System",e:"\uD83D\uDEB6",d:"A network of paved and unpaved trails connecting parks throughout Centennial. Great for morning jogs, dog walks, and family bike rides. Connects to the 215 trail.",g:"Centennial Hills Trail Las Vegas",tg:["Free","Family","Nature"]},
{id:869,a:"centennial",c:"Experience",t:"Centennial Bowl at Santa Fe",e:"\uD83C\uDFB3",d:"A modern bowling alley inside Santa Fe Station with cosmic bowling on weekend nights. Cheap drinks, arcade games, and a solid local crowd.",g:"Centennial Bowl at Santa Fe Las Vegas",tg:["Family","Fun","Local"]},
{id:870,a:"centennial",c:"Nature",t:"Desert Bloom Park",e:"\uD83C\uDF3A",d:"A newer community park in the northwest with walking paths, a playground, and native desert landscaping. Quiet mornings are perfect for a walk.",g:"Desert Bloom Park Las Vegas",tg:["Free","Family","Nature"]},
{id:871,a:"centennial",c:"Food & Drink",t:"Lee's Korean BBQ",e:"\uD83E\uDD69",d:"A Korean BBQ spot in the Centennial area where you grill at your table. The combo platters are a deal and the banchan sides keep coming. Great for groups.",g:"Lee's Korean BBQ Las Vegas",tg:["Local","Authentic","Dining"]},
{id:872,a:"centennial",c:"Experience",t:"Red Rock Lanes Bowling",e:"\uD83C\uDFB3",d:"A bowling center at Red Rock Casino with upscale lanes, a lounge vibe, and good food. Cosmic bowling on weekend nights.",g:"Red Rock Lanes Bowling Las Vegas",tg:["Fun","Local"]},
{id:873,a:"centennial",c:"Outdoors",t:"Ann Road Trailhead",e:"\uD83E\uDEB7",d:"An access point to the northwestern desert with wide open trails and mountain views. Less developed than the 215 trail, more rugged. Bring water.",g:"Ann Road Trailhead Las Vegas",tg:["Hiking","Nature","Free"]},
{id:874,a:"centennial",c:"Food & Drink",t:"Ocha Thai Cuisine",e:"\uD83C\uDF5B",d:"A neighborhood Thai restaurant in the northwest valley. The green curry and the mango sticky rice are both excellent. Consistent, reliable, and always busy.",g:"Ocha Thai Cuisine Las Vegas",tg:["Local","Authentic"]},
{id:875,a:"centennial",c:"Nature",t:"La Madre Mountain Viewpoint",e:"\u26F0\uFE0F",d:"A viewpoint accessible from the 215 trail at the northwest corner of the valley. Views of La Madre Mountain and the Spring Mountain Range. Bring binoculars for wildlife.",g:"La Madre Mountain Las Vegas",tg:["Views","Nature","Free"]},
{id:876,a:"centennial",c:"Experience",t:"SkyZone Trampoline Park",e:"\uD83E\uDD38",d:"An indoor trampoline park with foam pits, dodgeball courts, and ninja obstacle courses. Great for kids with energy to burn. Weekday mornings are quietest.",g:"SkyZone Trampoline Park Las Vegas",tg:["Family","Fun"]},
{id:877,a:"enterprise",c:"Food & Drink",t:"Emerald Island Casino Cafe",e:"\uD83C\uDF5D",d:"A tiny locals casino in Henderson with a surprisingly good cafe. The specials are cheap and the portions are large. Old school Vegas dining vibes.",g:"Emerald Island Casino Cafe Las Vegas",tg:["Cheap","Local"]},
{id:878,a:"enterprise",c:"Outdoors",t:"Sunset Park Trails",e:"\uD83D\uDEB6",d:"Miles of walking paths around the lake at Sunset Park. The disc golf course is excellent. Weekend mornings the park is full of soccer games and family picnics.",g:"Sunset Park Las Vegas",tg:["Free","Family","Nature"]},
{id:879,a:"enterprise",c:"Food & Drink",t:"Sakana Japanese Restaurant",e:"\uD83C\uDF63",d:"A strip mall sushi spot near Silverado Ranch that locals guard like a secret. The lunch specials are a steal and the omakase at the bar is excellent for the price.",g:"Sakana Japanese Restaurant Las Vegas",tg:["Local","Hidden","Authentic"]},
{id:880,a:"enterprise",c:"Experience",t:"Cowabunga Bay Season Pass",e:"\uD83C\uDFCA",d:"If you live here, the season pass to Cowabunga Bay in Henderson pays for itself in two visits. Water slides, lazy river, and wave pool. Opens late April.",g:"Cowabunga Bay Season Pass Las Vegas",tg:["Family","Thrill","Seasonal"]},
{id:881,a:"enterprise",c:"Nature",t:"Duck Creek Trailhead",e:"\uD83E\uDEB6",d:"A desert trail connecting several Enterprise neighborhoods. Flat and easy with occasional wildlife sightings. Best at dawn before the heat.",g:"Duck Creek Trail Henderson",tg:["Free","Nature","Hidden"]},
{id:882,a:"enterprise",c:"Food & Drink",t:"Forte Tapas Bar",e:"\uD83C\uDF77",d:"A European wine and tapas bar in the South Strip area. Small plates, good wine by the glass, and a sophisticated atmosphere without Strip prices.",g:"Forte Tapas Bar Las Vegas",tg:["Local","Romantic","Dining"]},
{id:883,a:"enterprise",c:"Experience",t:"Sunset Station Casino",e:"\uD83C\uDFB0",d:"A locals casino with a great movie theater, bowling, and multiple restaurants. The food court has some legitimately good options. Cheap entertainment hub.",g:"Sunset Station Casino Las Vegas",tg:["Local","Entertainment","Cheap"]},
{id:884,a:"enterprise",c:"Outdoors",t:"McCullough Hills South Trail",e:"\u26F0\uFE0F",d:"Remote desert hiking south of Enterprise. Rocky terrain, bighorn sheep sightings are possible, and almost zero foot traffic. Bring everything you need.",g:"McCullough Hills South Henderson",tg:["Hiking","Adventure","Hidden","Free"]},
{id:885,a:"enterprise",c:"Food & Drink",t:"Krung Siam Thai",e:"\uD83C\uDF5B",d:"A tiny Thai restaurant that consistently makes best-of lists for Vegas. The boat noodles and the pad see ew are perfect. Strip mall exterior, extraordinary food inside.",g:"Krung Siam Thai Las Vegas",tg:["Local","Authentic","Cheap"]},
{id:886,a:"enterprise",c:"Experience",t:"Town Square Live Events",e:"\uD83C\uDFA4",d:"Free live music and seasonal events in the Town Square plaza. Holiday ice rink in winter, movie nights in summer. Check the calendar online.",g:"Town Square Live Events Las Vegas",tg:["Free","Family","Community"]},
{id:887,a:"enterprise",c:"Nature",t:"Exploration Peak Loop",e:"\uD83C\uDFDC\uFE0F",d:"A short loop trail around Exploration Peak Park with valley views and interpretive signs about the Mojave ecosystem. Easy, paved, and great for families.",g:"Exploration Peak Park Las Vegas",tg:["Free","Family","Nature"]},
{id:888,a:"enterprise",c:"Food & Drink",t:"Blue Ribbon Fried Chicken",e:"\uD83C\uDF57",d:"Fried chicken and craft cocktails at the South Point. The spicy honey chicken and the biscuits are the order. A hidden gem inside a locals casino.",g:"Blue Ribbon Fried Chicken Las Vegas",tg:["Local","Food"]},
{id:889,a:"mt-charleston",c:"Outdoors",t:"Robber's Roost Trail",e:"\uD83C\uDFDC\uFE0F",d:"A short 0.5 mile trail to a historic cave once used by bandits. Easy enough for kids, interesting enough for adults. One of the quickest hikes on the mountain.",g:"Robber's Roost Trail Las Vegas",tg:["Hiking","History","Family","Free"]},
{id:890,a:"mt-charleston",c:"Nature",t:"Deer Creek Road Scenic Drive",e:"\uD83E\uDD8C",d:"A dirt road off Kyle Canyon that winds through aspen groves and meadows. In fall, the colors are stunning. Drive slow, watch for wildlife. Free and uncrowded.",g:"Deer Creek Road Mt Charleston",tg:["Nature","Views","Free"]},
{id:891,a:"mt-charleston",c:"Experience",t:"Lee Canyon Mountain Biking",e:"\uD83D\uDEB5",d:"In summer, Lee Canyon opens its trails for mountain biking. Rentals available at the base lodge. Intermediate to advanced trails with alpine views.",g:"Lee Canyon Mountain Biking Las Vegas",tg:["Adventure","Sports"]},
{id:892,a:"mt-charleston",c:"Outdoors",t:"Trail Canyon Trail",e:"\uD83E\uDEB7",d:"A less-traveled trail on the south side of the mountain. Moderate difficulty, pine forests, and solitude. You might not see another person all day.",g:"Trail Canyon Mt Charleston",tg:["Hiking","Nature","Hidden","Free"]},
{id:893,a:"mt-charleston",c:"Nature",t:"Echo Canyon Overlook",e:"\uD83C\uDFD4\uFE0F",d:"A short walk to a viewpoint overlooking Echo Canyon and the Kyle Canyon road. Best at sunrise when the light hits the cliff faces.",g:"Echo Canyon Mt Charleston",tg:["Views","Sunrise","Free"]},
{id:894,a:"mt-charleston",c:"Food & Drink",t:"Mt Charleston Lodge Dining",e:"\uD83C\uDF56",d:"A log cabin restaurant with mountain views, comfort food, and a full bar. The elk burger and the chili are both solid. Fireplace seating in winter.",g:"Mt Charleston Lodge Dining Las Vegas",tg:["Dining","Nature"]},
{id:895,a:"mt-charleston",c:"Outdoors",t:"Acastus Trail",e:"\uD83C\uDF32",d:"A connector trail in the Kyle Canyon area. Links several major trailheads and passes through dense forest. Good for a longer day hike connecting multiple trails.",g:"Acastus Trail Mt Charleston",tg:["Hiking","Nature","Free"]},
{id:896,a:"mt-charleston",c:"Experience",t:"Stargazing at Hilltop Campground",e:"\u2B50",d:"One of the darkest accessible sky areas near Vegas. Drive up to Hilltop Campground and look up. The Milky Way is visible on clear nights. Free, no reservation needed for parking lot.",g:"Hilltop Campground Mt Charleston",tg:["Night","Nature","Free"]},
{id:897,a:"mt-charleston",c:"Nature",t:"Desert View Trail",e:"\uD83C\uDFDC\uFE0F",d:"A short trail at the Spring Mountains Visitor Gateway that gives views back toward the Las Vegas Valley. Easy, interpretive signs, and a great introduction to the mountain.",g:"Spring Mountains Visitor Gateway",tg:["Free","Family","Views"]},
{id:898,a:"mt-charleston",c:"Outdoors",t:"Griffith Peak Trail",e:"\u26F0\uFE0F",d:"A strenuous 11-mile round trip to the second highest peak in the Spring Mountains. Incredible views from the summit. Full day commitment, bring layers.",g:"Griffith Peak Trail Mt Charleston",tg:["Hiking","Adventure","Views"]},
{id:899,a:"the-strip",c:"Food & Drink",t:"Beer Park at Paris",e:"\uD83C\uDF7B",d:"A rooftop beer garden at Paris with 100+ craft beers and direct views of the Bellagio Fountains. Best seats in the house for the water show.",g:"Beer Park at Paris Las Vegas",tg:["Views","Nightlife","Food"]},
{id:900,a:"the-strip",c:"Experience",t:"Big Apple Coaster at NYNY",e:"\uD83C\uDFA2",d:"A roller coaster that wraps around the outside of New York New York at 67 mph with a 203-foot drop. Short ride, massive adrenaline.",g:"Big Apple Coaster at NYNY Las Vegas",tg:["Thrill","Fun"]},
{id:901,a:"the-strip",c:"Food & Drink",t:"Best Friend at Park MGM",e:"\uD83C\uDF5C",d:"Roy Choi's Korean-LA street food at Park MGM. Kogi tacos, the cheeseburger, and soju cocktails. The late-night menu is excellent.",g:"Best Friend at Park MGM Las Vegas",tg:["Local","Food","Late Night"]},
{id:902,a:"the-strip",c:"Experience",t:"SAHARA Las Vegas",e:"\uD83C\uDFB0",d:"The recently renovated classic Strip resort. The Bazaar Meat restaurant, the pool, and the retro-modern design make this one of the best revival stories on the Strip.",g:"SAHARA Las Vegas Las Vegas",tg:["Iconic","Entertainment"]},
{id:903,a:"the-strip",c:"Food & Drink",t:"Nacho Daddy Strip",e:"\uD83E\uDDC0",d:"Loaded nachos, scorpion shots, and a lively bar scene. The brunch nachos on weekends are massive. Multiple locations but the Strip one has the best energy.",g:"Nacho Daddy Strip Las Vegas",tg:["Food","Fun"]},
{id:904,a:"downtown",c:"Experience",t:"Container Park Treehouse",e:"\uD83C\uDF33",d:"A 55-foot tall treehouse inside Container Park with slides, climbing walls, and interactive play areas. Free to enter, built from recycled shipping containers.",g:"Container Park Treehouse Las Vegas",tg:["Family","Free","Unique"]},
{id:905,a:"downtown",c:"Food & Drink",t:"Eureka Casino Restaurant",e:"\uD83C\uDF7D\uFE0F",d:"A locals casino off-Strip with one of the best steakhouse deals in Vegas. The prime rib special is legendary. No tourists, just locals who know.",g:"Eureka Casino Henderson Nevada",tg:["Local","Cheap","Dining"]},
{id:906,a:"downtown",c:"Culture",t:"18b Arts District Walking Tour",e:"\uD83C\uDFA8",d:"A self-guided walking tour through the 18b Arts District. Galleries, murals, studios, and boutiques. Download the map from the LVAD website. Best on First Friday but good anytime.",g:"18b Arts District Walking Tour Las Vegas",tg:["Art","Free","Local"]},
{id:907,a:"downtown",c:"Food & Drink",t:"Lola's A Louisiana Kitchen",e:"\uD83E\uDD9E",d:"Cajun and Creole food that rivals anything in New Orleans. The jambalaya, the po'boys, and the beignets are all legit. Small spot, big flavors.",g:"Lola's A Louisiana Kitchen Las Vegas",tg:["Local","Authentic","Food"]},
{id:908,a:"henderson",c:"Experience",t:"Galleria at Sunset Mall",e:"\uD83D\uDED2",d:"The main mall in Henderson with local shops, restaurants, and seasonal events. Less hectic than the Strip malls and has a community feel.",g:"Galleria at Sunset Henderson",tg:["Shopping","Family"]},
{id:909,a:"henderson",c:"Outdoors",t:"Equestrian Park Henderson",e:"\uD83D\uDC34",d:"A 40-acre park with equestrian trails, walking paths, and open space. Watch riders practice or walk the perimeter trail. One of Henderson's quietest parks.",g:"Equestrian Park Henderson Nevada",tg:["Free","Nature","Unique"]},
{id:910,a:"henderson",c:"Food & Drink",t:"The Stove Henderson",e:"\uD83C\uDF73",d:"Creative brunch and breakfast in Henderson. The cinnamon roll pancakes and the fried chicken benedict are both ridiculous in the best way. Weekend waits are long, go early.",g:"The Stove Restaurant Henderson",tg:["Brunch","Local","Food"]},
{id:911,a:"summerlin",c:"Experience",t:"Wet n Wild / Cowabunga Canyon",e:"\uD83C\uDFCA",d:"A water park in Summerlin with slides, a lazy river, and a wave pool. Season passes are a great deal for locals. Opens in late April.",g:"Wet n Wild / Cowabunga Canyon Las Vegas",tg:["Family","Thrill","Seasonal"]},
{id:912,a:"summerlin",c:"Outdoors",t:"Mustang Trail",e:"\uD83E\uDEB7",d:"A connector trail in the Red Rock area linking several canyon hikes. Moderate difficulty with great rock formations and desert scenery throughout.",g:"Mustang Trail Red Rock Canyon",tg:["Hiking","Nature","Free"]},
{id:913,a:"summerlin",c:"Food & Drink",t:"Vintner Grill Summerlin",e:"\uD83C\uDF77",d:"A neighborhood American restaurant with a strong wine program and a patio. The short rib and the truffle fries are standouts. Reliable date night spot for Summerlin locals.",g:"Vintner Grill Summerlin Las Vegas",tg:["Local","Dining","Romantic"]},
{id:914,a:"enterprise",c:"Experience",t:"South Point Equestrian Center",e:"\uD83D\uDC34",d:"A world-class equestrian and events center that hosts rodeos, horse shows, and community events. Free admission to most events. Check the schedule online.",g:"South Point Equestrian Center Las Vegas",tg:["Free","Unique","Family"]},
{id:915,a:"enterprise",c:"Food & Drink",t:"Market Grille at South Point",e:"\uD83E\uDD69",d:"A 24-hour restaurant at South Point with legit steaks at locals prices. The New York strip and the prime rib are both excellent. Old school casino dining done right.",g:"Market Grille at South Point Las Vegas",tg:["Local","Cheap","Dining"]},
{id:916,a:"enterprise",c:"Outdoors",t:"Lone Mountain South Access",e:"\u26F0\uFE0F",d:"A less-used trail access to Lone Mountain from the Enterprise side. Steeper but shorter, and you avoid the Summerlin crowds entirely.",g:"Lone Mountain Las Vegas",tg:["Hiking","Hidden","Free"]},
{id:917,a:"centennial",c:"Food & Drink",t:"Craft Kitchen & Bar",e:"\uD83C\uDF54",d:"A local gastropub in the Centennial area with craft cocktails and elevated bar food. The smash burger and the elote are standouts.",g:"Craft Kitchen & Bar Las Vegas",tg:["Local","Food","Dining"]},
{id:918,a:"centennial",c:"Experience",t:"Centennial Center Park",e:"\uD83C\uDFDE\uFE0F",d:"A large community park with walking trails, playgrounds, sports courts, and a dog park. The amphitheater hosts free community events throughout the year.",g:"Centennial Center Park Las Vegas",tg:["Free","Family","Community"]},
{id:919,a:"mt-charleston",c:"Outdoors",t:"Bonanza Trail",e:"\uD83C\uDF32",d:"A moderate trail through bristlecone pine forest connecting Lee Canyon to the ridge. Less crowded than the main trails and full of old-growth trees.",g:"Bonanza Trail Mt Charleston",tg:["Hiking","Nature","Hidden","Free"]},
{id:920,a:"mt-charleston",c:"Experience",t:"Snow Play at Lee Canyon",e:"\u2744\uFE0F",d:"In winter, Lee Canyon offers snow tubing, snowshoeing, and cross-country skiing in addition to regular skiing. The tubing hill is great for families.",g:"Snow Play at Lee Canyon Las Vegas",tg:["Family","Seasonal","Adventure"]},
{id:921,a:"north-lv",c:"Experience",t:"Craig Ranch Golf Course",e:"\u26F3",d:"A public golf course in North Las Vegas with affordable rates and a well-maintained layout. Twilight rates are a steal. One of the best values in the valley.",g:"Craig Ranch Golf Course North Las Vegas",tg:["Sports","Local","Cheap"]},
{id:922,a:"north-lv",c:"Food & Drink",t:"Cielito Lindo Mexican NLV",e:"\uD83C\uDF2E",d:"A family-run Mexican restaurant with handmade tortillas and mole that takes two days to prepare. The enchiladas and the pozole are both excellent.",g:"Cielito Lindo Mexican North Las Vegas",tg:["Local","Authentic","Family"]},
{id:923,a:"the-strip",c:"Experience",t:"Wynn Plaza Shops",e:"\uD83D\uDED2",d:"Luxury shopping at the Wynn with art installations between stores. Free to walk through and the architecture is stunning even if you do not buy anything.",g:"Wynn Plaza Shops Las Vegas",tg:["Free","Art","Shopping"]},
{id:924,a:"the-strip",c:"Food & Drink",t:"Barry's Downtown Prime",e:"\uD83E\uDD69",d:"A modern steakhouse inside Circa downtown with views of the Fremont Street Experience. The tomahawk and the tableside Caesar are the signatures.",g:"Barry's Downtown Prime Las Vegas",tg:["Dining","Fine Dining"]},
{id:925,a:"downtown",c:"Experience",t:"Plaza Hotel Pool Deck",e:"\uD83C\uDFCA",d:"A retro pool on top of the Plaza Hotel with views of Fremont Street. Day passes available for non-guests. DJ sets on weekends.",g:"Plaza Hotel Pool Las Vegas",tg:["Fun","Views"]},
{id:926,a:"henderson",c:"Food & Drink",t:"Craft Haus Brewery",e:"\uD83C\uDF7A",d:"A Henderson craft brewery with rotating taps and a food truck outside most weekends. The session IPA and the amber are both solid. Small batch, local focus.",g:"Craft Haus Brewery Las Vegas",tg:["Local","Food"]},
{id:927,a:"summerlin",c:"Nature",t:"Ash Meadows NWR Day Trip",e:"\uD83C\uDF3F",d:"A 90-minute drive from Summerlin to one of the most biodiverse spots in Nevada. Crystal clear springs, rare pupfish, and boardwalk trails through desert wetlands.",g:"Ash Meadows NWR Day Trip Las Vegas",tg:["Nature","Adventure","Unique"]},
{id:928,a:"enterprise",c:"Experience",t:"Las Vegas Ballpark",e:"\u26BE",d:"Home of the Las Vegas Aviators minor league baseball team. Cheap tickets, great food, and a fun atmosphere with Strip views from the outfield. Games run April through September.",g:"Las Vegas Ballpark Las Vegas",tg:["Sports","Family","Local"]},
{id:929,a:"the-strip",c:"Food & Drink",t:"Momofuku at The Cosmo",e:"\uD83C\uDF5C",d:"David Chang's Vegas outpost with fried chicken, ramen, and bo ssam. The large format dishes are meant for sharing. One of the best restaurants on the Strip that flies under the radar.",g:"Momofuku at The Cosmo Las Vegas",tg:["Dining","Food"]},
{id:930,a:"north-lv",c:"Experience",t:"Las Vegas Lights FC",e:"\u26BD",d:"A USL Championship soccer team that plays at Cashman Field downtown. The atmosphere is electric, tickets are cheap, and the fan culture is growing fast.",g:"Las Vegas Lights FC Las Vegas",tg:["Sports","Family","Local"]},
{id:931,a:"the-strip",c:"Experience",t:"Bellagio Poker Room",e:"\uD83C\uDCCF",d:"One of the most famous poker rooms in the world. Even if you do not play, walk through and watch the high stakes tables. The energy is intense.",g:"Bellagio Poker Room Las Vegas",tg:["Iconic","Entertainment"]},
{id:932,a:"the-strip",c:"Food & Drink",t:"China Poblano at Cosmo",e:"\uD83C\uDF2E",d:"Jose Andres blends Chinese and Mexican food in ways that should not work but absolutely do. The dan dan noodles and the tacos are both essential.",g:"China Poblano at Cosmo Las Vegas",tg:["Dining","Unique"]},
{id:933,a:"downtown",c:"Food & Drink",t:"The Kitchen at Atomic",e:"\uD83C\uDF54",d:"The kitchen side of Atomic Liquors serving elevated bar food. The smash burger and the loaded tots are both excellent. Pairs perfectly with a craft cocktail next door.",g:"The Kitchen at Atomic Las Vegas",tg:["Local","Food","Nightlife"]},
{id:934,a:"downtown",c:"Experience",t:"Emergency Arts",e:"\uD83C\uDFA8",d:"A creative space in a former medical clinic downtown. Art studios, vintage shops, a barber, and a coffee shop. The weird, wonderful heart of the Arts District.",g:"Emergency Arts Las Vegas",tg:["Art","Local","Unique","Free"]},
{id:935,a:"summerlin",c:"Experience",t:"Springs Preserve Butterfly Habitat",e:"\uD83E\uDD8B",d:"A seasonal butterfly habitat at Springs Preserve where hundreds of butterflies land on you. Open spring through fall. Magical for kids and adults.",g:"Springs Preserve Butterfly Habitat Las Vegas",tg:["Family","Nature","Seasonal"]},
{id:936,a:"summerlin",c:"Food & Drink",t:"Skinny Fats Summerlin",e:"\uD83C\uDF54",d:"Choose your adventure: the Happy side is healthy bowls and wraps, the Fat side is burgers and fries. Everything is good on both menus.",g:"Skinny Fats Summerlin Las Vegas",tg:["Local","Food","Cheap"]},
{id:937,a:"henderson",c:"Outdoors",t:"Wetlands Park Nature Center",e:"\uD83C\uDF3F",d:"Start at the Nature Center for maps and trail recommendations. The exhibits explain the desert wetland ecosystem. Then hit the trails. Free admission.",g:"Wetlands Park Nature Center Las Vegas",tg:["Free","Family","Nature"]},
{id:938,a:"henderson",c:"Experience",t:"Henderson Farmers Market",e:"\uD83E\uDD55",d:"A Thursday morning farmers market at the Water Street District with local produce, baked goods, and artisan vendors. Small but high quality.",g:"Henderson Farmers Market Las Vegas",tg:["Free","Local","Community"]},
{id:939,a:"north-lv",c:"Outdoors",t:"Corn Creek Springs Walk",e:"\uD83C\uDF3F",d:"A short boardwalk trail through a desert oasis at the entrance to the Desert National Wildlife Refuge. Cottonwood trees, birds, and natural springs. Surreal in the desert.",g:"Corn Creek Springs Walk Las Vegas",tg:["Nature","Free","Hidden"]},
{id:940,a:"north-lv",c:"Experience",t:"SkyZone NLV",e:"\uD83E\uDD38",d:"Indoor trampoline park with dodgeball, foam pits, and ninja courses. Great for burning energy on hot days. Weekday mornings are least crowded.",g:"SkyZone NLV Las Vegas",tg:["Family","Fun"]},
