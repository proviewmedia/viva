<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Explore | SEVN</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300..700&family=Fraunces:opsz,wght@9..144,600..800&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="apple-touch-icon" sizes="180x180" href="favicon-180.png">
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    :root{
      --bg:#f2f0eb;--surface:#fff;--alt:#eae8e3;--dark:#1c1b1f;
      --accent:#e84b2b;--accent-s:#fef0ed;
      --like:#1db76a;
      --t1:#1c1b1f;--t2:#6b6a6f;--t3:#9d9ca0;
      --brd:rgba(0,0,0,.06);
      --r:20px;--rs:14px;--rx:10px;
      --fd:'Fraunces',Georgia,serif;--fb:'DM Sans',system-ui,sans-serif;
      --spring:cubic-bezier(.175,.885,.32,1.275);--ease:cubic-bezier(.25,.46,.45,.94)
    }
    body{font-family:var(--fb);background:var(--bg);color:var(--t1);min-height:100dvh;-webkit-font-smoothing:antialiased}

    /* ═══ HEADER ═══ */
    .hdr{position:sticky;top:0;z-index:50;background:var(--bg);padding:14px 20px 12px;max-width:480px;margin:0 auto}
    @media(min-width:768px){.hdr,.main{max-width:680px}}
    .hdr-row{display:flex;align-items:center;justify-content:space-between}
    .back{display:flex;align-items:center;gap:6px;font-size:.78rem;font-weight:600;color:var(--t2);text-decoration:none;border:none;background:none;cursor:pointer;font-family:var(--fb)}
    .back svg{width:18px;height:18px}
    .hdr-title{font-family:var(--fd);font-size:1.1rem;font-weight:800;letter-spacing:-.02em}

    /* ═══ FILTERS ═══ */
    .filters{padding:0 20px;max-width:480px;margin:0 auto}
    @media(min-width:768px){.filters{max-width:680px}}

    .filter-bar{display:flex;align-items:center;gap:8px;padding:0 20px 8px;max-width:480px;margin:0 auto;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
    .filter-bar::-webkit-scrollbar{display:none}
    @media(min-width:768px){.filter-bar{max-width:680px}}
    .filter-btn{display:flex;align-items:center;gap:5px;padding:8px 14px;background:var(--surface);border:1.5px solid var(--brd);border-radius:99px;font-family:var(--fb);font-size:.74rem;font-weight:600;color:var(--t2);cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .15s ease}
    .filter-btn:active{transform:scale(.97)}
    .filter-btn svg{width:12px;height:12px;color:var(--t3)}
    .filter-btn.has-sel{border-color:var(--dark);background:var(--dark);color:#fff}
    .filter-btn.has-sel svg{color:rgba(255,255,255,.6)}
    .filter-cnt{font-size:.62rem;background:rgba(255,255,255,.25);padding:1px 6px;border-radius:99px;font-weight:700}
    .clear-btn{display:none;align-items:center;gap:4px;padding:8px 12px;background:none;border:1.5px solid var(--brd);border-radius:99px;font-family:var(--fb);font-size:.72rem;font-weight:600;color:var(--t3);cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .15s ease}
    .clear-btn.show{display:flex}
    .clear-btn:active{transform:scale(.97)}
    .filter-section{position:relative}
    .fdrop{display:none;position:fixed;left:50%;transform:translateX(-50%);width:calc(100% - 40px);max-width:440px;max-height:280px;overflow-y:auto;background:var(--surface);border-radius:var(--rs);box-shadow:0 8px 30px rgba(0,0,0,.14);z-index:60;padding:6px}
    @media(min-width:768px){.fdrop{max-width:640px}}
    .fdrop.open{display:block}
    .fdrop-opt{padding:11px 14px;border-radius:var(--rx);font-size:.8rem;font-weight:500;color:var(--t1);cursor:pointer;display:flex;align-items:center;justify-content:space-between;transition:background .1s ease}
    .fdrop-opt:active{background:var(--alt)}
    .fdrop-opt.sel{font-weight:700;color:var(--accent)}
    .fdrop-opt .fo-ck{font-size:.7rem;color:var(--accent);opacity:0}
    .fdrop-opt.sel .fo-ck{opacity:1}
    .filter-back{display:none;position:fixed;inset:0;z-index:55}
    .filter-back.open{display:block}
    .chip-row{display:none}
    .chip{padding:7px 14px;border-radius:99px;border:1.5px solid var(--brd);background:var(--surface);font-family:var(--fb);font-size:.74rem;font-weight:600;color:var(--t2);cursor:pointer;transition:all .15s ease}
    .chip:active{transform:scale(.96)}
    .chip.on{background:var(--dark);color:#fff;border-color:var(--dark)}
    .chip.accent{background:var(--accent);color:#fff;border-color:var(--accent)}

    .result-count{font-size:.74rem;color:var(--t3);font-weight:500;padding:4px 0 12px}

    /* ═══ MAIN ═══ */
    .main{max-width:480px;margin:0 auto;padding:0 20px 80px}

    /* ═══ RESULTS GRID ═══ */
    .grid{display:flex;flex-direction:column;gap:8px}
    .gcard{display:flex;align-items:center;gap:14px;background:var(--surface);border-radius:var(--rs);padding:14px 16px;cursor:pointer;transition:transform .12s ease;border:1px solid var(--brd)}
    .gcard:active{transform:scale(.985)}
    .gc-emoji{font-size:2rem;width:50px;height:50px;display:flex;align-items:center;justify-content:center;border-radius:var(--rx);flex-shrink:0;position:relative;overflow:hidden}
    .gc-emoji::before{content:'';position:absolute;inset:0;border-radius:var(--rx);opacity:.18}
    .gc-emoji[data-c="Food & Drink"]::before{background:#fde4c0}
    .gc-emoji[data-c="Outdoors"]::before{background:#c8e6c9}
    .gc-emoji[data-c="Experience"]::before{background:#c5cae9}
    .gc-emoji[data-c="Culture"]::before{background:#f8bbd0}
    .gc-emoji[data-c="Nature"]::before{background:#b2dfdb}
    .gc-emoji[data-c="Views"]::before{background:#fde4c0}
    .gc-emoji[data-c="Nightlife"]::before{background:#d1c4e9}
    .gc-info{flex:1;min-width:0;display:flex;flex-direction:column;gap:2px}
    .gc-title{font-size:.84rem;font-weight:700;line-height:1.3}
    .gc-cat{font-size:.62rem;font-weight:600;color:var(--accent);text-transform:uppercase;letter-spacing:.04em}
    .gc-area{font-size:.66rem;color:var(--t3);font-weight:500}
    .gc-heart{width:36px;height:36px;border:none;background:none;cursor:pointer;display:grid;place-items:center;flex-shrink:0;color:var(--t3);transition:all .2s var(--spring)}
    .gc-heart svg{width:20px;height:20px}
    .gc-heart.saved{color:var(--accent)}
    .gc-heart.saved svg{fill:var(--accent)}
    .gc-heart:active{transform:scale(1.25)}

    .empty-state{display:flex;flex-direction:column;align-items:center;text-align:center;padding:48px 20px;gap:8px}
    .empty-state .es-emoji{font-size:2rem}
    .empty-state p{font-size:.84rem;color:var(--t2);line-height:1.5}

    /* ═══ DETAIL MODAL ═══ */
    .dmod{position:fixed;inset:0;z-index:200;display:flex;align-items:flex-end;justify-content:center;pointer-events:none;visibility:hidden;padding:12px}
    .dmod.open{pointer-events:auto;visibility:visible}
    .dbg{position:absolute;inset:0;background:rgba(0,0,0,.4);opacity:0;transition:opacity .3s ease}
    .dmod.open .dbg{opacity:1}
    .dsheet{position:relative;width:100%;max-width:480px;max-height:85dvh;background:var(--surface);border-radius:var(--r) var(--r) 0 0;overflow-y:auto;transform:translateY(100%);opacity:0;transition:all .35s var(--ease);overscroll-behavior:contain}
    .dmod.open .dsheet{transform:translateY(0);opacity:1}
    .dx{position:absolute;top:12px;right:12px;width:34px;height:34px;border:none;background:var(--surface);color:var(--t1);border-radius:50%;cursor:pointer;display:grid;place-items:center;z-index:5}
    .dx svg{width:16px;height:16px}
    .demoji{height:180px;display:flex;align-items:center;justify-content:center;font-size:4.5rem;position:relative}
    .demoji::before{content:'';position:absolute;inset:0;opacity:.12}
    .dbody{padding:20px;display:flex;flex-direction:column;gap:12px}
    .dcat{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--accent)}
    .dtitle{font-family:var(--fd);font-size:1.5rem;font-weight:800;line-height:1.25;letter-spacing:-.02em}
    .ddesc{font-size:.85rem;color:var(--t2);line-height:1.65}
    .dtip{font-size:.8rem;color:var(--t1);line-height:1.6;background:var(--alt);padding:14px;border-radius:var(--rx)}
    .dtip strong{display:block;margin-bottom:4px;font-size:.7rem;text-transform:uppercase;letter-spacing:.04em;color:var(--t3)}
    .dseason{display:inline-flex;align-items:center;gap:4px;font-size:.72rem;color:var(--accent);background:var(--accent-s);padding:4px 10px;border-radius:99px;font-weight:600}
    .dtags{display:flex;flex-wrap:wrap;gap:5px}
    .dtag{font-size:.62rem;padding:3px 9px;border-radius:99px;background:var(--alt);color:var(--t2);font-weight:600}
    .dacts{display:flex;gap:10px;padding:16px 20px;border-top:1px solid var(--brd)}
    .dacts button{flex:1;padding:12px;border-radius:var(--rx);border:none;font-family:var(--fb);font-size:.82rem;font-weight:600;cursor:pointer}
    .dsave{background:var(--accent);color:#fff}
    .dsave.saved{background:var(--alt);color:var(--t2)}
  </style>
</head>
<body>

  <div class="hdr">
    <div class="hdr-row">
      <a href="index.html" class="back">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
        Home
      </a>
      <div class="hdr-title">Explore</div>
      <div style="width:50px"></div>
    </div>
  </div>

  <div class="filter-bar" id="filterBar">
    <button class="filter-btn" id="areaTrig" data-drop="areaDrop">Area <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg></button>
    <button class="filter-btn" id="catTrig" data-drop="catDrop">Type <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg></button>
    <button class="filter-btn" id="tagTrig" data-drop="tagDrop">Vibe <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg></button>
    <button class="clear-btn" id="clearAll">&#10005; Clear</button>
  </div>
  <div class="filter-section"><div class="fdrop" id="areaDrop"></div></div>
  <div class="filter-section"><div class="fdrop" id="catDrop"></div></div>
  <div class="filter-section"><div class="fdrop" id="tagDrop"></div></div>
  <div class="filter-back" id="filterBack"></div>

  <div class="main">
    <div class="result-count" id="resultCount"></div>
    <div class="grid" id="resultsGrid"></div>
    <div class="empty-state" id="emptyState" style="display:none">
      <div class="es-emoji">&#128064;</div>
      <p>No matches for those filters. Try loosening up your search.</p>
    </div>
  </div>

  <!-- DETAIL MODAL -->
  <div class="dmod" id="dMod">
    <div class="dbg" id="dBg"></div>
    <div class="dsheet">
      <button class="dx" id="dX"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
      <div class="demoji" id="dEmoji"></div>
      <div class="dbody">
        <div class="dcat" id="dCat"></div>
        <div class="dtitle" id="dTitle"></div>
        <div class="ddesc" id="dDesc"></div>
        <div class="dtip" id="dTip"></div>
        <div class="dseason" id="dSeason"></div>
        <div class="dtags" id="dTags"></div>
      </div>
      <div class="dacts">
        <button class="dsave" id="dSaveBtn">Save</button>
      </div>
    </div>
  </div>

<script>
const D=[
// THE STRIP (20)
{id:1,a:"the-strip",c:"Experience",t:"Bellagio Fountain Show",e:"\u26F2",d:"Over 1,200 nozzles shoot water up to 460 feet, choreographed to music from opera to pop. Runs every 15\u201330 min. Best at night from the sidewalk.",g:"Bellagio Hotel Las Vegas",tg:["Iconic","Romantic","Night"]},
{id:2,a:"the-strip",c:"Culture",t:"Bellagio Conservatory",e:"\uD83C\uDF3A",d:"A massive indoor botanical garden that transforms each season with intricate floral sculptures and living walls. Always free, always stunning.",g:"Bellagio Conservatory Las Vegas",tg:["Seasonal","Photography"]},
{id:3,a:"the-strip",c:"Culture",t:"AREA15 Free Art Walk",e:"\uD83C\uDFAD",d:"The free Level 0 pass unlocks Art Island Gallery, Origin Quest scavenger hunt, and a digital art tour through the largest gallery in Vegas.",g:"AREA15 Las Vegas",tg:["Art","Immersive"]},
{id:4,a:"the-strip",c:"Experience",t:"Flamingo Wildlife Habitat",e:"\uD83E\uDDA9",d:"Chilean flamingos, pelicans, koi ponds, and waterfalls in a tropical oasis. A peaceful escape right in the middle of the Strip.",g:"Flamingo Wildlife Habitat Las Vegas",tg:["Family","Nature"]},
{id:5,a:"the-strip",c:"Experience",t:"Welcome to Las Vegas Sign",e:"\uD83D\uDCF8",d:"The quintessential Vegas photo op at the south end of the Strip. Go early or at sunset to avoid the line. Free parking across the street.",g:"Welcome to Fabulous Las Vegas sign",tg:["Iconic","Photo Op"]},
{id:6,a:"the-strip",c:"Experience",t:"Wynn Lake of Dreams",e:"\uD83C\uDF0A",d:"A 40-foot waterfall with giant puppets, floating video orbs, and 5,500 LEDs over a 3-acre lake. Every 30 minutes after dusk. Free to watch.",g:"Wynn Las Vegas",tg:["Show","Night"]},
{id:7,a:"the-strip",c:"Culture",t:"Fontainebleau Art Walk",e:"\uD83D\uDDBC\uFE0F",d:"The newest Strip resort has art installations scattered everywhere. Take a self-guided stroll through luxury architecture and contemporary pieces.",g:"Fontainebleau Las Vegas",tg:["Art","Architecture"]},
{id:8,a:"the-strip",c:"Experience",t:"Miracle Mile Rainstorm",e:"\uD83C\uDF27\uFE0F",d:"Indoor thunder, lightning, fog, and rain inside Miracle Mile Shops at Planet Hollywood. Runs hourly. Surprisingly immersive and totally free.",g:"Miracle Mile Shops Las Vegas",tg:["Unique","Family"]},
{id:9,a:"the-strip",c:"Culture",t:"Atlantis Show at Caesars",e:"\uD83C\uDFDB\uFE0F",d:"Nine-foot animatronic statues battle with fire and water for the throne of Atlantis inside the Forum Shops. Free aquarium nearby too.",g:"Forum Shops Caesars Palace Las Vegas",tg:["Show","Family"]},
{id:10,a:"the-strip",c:"Experience",t:"Pinball Hall of Fame",e:"\uD83D\uDD79\uFE0F",d:"Over 200 vintage pinball machines from the 1950s to today. Free admission. Bring quarters to play. All proceeds go to charity.",g:"Pinball Hall of Fame Las Vegas",tg:["Retro","Fun"]},
{id:11,a:"the-strip",c:"Experience",t:"Circus Acts at Circus Circus",e:"\uD83C\uDFAA",d:"Free world-class circus performances daily. Trapeze, juggling, acrobats on the Midway stage. Old-school Vegas entertainment that still delivers.",g:"Circus Circus Las Vegas",tg:["Family","Classic"]},
{id:12,a:"the-strip",c:"Culture",t:"Shelby Heritage Center",e:"\uD83C\uDFCE\uFE0F",d:"The Shelby Cobra collection and racing memorabilia at Carroll Shelby HQ. Free guided tours available. A must for car enthusiasts.",g:"Shelby Heritage Center Las Vegas",tg:["Cars","History"]},
{id:13,a:"the-strip",c:"Experience",t:"Venetian Grand Canal",e:"\uD83D\uDEF6",d:"Walk along the indoor replica of Venice with painted sky ceilings, Italian architecture, and live performers. Gondola rides cost extra, walking is free.",g:"Venetian Resort Las Vegas",tg:["Romantic","Architecture"]},
{id:14,a:"the-strip",c:"Experience",t:"Seven Magic Mountains",e:"\uD83E\uDEA8",d:"Towering neon-painted boulder totems by Swiss artist Ugo Rondinone set against raw desert 20 min south. One of the best photo spots in Nevada.",g:"Seven Magic Mountains",tg:["Art","Photography"]},
{id:15,a:"the-strip",c:"Experience",t:"Walk the Strip at Night",e:"\uD83C\uDF03",d:"Four miles of sensory overload. Casino hop from Mandalay Bay to the Wynn, soak in the lights, people, and energy. The best free show in Vegas.",g:"Las Vegas Boulevard",tg:["Iconic","Nightlife"]},
{id:16,a:"the-strip",c:"Experience",t:"The Park Las Vegas",e:"\uD83C\uDF34",d:"Open-air district between NYNY and Park MGM with shade trees, public art, and the 40-foot Bliss Dance sculpture. Free to explore anytime.",g:"The Park Las Vegas",tg:["Art","Outdoor"]},
{id:17,a:"the-strip",c:"Experience",t:"BLVD Overlook",e:"\uD83C\uDFD9\uFE0F",d:"Free observation deck at the BLVD mall north of MGM Grand with seating and views overlooking the south end of the Strip.",g:"The BLVD Las Vegas",tg:["Views","Chill"]},
{id:18,a:"the-strip",c:"Culture",t:"Wynn Floral Lobby",e:"\uD83C\uDF37",d:"Thousands of fresh flowers arranged into seasonal sculptures in the Wynn lobby. Changes regularly, always gorgeous, always free to walk through.",g:"Wynn Las Vegas lobby",tg:["Photography","Seasonal"]},
{id:19,a:"the-strip",c:"Experience",t:"Cosmopolitan Art Walk",e:"\uD83D\uDDBC\uFE0F",d:"The Cosmo features a rotating collection of contemporary art installations throughout the resort. Grab a map at the front desk for the self-guided tour.",g:"Cosmopolitan Las Vegas",tg:["Art","Indoor"]},
{id:20,a:"the-strip",c:"Views",t:"Bellagio Bridge Sunset",e:"\uD83C\uDF05",d:"The pedestrian bridge between Bellagio and Caesars offers one of the best free vantage points for watching sunset paint the Strip gold.",g:"Bellagio Las Vegas pedestrian bridge",tg:["Sunset","Views"]},

// DOWNTOWN (20)
{id:101,a:"downtown",c:"Experience",t:"Fremont Viva Vision",e:"\u2728",d:"The world's largest LED canopy with 16.4 million pixels. Light shows run nightly on the hour from 6pm. Recently upgraded for $32 million.",g:"Fremont Street Experience Las Vegas",tg:["Iconic","Night"]},
{id:102,a:"downtown",c:"Nightlife",t:"Fremont Live Music",e:"\uD83C\uDFB8",d:"Three stages of free live music every night starting at 6pm. Local bands, touring acts, and the Downtown Rocks concert series.",g:"Fremont Street Experience stages",tg:["Music","Nightlife"]},
{id:103,a:"downtown",c:"Culture",t:"Arts District First Friday",e:"\uD83C\uDFA8",d:"A massive free monthly festival in the 18b Arts District. Galleries, street artists, food trucks, and live music on Main Street. First Friday of every month.",g:"18b Arts District Las Vegas",tg:["Art","Community"]},
{id:104,a:"downtown",c:"Experience",t:"Container Park",e:"\uD83D\uDCE6",d:"Open-air center built from recycled shipping containers. Boutiques, restaurants, treehouse playground, live music, and a fire-breathing Mantis at sundown.",g:"Downtown Container Park Las Vegas",tg:["Shopping","Unique"]},
{id:105,a:"downtown",c:"Culture",t:"Street Art Murals",e:"\uD83D\uDD8C\uFE0F",d:"Over 30 murals by internationally known artists. Look for the solar-powered mural on 7th Street and the retro Greetings from Las Vegas mural on Main.",g:"18b Arts District murals Las Vegas",tg:["Photography","Art"]},
{id:106,a:"downtown",c:"Culture",t:"The Arts Factory",e:"\uD83C\uDFED",d:"A multi-studio gallery complex functioning like a free contemporary art museum. Individual artists, galleries, and shops all under one roof.",g:"The Arts Factory Las Vegas",tg:["Art","Local"]},
{id:107,a:"downtown",c:"Experience",t:"Golden Nugget Hand of Faith",e:"\uD83E\uDE99",d:"One of the largest gold nuggets in the world at 61 pounds, displayed in the Golden Nugget lobby. Free to see, incredible to stand next to.",g:"Golden Nugget Las Vegas",tg:["History","Quick"]},
{id:108,a:"downtown",c:"Experience",t:"Binion's Million Dollar Photo",e:"\uD83D\uDCB5",d:"Stand behind a pyramid of one million real dollars and snap a free photo. A Binion's tradition since 1954. Open 24/7 for guests 21+.",g:"Binions Gambling Hall Las Vegas",tg:["Iconic","Photo Op"]},
{id:109,a:"downtown",c:"Experience",t:"The Mantis Fire Show",e:"\uD83D\uDD25",d:"At sundown a drum circle awakens the giant metal praying mantis at Container Park, which erupts in a mesmerizing fire-breathing display.",g:"Downtown Container Park Las Vegas mantis",tg:["Spectacle","Night"]},
{id:110,a:"downtown",c:"Culture",t:"Recycled Propaganda",e:"\uD83C\uDFAD",d:"A unique art studio in the Arts District known for satirical street art. The artist often debuts new works during First Friday events.",g:"Recycled Propaganda Las Vegas",tg:["Art","Provocative"]},
{id:111,a:"downtown",c:"Experience",t:"Circa Lobby and Sportsbook",e:"\uD83C\uDFDF\uFE0F",d:"Walk through Circa's lobby to see the world's largest sportsbook with a 78-million-pixel LED wall. The architecture alone is worth the visit.",g:"Circa Resort Las Vegas",tg:["Architecture","Sports"]},
{id:112,a:"downtown",c:"Culture",t:"Golden Gate Casino History",e:"\uD83C\uDFB0",d:"Opened in 1906, the oldest casino in Vegas. Vintage gaming ledgers, historic chip racks, and artifacts from the earliest days of Sin City.",g:"Golden Gate Hotel Casino Las Vegas",tg:["History","Classic"]},
{id:113,a:"downtown",c:"Experience",t:"Berlin Wall at Main Street Station",e:"\uD83E\uDDF1",d:"A genuine section of the Berlin Wall is on display inside Main Street Station. One of the weirdest and most unexpected hidden gems in Vegas.",g:"Main Street Station Las Vegas",tg:["History","Weird"]},
{id:114,a:"downtown",c:"Experience",t:"Free Downtown Loop Shuttle",e:"\uD83D\uDE8C",d:"A free shuttle connecting Fremont Street, the Arts District, and the Strat. The easiest way to hop between downtown neighborhoods with no car.",g:"Downtown Loop Las Vegas",tg:["Transportation","Convenient"]},
{id:115,a:"downtown",c:"Nightlife",t:"Dueling Pianos Show",e:"\uD83C\uDFB9",d:"An energetic crowd-driven piano show with two pianists battling over audience requests. Free to watch, hilarious, and a legitimately great time.",g:"New York New York Las Vegas dueling pianos",tg:["Live Music","Fun"]},
{id:116,a:"downtown",c:"Culture",t:"Art Square Complex",e:"\uD83C\uDFD8\uFE0F",d:"A cluster of galleries, shops, and a theater in the Arts District. Becomes a buzzing hub every First Friday. Great for finding new local talent.",g:"Art Square Las Vegas",tg:["Art","Local"]},
{id:117,a:"downtown",c:"Experience",t:"Neon Museum Photo Walk",e:"\uD83D\uDCA1",d:"Even without a ticket, the exterior Neon signs along Las Vegas Blvd near the museum are free to photograph. The outdoor North Gallery is visible 24/7.",g:"Neon Museum Las Vegas",tg:["Photography","History"]},
{id:118,a:"downtown",c:"Experience",t:"Fremont East People Watching",e:"\uD83D\uDC40",d:"Grab a seat at Whiskey Licker Up at Binion's overlooking Fremont and watch the parade of humanity. The best free entertainment in downtown.",g:"Binions Whiskey Licker Up Las Vegas",tg:["Nightlife","Chill"]},
{id:119,a:"downtown",c:"Experience",t:"El Cortez Historic Tour",e:"\uD83C\uDFE8",d:"Walk through El Cortez, listed on the National Register of Historic Places. Original Bugsy Siegel-era architecture still visible. Free to explore.",g:"El Cortez Las Vegas",tg:["History","Architecture"]},
{id:120,a:"downtown",c:"Culture",t:"Vegas Test Site History Walk",e:"\u2622\uFE0F",d:"Downtown casinos once marketed poolside views of nuclear tests 60 miles away. Informational plaques and exhibits at several Fremont properties are free.",g:"Fremont Street atomic history Las Vegas",tg:["History","Unique"]},

// SUMMERLIN (20)
{id:201,a:"summerlin",c:"Outdoors",t:"Red Rock Scenic Drive",e:"\uD83C\uDFDC\uFE0F",d:"A 13-mile one-way loop through towering red sandstone. Dozens of pullouts, trails, and photo spots. Best at sunrise or golden hour.",g:"Red Rock Canyon Scenic Drive Las Vegas",tg:["Nature","Photography"]},
{id:202,a:"summerlin",c:"Outdoors",t:"Calico Tanks Trail",e:"\uD83E\uDD7E",d:"A 2.5-mile trail ending with panoramic views of the Strip from deep in the desert. Scramble over rocks to reach the tank overlook. Moderate difficulty.",g:"Calico Tanks Trail Red Rock Canyon",tg:["Hiking","Views"]},
{id:203,a:"summerlin",c:"Outdoors",t:"Ice Box Canyon Hike",e:"\uD83E\uDDCA",d:"A shaded canyon at Red Rock that stays cool even in summer. The 2.6-mile out-and-back ends at a seasonal waterfall between towering walls.",g:"Ice Box Canyon Red Rock",tg:["Hiking","Hidden Gem"]},
{id:204,a:"summerlin",c:"Outdoors",t:"Keystone Thrust Trail",e:"\uD83E\uDEA8",d:"A 2.2-mile trail where you can see two tectonic plates collide. Gray limestone over red sandstone, 65 million years in the making.",g:"Keystone Thrust Trail Red Rock Canyon",tg:["Geology","Unique"]},
{id:205,a:"summerlin",c:"Outdoors",t:"Turtlehead Peak",e:"\uD83D\uDC22",d:"The most challenging hike at Red Rock. Steep 5-mile round trip to 6,323 feet with 360-degree valley views. Bring lots of water.",g:"Turtlehead Peak Red Rock Canyon",tg:["Challenge","Views"]},
{id:206,a:"summerlin",c:"Outdoors",t:"First Creek Canyon",e:"\uD83C\uDF3F",d:"An easy 3-mile round trip following a desert wash to a seasonal waterfall surrounded by cottonwood trees. Great for beginners and families.",g:"First Creek Canyon Red Rock",tg:["Easy","Nature"]},
{id:207,a:"summerlin",c:"Outdoors",t:"Kraft Mountain Loop",e:"\u26F0\uFE0F",d:"A 3.5-mile loop on the edge of Summerlin with sweeping views of Red Rock and the valley. Moderate difficulty. Amazing for sunset hikes.",g:"Kraft Mountain Trail Summerlin",tg:["Sunset","Free"]},
{id:208,a:"summerlin",c:"Outdoors",t:"Red Rock Bike Loop",e:"\uD83D\uDEB4",d:"Cycle the 13-mile scenic loop on bike-friendly roads with desert views the entire way. Rent bikes nearby or bring your own.",g:"Red Rock Canyon bike loop",tg:["Cycling","Active"]},
{id:209,a:"summerlin",c:"Outdoors",t:"Cottonwood Valley Trails",e:"\uD83C\uDF35",d:"A network of trails on Summerlin's southern edge connecting to Red Rock. Mountain biking, horseback riding, and running through open desert.",g:"Cottonwood Valley trailhead Las Vegas",tg:["Biking","Free"]},
{id:210,a:"summerlin",c:"Experience",t:"Summerlin Farmers Market",e:"\uD83E\uDD6C",d:"Every Saturday 9am\u20132pm at the Pavilion. Farm-fresh produce, baked goods, handcrafted items, and local vendors. Free to browse, year-round.",g:"Downtown Summerlin Farmers Market",tg:["Food","Community"]},
{id:211,a:"summerlin",c:"Experience",t:"Summerlin Sounds Concerts",e:"\uD83C\uDFB5",d:"Free live music on The Lawn at Downtown Summerlin on Wednesday evenings. Bring a blanket for sunset tunes backed by Red Rock Canyon views.",g:"Downtown Summerlin The Lawn",tg:["Music","Outdoor"]},
{id:212,a:"summerlin",c:"Experience",t:"Free Yoga on The Lawn",e:"\uD83E\uDDD8",d:"Free fitness classes at Downtown Summerlin on Tuesday evenings. Yoga, barre, and HIIT with views of Red Rock at sunset. All levels.",g:"Downtown Summerlin fitness lawn",tg:["Fitness","Outdoor"]},
{id:213,a:"summerlin",c:"Experience",t:"Movies Under the Stars",e:"\uD83C\uDFAC",d:"Free outdoor movies at The Trails Park on Saturday evenings in summer. Bring blankets, lawn chairs, and snacks for a neighborhood hangout.",g:"Trails Park Summerlin",tg:["Family","Seasonal"]},
{id:214,a:"summerlin",c:"Culture",t:"Summerlin Library Arts Center",e:"\uD83D\uDCDA",d:"Hosts ballet, musicals, art shows, and concerts. More performing arts center than library. A cultural gem for the west side of the valley.",g:"Summerlin Library Performing Arts Center",tg:["Culture","Family"]},
{id:215,a:"summerlin",c:"Views",t:"Red Rock Overlook",e:"\uD83C\uDF04",d:"The first major pullout on the scenic drive has a large observation area with 180-degree views of the canyon and city. Free with park entry.",g:"Red Rock Canyon overlook",tg:["Views","Photography"]},
{id:216,a:"summerlin",c:"Experience",t:"Browse Downtown Summerlin",e:"\uD83D\uDECD\uFE0F",d:"An upscale open-air center with 125+ stores and 30+ restaurants. Great people watching, window shopping, and outdoor dining year-round.",g:"Downtown Summerlin",tg:["Shopping","Food"]},
{id:217,a:"summerlin",c:"Outdoors",t:"Late Night Trailhead Stargazing",e:"\u2B50",d:"Red Rock pullouts after dark offer some of the best stargazing near the city. Low light pollution and wide desert sky. Bring a blanket.",g:"Red Rock Canyon night sky",tg:["Night","Nature"]},
{id:218,a:"summerlin",c:"Outdoors",t:"Sandstone Quarry Loop",e:"\uD83E\uDEA8",d:"A flat, easy 2-mile loop through old sandstone quarries with unique rock formations and desert flora. Great for kids and casual walkers.",g:"Sandstone Quarry Red Rock Canyon",tg:["Easy","Family"]},
{id:219,a:"summerlin",c:"Nature",t:"Desert Tortoise Habitat",e:"\uD83D\uDC22",d:"Spring is the best time to spot desert tortoises along Red Rock trails. They emerge from burrows in April and May. Keep your distance.",g:"Red Rock Canyon desert tortoise",tg:["Wildlife","Seasonal"]},
{id:220,a:"summerlin",c:"Views",t:"Calico Hills Scramble",e:"\uD83E\uDDD7",d:"Scramble up the red Calico Hills for close-up views of layered sandstone and panoramic city vistas. No official trail, just explore the rocks.",g:"Calico Hills Red Rock Canyon",tg:["Adventure","Views"]},

// HENDERSON (20)
{id:301,a:"henderson",c:"Outdoors",t:"Valley of Fire Day Trip",e:"\uD83D\uDD25",d:"Ancient red sandstone formations create an alien landscape one hour away. Fire Wave trail is the crown jewel. Petroglyphs, arches, and endless photo ops.",g:"Valley of Fire State Park Nevada",tg:["Road Trip","Photography"]},
{id:302,a:"henderson",c:"Nature",t:"Ethel M Cactus Garden",e:"\uD83C\uDF35",d:"A stunning botanical cactus garden with over 300 species. Free self-guided tour of the chocolate factory too. Free chocolate samples at the end.",g:"Ethel M Chocolates Henderson",tg:["Family","Gardens"]},
{id:303,a:"henderson",c:"Nature",t:"Henderson Bird Preserve",e:"\uD83E\uDD86",d:"140 acres with nine ponds and over 270 bird species. Paved paths, peaceful vibes, and the third largest body of water in Southern Nevada.",g:"Henderson Bird Viewing Preserve",tg:["Birdwatching","Free"]},
{id:304,a:"henderson",c:"Outdoors",t:"River Mountains Loop Trail",e:"\uD83D\uDEB4",d:"A 34-mile paved trail connecting Henderson to Lake Mead, Hoover Dam, and Boulder City. Bike or walk sections with stunning desert and lake views.",g:"River Mountains Loop Trail Henderson",tg:["Biking","Scenic"]},
{id:305,a:"henderson",c:"Outdoors",t:"Sloan Canyon Petroglyphs",e:"\uD83E\uDEA8",d:"Over 300 rock art panels, some 10,000+ years old, in a dramatic canyon. Challenging hike but incredibly rewarding. A walk through deep history.",g:"Sloan Canyon petroglyphs Henderson",tg:["History","Hiking"]},
{id:306,a:"henderson",c:"Experience",t:"Lake Las Vegas Village",e:"\uD83C\uDFD6\uFE0F",d:"Italian-style village on the shores of a man-made lake. Free to stroll with waterfront restaurants, shops, and seasonal events like yoga and concerts.",g:"Lake Las Vegas Henderson",tg:["Scenic","Relaxing"]},
{id:307,a:"henderson",c:"Nature",t:"Cornerstone Park",e:"\uD83C\uDFDE\uFE0F",d:"A 31-acre lake in a former gravel mine turned gorgeous park. Trails, picnic areas, courts, wildlife, and stunning mountain views.",g:"Cornerstone Park Henderson",tg:["Park","Family"]},
{id:308,a:"henderson",c:"Outdoors",t:"Black Mountain Summit",e:"\u26F0\uFE0F",d:"Hike to panoramic views of the entire Las Vegas Valley from the mountaintop. Challenging but worth every step of elevation.",g:"Black Mountain trailhead Henderson",tg:["Hiking","Views"]},
{id:309,a:"henderson",c:"Nature",t:"Whitney Mesa Preserve",e:"\uD83C\uDF04",d:"A one-mile trail along a stream to a mesa with breathtaking sunrise and sunset views. Picnic areas and restrooms. Peaceful and uncrowded.",g:"Whitney Mesa Nature Preserve Henderson",tg:["Sunset","Nature"]},
{id:310,a:"henderson",c:"Experience",t:"Hoover Dam Walk",e:"\uD83C\uDFD7\uFE0F",d:"Drive across the dam for free and walk along the top with views of Lake Mead and the Colorado River. Visitor center is extra but the dam is free.",g:"Hoover Dam Nevada",tg:["Iconic","History"]},
{id:311,a:"henderson",c:"Outdoors",t:"Lake Mead Trails",e:"\uD83D\uDEF6",d:"Explore trails, hidden coves, and desert scenery around the largest reservoir in the US. Just 30 minutes from Henderson.",g:"Lake Mead National Recreation Area",tg:["Nature","Adventure"]},
{id:312,a:"henderson",c:"Outdoors",t:"Amargosa Trail",e:"\uD83D\uDEE4\uFE0F",d:"A paved 10-mile multi-use trail through Henderson with interpretive signs, shade structures, and connections to parks. Walk, run, or bike.",g:"Amargosa Trail Henderson",tg:["Trail","Easy"]},
{id:313,a:"henderson",c:"Nature",t:"Wetlands Park",e:"\uD83C\uDF3E",d:"Over 200 acres of trails through wetland habitats along the Las Vegas Wash. Boardwalks, wildlife platforms, and a nature center.",g:"Clark County Wetlands Park Las Vegas",tg:["Nature","Walking"]},
{id:314,a:"henderson",c:"Experience",t:"Shan-Gri-La Prehistoric Park",e:"\uD83E\uDD95",d:"Life-sized dinosaur sculptures in a small park in the Cadence community. Kids love climbing on them. Quirky, totally free, and fun.",g:"Shan-Gri-La Prehistoric Park Henderson",tg:["Family","Quirky"]},
{id:315,a:"henderson",c:"Nature",t:"Acacia Demonstration Gardens",e:"\uD83C\uDF38",d:"A beautifully maintained garden showcasing water-wise plants and desert landscaping. Peaceful walking paths through native desert species.",g:"Acacia Demonstration Gardens Henderson",tg:["Gardens","Relaxing"]},
{id:316,a:"henderson",c:"Experience",t:"District at Green Valley Ranch",e:"\uD83D\uDECD\uFE0F",d:"Outdoor shopping and dining hub with seasonal events, live music, and a relaxed neighborhood vibe. Free to stroll and great for people watching.",g:"The District Green Valley Ranch Henderson",tg:["Shopping","Dining"]},
{id:317,a:"henderson",c:"Views",t:"McCullough Hills Trail",e:"\uD83E\uDDED",d:"Family-friendly trails through Henderson foothills with interpretive signs, bike paths, and wide desert views. Easy to moderate difficulty.",g:"McCullough Hills trailhead Henderson",tg:["Hiking","Family"]},
{id:318,a:"henderson",c:"Nature",t:"Hidden Falls Park",e:"\uD83D\uDCA7",d:"A neighborhood park with a small waterfall feature, walking paths, playground, and green space. A locals-only find in a quiet neighborhood.",g:"Hidden Falls Park Henderson",tg:["Park","Hidden Gem"]},
{id:319,a:"henderson",c:"Views",t:"Lake Las Vegas Sunset Walk",e:"\uD83C\uDF05",d:"Walk the lakefront path at golden hour for desert-meets-water views. The Italian village and Reflection Bay provide a surprisingly European backdrop.",g:"Lake Las Vegas walking path Henderson",tg:["Sunset","Scenic"]},
{id:320,a:"henderson",c:"Outdoors",t:"Bootleg Canyon Trails",e:"\uD83D\uDEB5",d:"A world-class mountain biking and hiking trail system in Boulder City, just south of Henderson. Free access, stunning views, and flowy singletrack.",g:"Bootleg Canyon Boulder City",tg:["Biking","Adventure"]},

// NORTH LAS VEGAS (15)
{id:401,a:"north-lv",c:"Outdoors",t:"Floyd Lamb Park at Tule Springs",e:"\uD83C\uDF33",d:"A 680-acre park with ponds, mature trees, peacocks, and walking trails. One of the most peaceful green spaces in the valley. Free to walk in.",g:"Floyd Lamb Park Tule Springs Las Vegas",tg:["Park","Nature"]},
{id:402,a:"north-lv",c:"Outdoors",t:"Tule Springs Fossil Beds",e:"\uD83E\uDD9B",d:"A national monument preserving Ice Age fossils. Walk the desert landscape where mammoths and giant sloths once roamed. Free, no entrance fee.",g:"Tule Springs Fossil Beds National Monument",tg:["History","Nature"]},
{id:403,a:"north-lv",c:"Outdoors",t:"Upper Las Vegas Wash Trail",e:"\uD83D\uDEE4\uFE0F",d:"A paved multi-use path along the historic wash with interpretive signs about the Mojave ecosystem. Easy walking and biking. Free access.",g:"Upper Las Vegas Wash Trail",tg:["Trail","Easy"]},
{id:404,a:"north-lv",c:"Nature",t:"Craig Ranch Regional Park",e:"\uD83C\uDFDE\uFE0F",d:"A massive regional park with a skate park, splash pad, sports fields, walking trails, and a 4-acre dog park. Free and family-friendly.",g:"Craig Ranch Regional Park N. Las Vegas",tg:["Park","Family"]},
{id:405,a:"north-lv",c:"Experience",t:"Aliante Nature Discovery Park",e:"\uD83E\uDD86",d:"A nature-themed park in Aliante with desert gardens, interpretive trails, a pond, and bird watching areas. Peaceful escape from city streets.",g:"Aliante Nature Discovery Park N. Las Vegas",tg:["Nature","Free"]},
{id:406,a:"north-lv",c:"Outdoors",t:"N. Las Vegas Desert Trails",e:"\uD83C\uDFDC\uFE0F",d:"Open desert BLM land north of the city offers miles of unofficial trails for hiking and mountain biking with unobstructed mountain views.",g:"North Las Vegas desert trails BLM",tg:["Hiking","Desert"]},
{id:407,a:"north-lv",c:"Views",t:"Sunrise from Nellis Dunes Overlook",e:"\uD83C\uDF05",d:"Drive to the edge of Nellis Dunes at dawn for unobstructed sunrise views over the desert. The sand dunes glow orange in morning light.",g:"Nellis Sand Dunes Las Vegas",tg:["Sunrise","Photography"]},
{id:408,a:"north-lv",c:"Nature",t:"Eglington Preserve Walk",e:"\uD83C\uDF3F",d:"A small but serene green space with walking paths, native plants, and a chance to spot local wildlife. Free entry, rarely crowded.",g:"Eglington Preserve N. Las Vegas",tg:["Nature","Quiet"]},
{id:409,a:"north-lv",c:"Experience",t:"Veterans Memorial Park",e:"\uD83C\uDF96\uFE0F",d:"A well-maintained community park honoring veterans with memorials, walking paths, green lawns, and picnic areas. A reflective and peaceful spot.",g:"Veterans Memorial Park N. Las Vegas",tg:["Memorial","Park"]},
{id:410,a:"north-lv",c:"Outdoors",t:"Apex Trail Area",e:"\uD83E\uDDED",d:"Rugged desert terrain northeast of the city with unofficial trails through volcanic rock formations. Great for exploring off the beaten path.",g:"Apex Nevada trails",tg:["Adventure","Desert"]},
{id:411,a:"north-lv",c:"Views",t:"Sheep Range Viewpoint",e:"\uD83D\uDC11",d:"Drive north toward the Sheep Range for stunning views of the Desert National Wildlife Refuge. The road itself is the attraction. Free.",g:"Desert National Wildlife Refuge Las Vegas",tg:["Scenic Drive","Wildlife"]},
{id:412,a:"north-lv",c:"Nature",t:"Kiel Ranch Historic Park",e:"\uD83C\uDFE1",d:"A small historic park preserving some of the oldest structures in the valley. Walking paths through ranch remnants and cottonwood trees.",g:"Kiel Ranch Historic Park N. Las Vegas",tg:["History","Park"]},
{id:413,a:"north-lv",c:"Experience",t:"Aliante Casino Waterfall",e:"\uD83D\uDCA7",d:"The Aliante Casino lobby features an impressive indoor waterfall and desert art collection. Free to walk through and admire.",g:"Aliante Casino Hotel N. Las Vegas",tg:["Indoor","Free"]},
{id:414,a:"north-lv",c:"Outdoors",t:"Corn Creek Visitor Station",e:"\uD83C\uDF3E",d:"A desert oasis at the entrance to the Desert National Wildlife Refuge. Short trails through mesquite trees and natural springs. Free admission.",g:"Corn Creek Visitor Station Las Vegas",tg:["Nature","Wildlife"]},
{id:415,a:"north-lv",c:"Views",t:"Centennial Overlook Point",e:"\uD83C\uDFD9\uFE0F",d:"High points along the northern valley edge offer expansive views stretching from the Strip to the Spring Mountains. Best at sunset.",g:"N. Las Vegas valley overlook",tg:["Views","Sunset"]},

// CENTENNIAL HILLS (15)
{id:501,a:"centennial",c:"Outdoors",t:"Centennial Hills Park Trails",e:"\uD83D\uDEB6",d:"A large community park with paved walking and jogging trails, sports courts, playgrounds, and open grass. Great morning or evening spot.",g:"Centennial Hills Park Las Vegas",tg:["Park","Walking"]},
{id:502,a:"centennial",c:"Nature",t:"Lone Mountain Hike",e:"\u26F0\uFE0F",d:"A standalone desert peak with a short, steep trail to summit views of the entire northwest valley. Under 2 miles round trip but rewarding.",g:"Lone Mountain Las Vegas",tg:["Hiking","Views"]},
{id:503,a:"centennial",c:"Outdoors",t:"Horse Drive Trail",e:"\uD83D\uDC0E",d:"A paved multi-use trail on the northern edge of the city. Popular with joggers, cyclists, and families. Desert mountain backdrop the whole way.",g:"Horse Drive Trail N. Las Vegas",tg:["Trail","Easy"]},
{id:504,a:"centennial",c:"Nature",t:"Desert Breeze Park",e:"\uD83C\uDF43",d:"Though in Spring Valley, this beloved park has a train museum, duck pond, and walking paths. Worth the short drive from Centennial Hills.",g:"Desert Breeze Park Las Vegas",tg:["Park","Family"]},
{id:505,a:"centennial",c:"Views",t:"Ann Road Desert Overlook",e:"\uD83C\uDF05",d:"The end of Ann Road heading west offers unobstructed views of the Spring Mountains. A favorite locals-only sunset spot with no crowds.",g:"Ann Road Centennial Hills Las Vegas",tg:["Sunset","Quiet"]},
{id:506,a:"centennial",c:"Outdoors",t:"Skye Canyon Park Trails",e:"\uD83C\uDFDE\uFE0F",d:"New community on the far northwest edge with paved trails winding through desert landscaping and mountain views. Very well maintained.",g:"Skye Canyon Park Las Vegas",tg:["Walking","New"]},
{id:507,a:"centennial",c:"Nature",t:"Gilcrease Nature Sanctuary",e:"\uD83E\uDD9C",d:"A small sanctuary in the northwest valley with horses, birds, and desert gardens. Donation-based entry. A quiet, unexpected gem.",g:"Gilcrease Nature Sanctuary Las Vegas",tg:["Wildlife","Hidden Gem"]},
{id:508,a:"centennial",c:"Experience",t:"Centennial Hills Library",e:"\uD83D\uDCDA",d:"One of the nicest library branches in the system with community events, kids programs, and a peaceful reading garden. Always free.",g:"Centennial Hills Library Las Vegas",tg:["Culture","Free"]},
{id:509,a:"centennial",c:"Outdoors",t:"Aliante Trail System",e:"\uD83D\uDEB5",d:"Connected walking and biking trails throughout the Aliante master-planned community. Desert landscaping, public art, and mountain views.",g:"Aliante trails N. Las Vegas",tg:["Biking","Community"]},
{id:510,a:"centennial",c:"Views",t:"US 95 Overlook at Sunset",e:"\uD83C\uDF07",d:"Pull off at the northern end of US 95 heading toward Indian Springs for jaw-dropping sunset panoramas over the valley. Free roadside views.",g:"US 95 Las Vegas overlook north",tg:["Sunset","Views"]},
{id:511,a:"centennial",c:"Nature",t:"Tropical Breeze Park",e:"\uD83C\uDF34",d:"A neighborhood park with walking paths, palm trees, playground, and covered picnic areas. A nice morning walk spot for Centennial residents.",g:"Tropical Breeze Park Las Vegas",tg:["Park","Free"]},
{id:512,a:"centennial",c:"Outdoors",t:"Northwest Desert Edge Walk",e:"\uD83C\uDFDC\uFE0F",d:"Where Centennial Hills meets open desert you can walk into raw Mojave landscape. Unofficial trails lead to small washes and rock outcrops.",g:"Centennial Hills desert edge Las Vegas",tg:["Desert","Explore"]},
{id:513,a:"centennial",c:"Experience",t:"Tivoli Village Window Walk",e:"\uD83C\uDFDB\uFE0F",d:"A Mediterranean-themed outdoor shopping village with fountains, architecture, and restaurants. Free to wander and enjoy the European-style ambiance.",g:"Tivoli Village Las Vegas",tg:["Architecture","Dining"]},
{id:514,a:"centennial",c:"Outdoors",t:"Lee Canyon Road Drive",e:"\uD83D\uDE97",d:"Drive up Kyle Canyon Road toward Mt. Charleston for dramatic elevation changes and cooler temps. Free scenic drive with pullouts for photos.",g:"Lee Canyon Road Mount Charleston",tg:["Scenic Drive","Mountains"]},
{id:515,a:"centennial",c:"Nature",t:"Spring Mountain Ranch Grounds",e:"\uD83C\uDFE1",d:"Just west in the Spring Mountains, this state park has free picnic areas and open lawns with red rock backdrops. Small vehicle entry fee.",g:"Spring Mountain Ranch State Park",tg:["Nature","Scenic"]},

// ENTERPRISE / SOUTH (15)
{id:601,a:"enterprise",c:"Outdoors",t:"Sloan Canyon South Trailhead",e:"\uD83E\uDDED",d:"Access Sloan Canyon from the south for fewer crowds and raw desert hiking. Petroglyphs, desert tortoise habitat, and wide open views.",g:"Sloan Canyon National Conservation Area",tg:["Hiking","Desert"]},
{id:602,a:"enterprise",c:"Experience",t:"Town Square Park",e:"\uD83C\uDF33",d:"An outdoor shopping and dining center with a central park, playground, splash pad, and frequent free events. Family-friendly and well shaded.",g:"Town Square Las Vegas",tg:["Family","Free"]},
{id:603,a:"enterprise",c:"Views",t:"South Point Area Desert Views",e:"\uD83C\uDF05",d:"Drive south on Las Vegas Blvd past South Point for unobstructed desert and mountain views. Park at turnoffs for sunset photography.",g:"South Las Vegas Boulevard desert",tg:["Sunset","Photography"]},
{id:604,a:"enterprise",c:"Outdoors",t:"McCullough Range Trails",e:"\u26F0\uFE0F",d:"Rugged desert trails in the mountains south of Henderson and Enterprise. Rocky terrain, solitude, and expansive views. For experienced hikers.",g:"McCullough Range trails Las Vegas",tg:["Hiking","Adventure"]},
{id:605,a:"enterprise",c:"Nature",t:"Mountain Edge Wilderness Park",e:"\uD83C\uDF3F",d:"A large community park at the southern edge of the city with walking trails, exercise stations, and mountain views. Free and uncrowded.",g:"Mountain Edge Wilderness Park Las Vegas",tg:["Park","Walking"]},
{id:606,a:"enterprise",c:"Experience",t:"Seven Magic Mountains",e:"\uD83E\uDEA8",d:"Towering neon-painted boulder totems by Swiss artist Ugo Rondinone in the open desert south of town. One of Nevada's most Instagrammed spots.",g:"Seven Magic Mountains Las Vegas",tg:["Art","Photography"]},
{id:607,a:"enterprise",c:"Views",t:"Jean Dry Lake Viewpoint",e:"\uD83C\uDFDC\uFE0F",d:"A vast dry lakebed south of Vegas used for photography and events. The flat white surface against desert mountains is surreal and free.",g:"Jean Dry Lake Las Vegas",tg:["Photography","Unique"]},
{id:608,a:"enterprise",c:"Outdoors",t:"Anthem East Trail",e:"\uD83D\uDEB6",d:"Connected desert trails on the southeast edge of Enterprise near Anthem. Views of the McCullough Range and Black Mountain.",g:"Anthem East Trail Henderson",tg:["Hiking","Views"]},
{id:609,a:"enterprise",c:"Nature",t:"Exploration Peak Park",e:"\uD83C\uDFDE\uFE0F",d:"A hilltop park in Mountain's Edge with walking trails, climbing structures, and 360-degree views from the summit. Free and family-friendly.",g:"Exploration Peak Park Las Vegas",tg:["Family","Views"]},
{id:610,a:"enterprise",c:"Outdoors",t:"Primm Valley Drive",e:"\uD83D\uDE97",d:"The I-15 south toward Primm passes through dramatic desert passes and wide-open basin views. Stop at the state line for photos.",g:"Primm Valley Nevada",tg:["Scenic Drive","Desert"]},
{id:611,a:"enterprise",c:"Nature",t:"Silverado Ranch Park",e:"\uD83C\uDF33",d:"A well-maintained neighborhood park with a large pond, walking paths, sports courts, and green space. A quiet escape in the south valley.",g:"Silverado Ranch Park Las Vegas",tg:["Park","Quiet"]},
{id:612,a:"enterprise",c:"Views",t:"Enterprise Desert Sunset",e:"\uD83C\uDF07",d:"The wide-open desert at the southern edge of Enterprise offers some of the most vivid, unobstructed sunsets in the valley. Just drive and park.",g:"Enterprise Las Vegas sunset viewpoint",tg:["Sunset","Nature"]},
{id:613,a:"enterprise",c:"Outdoors",t:"Duck Creek Trail",e:"\uD83D\uDEB4",d:"A paved multi-use trail running through residential Enterprise connecting parks and schools. Easy flat route for walking, jogging, or biking.",g:"Duck Creek Trail Las Vegas",tg:["Trail","Easy"]},
{id:614,a:"enterprise",c:"Experience",t:"M Resort Overlook",e:"\uD83C\uDFE8",d:"The M Resort lobby has floor-to-ceiling windows with sweeping south valley and mountain views. Free to walk in and enjoy the vista.",g:"M Resort Henderson",tg:["Views","Architecture"]},
{id:615,a:"enterprise",c:"Outdoors",t:"Goodsprings Ghost Town Visit",e:"\uD83C\uDFDA\uFE0F",d:"A genuine Nevada ghost town 35 min south. The Pioneer Saloon (1913) still operates. Walk the streets, see abandoned mines, all free to explore.",g:"Goodsprings Nevada ghost town",tg:["History","Adventure"]},
// STRIP PAID + EXPERIENCES (30 more = 50 total)
{id:21,a:"the-strip",c:"Experience",t:"Meow Wolf Omega Mart",e:"\uD83D\uDED2",d:"A surreal grocery store that is actually a massive immersive art installation at AREA15. Portals, secret rooms, and the kind of weirdness Vegas does best.",g:"Meow Wolf Omega Mart Las Vegas",tg:["Art","Immersive"],p:"$$"},
{id:22,a:"the-strip",c:"Experience",t:"High Roller Observation Wheel",e:"\uD83C\uDFA1",d:"The world's tallest observation wheel at 550 feet. A 30-minute revolution with 360-degree views. Opt for the Happy Half Hour cabin with open bar.",g:"High Roller LINQ Promenade Las Vegas",tg:["Views","Drinks"],p:"$$"},
{id:23,a:"the-strip",c:"Experience",t:"Helicopter Night Flight",e:"\uD83D\uDE81",d:"Soar over the glowing Strip in a helicopter at night. 12-minute flights show you every major landmark from above. Unforgettable.",g:"helicopter tour Las Vegas Strip",tg:["Thrill","Night"],p:"$$$"},
{id:24,a:"the-strip",c:"Culture",t:"Cirque du Soleil O",e:"\uD83C\uDFAA",d:"The legendary water-based Cirque show at Bellagio. Acrobatics, synchronized swimming, and diving in a 1.5 million gallon pool. World class.",g:"Cirque du Soleil O Bellagio Las Vegas",tg:["Show","Iconic"],p:"$$$"},
{id:25,a:"the-strip",c:"Experience",t:"The Sphere Experience",e:"\uD83C\uDF10",d:"The world's largest spherical structure featuring a massive wraparound LED interior. Catch films and concerts in a truly next-generation venue.",g:"Sphere Las Vegas",tg:["Tech","Entertainment"],p:"$$$"},
{id:26,a:"the-strip",c:"Experience",t:"Strat SkyJump",e:"\uD83E\uDDD7",d:"Leap off the tallest freestanding observation tower in the US. A controlled 829-foot descent at speeds up to 40 mph. Not for the faint of heart.",g:"Strat SkyJump Las Vegas",tg:["Thrill","Adrenaline"],p:"$$$"},
{id:27,a:"the-strip",c:"Food & Drink",t:"Bacchanal Buffet at Caesars",e:"\uD83C\uDF7D\uFE0F",d:"Widely considered the best buffet in Vegas. Nine open kitchens serving over 250 dishes spanning global cuisines. Worth every dollar.",g:"Bacchanal Buffet Caesars Palace Las Vegas",tg:["Dining","Iconic"],p:"$$"},
{id:28,a:"the-strip",c:"Experience",t:"Venetian Gondola Ride",e:"\uD83D\uDEF6",d:"Float through the Grand Canal on a romantic gondola ride with a singing gondolier. Indoor and outdoor routes available. Pure Vegas charm.",g:"Venetian Gondola Rides Las Vegas",tg:["Romantic","Unique"],p:"$$"},
{id:29,a:"the-strip",c:"Experience",t:"Topgolf Las Vegas",e:"\u26F3",d:"Multi-level driving range with a rooftop terrace, full bar, and Strip views. Great food, climate-controlled hitting bays, and live music.",g:"Topgolf Las Vegas",tg:["Sports","Social"],p:"$$"},
{id:30,a:"the-strip",c:"Experience",t:"Eiffel Tower Viewing Deck",e:"\uD83D\uDDFC",d:"The 46th floor observation deck at Paris Las Vegas offers stunning 360-degree views. At night, the tower sparkles every 30 minutes.",g:"Eiffel Tower Experience Paris Las Vegas",tg:["Views","Romantic"],p:"$$"},
{id:31,a:"the-strip",c:"Food & Drink",t:"Secret Pizza at Cosmo",e:"\uD83C\uDF55",d:"No sign, no menu board. Find the hidden hallway on the 3rd floor of The Cosmopolitan for some of the best late-night slices in Vegas.",g:"Secret Pizza Cosmopolitan Las Vegas",tg:["Late Night","Hidden Gem"],p:"$"},
{id:32,a:"the-strip",c:"Culture",t:"Titanic Artifact Exhibition",e:"\uD83D\uDEA2",d:"Hundreds of artifacts recovered from the Titanic wreck at the Luxor. A 15-ton piece of the hull, recreated cabins, and deeply moving exhibits.",g:"Titanic Exhibition Luxor Las Vegas",tg:["History","Museum"],p:"$$"},
{id:33,a:"the-strip",c:"Experience",t:"Swingers Crazy Golf",e:"\u26F3",d:"Adults-only mini golf at Mandalay Bay with craft cocktails, great pizza, and carnival games. British-style crazy golf with a Vegas twist.",g:"Swingers Mandalay Bay Las Vegas",tg:["Fun","Social"],p:"$$"},
{id:34,a:"the-strip",c:"Experience",t:"FlyOver Las Vegas",e:"\u2708\uFE0F",d:"A flying ride simulation that takes you soaring over America's most stunning landscapes. Wind, mist, and scent effects make it feel real.",g:"FlyOver Las Vegas Strip",tg:["Immersive","Family"],p:"$$"},
{id:35,a:"the-strip",c:"Food & Drink",t:"Gordon Ramsay Hell's Kitchen",e:"\uD83D\uDD25",d:"The restaurant inspired by the TV show at Caesars Palace. Signature beef Wellington, sticky toffee pudding, and fiery decor. Reservations essential.",g:"Gordon Ramsay Hells Kitchen Las Vegas",tg:["Celebrity Chef","Dining"],p:"$$$"},
{id:36,a:"the-strip",c:"Experience",t:"Bodies Exhibition",e:"\uD83E\uDDB4",d:"Real preserved human bodies and organs at the Luxor. Thirteen galleries covering every system of the human body. Educational and fascinating.",g:"Bodies Exhibition Luxor Las Vegas",tg:["Science","Museum"],p:"$$"},
{id:37,a:"the-strip",c:"Food & Drink",t:"Mon Ami Gabi Patio Brunch",e:"\u2615",d:"French bistro with the best patio on the Strip, overlooking the Bellagio fountains. Steak frites, crepes, and people watching at its finest.",g:"Mon Ami Gabi Paris Las Vegas",tg:["Brunch","Views"],p:"$$"},
{id:38,a:"the-strip",c:"Experience",t:"Madame Tussauds",e:"\uD83E\uDD33",d:"Get up close with wax figures of celebrities, athletes, and pop culture icons at the Venetian. Tons of photo ops and interactive experiences.",g:"Madame Tussauds Las Vegas",tg:["Fun","Photo Op"],p:"$$"},
{id:39,a:"the-strip",c:"Experience",t:"Mandalay Bay Shark Reef",e:"\uD83E\uDD88",d:"Walk through an underwater tunnel surrounded by sharks, rays, and sea turtles. Over 2,000 animals in 1.6 million gallons of seawater.",g:"Shark Reef Aquarium Mandalay Bay Las Vegas",tg:["Family","Aquarium"],p:"$$"},
{id:40,a:"the-strip",c:"Food & Drink",t:"Wicked Spoon Buffet",e:"\uD83C\uDF72",d:"The Cosmopolitan's upscale buffet with individually plated dishes instead of chafing pans. Great brunch with unlimited champagne option.",g:"Wicked Spoon Cosmopolitan Las Vegas",tg:["Brunch","Dining"],p:"$$"},
{id:41,a:"the-strip",c:"Experience",t:"Las Vegas Premium Outlets",e:"\uD83D\uDECD\uFE0F",d:"Designer brands at discount prices just minutes from the Strip. Calvin Klein, Nike, Under Armour, Coach, and 150+ more stores.",g:"Las Vegas North Premium Outlets",tg:["Shopping","Deals"],p:"Free Entry"},
{id:42,a:"the-strip",c:"Experience",t:"Coca-Cola Store Tasting",e:"\uD83E\uDD64",d:"Sample 16 Coca-Cola flavors from around the world for $20. The Russian cucumber soda is legendary. Fun memorabilia and a giant Coke bear.",g:"Coca-Cola Store Las Vegas Strip",tg:["Tasting","Family"],p:"$"},
{id:43,a:"the-strip",c:"Experience",t:"Paradox Museum",e:"\uD83E\uDE9E",d:"Over 90 mind-bending exhibits at the Showcase Mall. Interactive illusions, gravity-defying rooms, and Instagram-worthy photo spots throughout.",g:"Paradox Museum Las Vegas",tg:["Interactive","Fun"],p:"$$"},
{id:44,a:"the-strip",c:"Culture",t:"Blue Man Group",e:"\uD83D\uDD35",d:"Percussion, comedy, and multimedia spectacle at the Luxor. A wild sensory experience unlike any other show in Vegas. Great for all ages.",g:"Blue Man Group Luxor Las Vegas",tg:["Show","Family"],p:"$$"},
{id:45,a:"the-strip",c:"Food & Drink",t:"Nobu at Caesars Palace",e:"\uD83C\uDF63",d:"World-renowned Japanese-Peruvian fusion by Chef Nobu Matsuhisa. The black cod miso is legendary. One of the finest dining experiences on the Strip.",g:"Nobu Restaurant Caesars Palace Las Vegas",tg:["Fine Dining","Japanese"],p:"$$$"},
{id:46,a:"the-strip",c:"Experience",t:"T-Mobile Arena Event",e:"\uD83C\uDFDF\uFE0F",d:"Home of the Vegas Golden Knights and host to UFC fights, concerts, and major events. The electric atmosphere is pure Vegas energy.",g:"T-Mobile Arena Las Vegas",tg:["Sports","Entertainment"],p:"$$"},
{id:47,a:"the-strip",c:"Experience",t:"Fashion Show Mall Runway",e:"\uD83D\uDC57",d:"One of the largest malls in the US with a retractable runway for live fashion shows on weekends. Free shows, world-class shopping.",g:"Fashion Show Mall Las Vegas",tg:["Shopping","Fashion"],p:"Free Entry"},
{id:48,a:"the-strip",c:"Experience",t:"Museum of Illusions",e:"\uD83E\uDE9E",d:"15,000 square feet of mind-bending optical illusions at 63 CityCenter. Infinity mirrors, forced perspective rooms, and a poker game with yourself.",g:"Museum of Illusions Las Vegas",tg:["Interactive","Photo Op"],p:"$$"},
{id:49,a:"the-strip",c:"Food & Drink",t:"Javier's at Aria",e:"\uD83C\uDF2E",d:"Upscale Mexican cuisine that locals say is the best in the country. Tacos, guacamole tableside, and Clase Azul margaritas in a gorgeous setting.",g:"Javiers Aria Las Vegas",tg:["Mexican","Fine Dining"],p:"$$$"},
{id:50,a:"the-strip",c:"Experience",t:"Allegiant Stadium Tour",e:"\uD83C\uDFC8",d:"Behind-the-scenes tour of the Raiders' $1.9 billion stadium. Visit the locker room, field level, and luxury suites of this architectural marvel.",g:"Allegiant Stadium Las Vegas",tg:["Sports","Architecture"],p:"$$"},

// DOWNTOWN PAID + EXPERIENCES (25 more = 45 total)
{id:121,a:"downtown",c:"Culture",t:"Neon Museum Night Tour",e:"\uD83D\uDCA1",d:"Walk through the Neon Boneyard after dark where retired Vegas signs glow again. Classic signage from the Stardust, Sassy Sally's, and dozens more.",g:"Neon Museum Las Vegas",tg:["Photography","History"],p:"$$"},
{id:122,a:"downtown",c:"Culture",t:"Mob Museum Full Experience",e:"\uD83D\uDD75\uFE0F",d:"Interactive exhibits on organized crime history, a firearms simulator, and a real speakeasy in the basement serving Prohibition-era cocktails.",g:"Mob Museum Las Vegas",tg:["History","Interactive"],p:"$$"},
{id:123,a:"downtown",c:"Experience",t:"SlotZilla Zipline",e:"\u26A1",d:"Launch from an 11-story slot machine and fly Superman-style over Fremont Street at 40 mph. The best way to see the canopy up close.",g:"SlotZilla Zipline Las Vegas",tg:["Thrill","Iconic"],p:"$$"},
{id:124,a:"downtown",c:"Food & Drink",t:"Esther's Kitchen",e:"\uD83C\uDF5D",d:"Seasonal Italian comfort food with some of the best bread in Vegas. Outdoor patio in the Arts District. A James Trees masterpiece.",g:"Esthers Kitchen Las Vegas",tg:["Italian","Local Fave"],p:"$$"},
{id:125,a:"downtown",c:"Food & Drink",t:"Carson Kitchen",e:"\uD83C\uDF74",d:"Creative American small plates in a converted mid-century motel. The crispy chicken skins with smoked honey are a must. Rooftop patio.",g:"Carson Kitchen Las Vegas",tg:["Small Plates","Rooftop"],p:"$$"},
{id:126,a:"downtown",c:"Nightlife",t:"Atomic Liquors",e:"\uD83C\uDF78",d:"Vegas's oldest freestanding bar, where locals once watched nuclear tests from the roof. Great craft cocktails and a living piece of history.",g:"Atomic Liquors Las Vegas",tg:["Historic","Cocktails"],p:"$"},
{id:127,a:"downtown",c:"Nightlife",t:"Commonwealth Rooftop",e:"\uD83C\uDF1F",d:"A two-story cocktail bar on Fremont East with a rooftop overlooking downtown. Prohibition-era decor, great drinks, and a secret room.",g:"Commonwealth Las Vegas",tg:["Rooftop","Cocktails"],p:"$$"},
{id:128,a:"downtown",c:"Food & Drink",t:"Le Thai Drunken Noodles",e:"\uD83C\uDF5C",d:"Vibrant Thai street food with a patio on Fremont East. The drunken noodles are legendary among locals. Perfect fuel between bars and galleries.",g:"Le Thai Las Vegas",tg:["Thai","Patio"],p:"$"},
{id:129,a:"downtown",c:"Experience",t:"Circa Stadium Swim",e:"\uD83C\uDFCA",d:"A rooftop pool amphitheater with a massive LED screen, six pools, and cabanas. Watch games poolside on the world's largest sportsbook screen.",g:"Stadium Swim Circa Las Vegas",tg:["Pool","Sports"],p:"$$"},
{id:130,a:"downtown",c:"Food & Drink",t:"Evel Pie",e:"\uD83C\uDF55",d:"Punk rock pizza on Fremont East with Evel Knievel memorabilia covering every wall. Massive New York-style slices and late-night energy.",g:"Evel Pie Las Vegas",tg:["Late Night","Casual"],p:"$"},
{id:131,a:"downtown",c:"Nightlife",t:"Velveteen Rabbit",e:"\uD83D\uDC07",d:"A whimsical cocktail bar in the Arts District with seasonal menus, an eclectic patio, and art-forward vibes. One of the best bars in Vegas.",g:"Velveteen Rabbit Las Vegas",tg:["Cocktails","Arts District"],p:"$$"},
{id:132,a:"downtown",c:"Food & Drink",t:"Able Baker Brewing",e:"\uD83C\uDF7A",d:"A craft brewery in the Arts District with an extensive beer selection and a welcoming taproom. Perfect post-First Friday hangout.",g:"Able Baker Brewing Company Las Vegas",tg:["Beer","Local"],p:"$"},
{id:133,a:"downtown",c:"Food & Drink",t:"Hugo's Cellar",e:"\uD83E\uDD40",d:"Old-school steakhouse at the Four Queens where every woman receives a red rose. Classic tableside preparations and an incredible wine list.",g:"Hugos Cellar Las Vegas",tg:["Steakhouse","Classic"],p:"$$$"},
{id:134,a:"downtown",c:"Experience",t:"Downtown Grand Pool Deck",e:"\u2600\uFE0F",d:"A chill pool deck with views of the Fremont Street canopy. Affordable day passes, cabanas, and a more relaxed vibe than Strip pool clubs.",g:"Downtown Grand Hotel Las Vegas pool",tg:["Pool","Relaxing"],p:"$"},
{id:135,a:"downtown",c:"Food & Drink",t:"Cornish Pasty Co.",e:"\uD83E\uDD56",d:"A British pub in the Arts District with a massive selection of pasties, craft beers, and a laid-back patio. Great post-gallery fuel.",g:"Cornish Pasty Company Las Vegas",tg:["British","Casual"],p:"$"},
{id:136,a:"downtown",c:"Experience",t:"Downtown Cocktail Room",e:"\uD83C\uDF79",d:"A dimly lit speakeasy-style lounge that was one of the first craft cocktail bars in Vegas. Expert mixologists and a moody atmosphere.",g:"Downtown Cocktail Room Las Vegas",tg:["Speakeasy","Cocktails"],p:"$$"},
{id:137,a:"downtown",c:"Experience",t:"Gold Spike Social Club",e:"\uD83C\uDFB2",d:"A bar and social club with giant Jenga, beer pong, shuffleboard, and a backyard vibe. Free entry, cheap drinks, and good times.",g:"Gold Spike Las Vegas",tg:["Games","Social"],p:"$"},
{id:138,a:"downtown",c:"Culture",t:"Zak Bagans Haunted Museum",e:"\uD83D\uDC7B",d:"A collection of haunted artifacts in a genuinely spooky historic mansion. From the host of Ghost Adventures. No photos allowed inside.",g:"Zak Bagans Haunted Museum Las Vegas",tg:["Spooky","Unique"],p:"$$"},
{id:139,a:"downtown",c:"Food & Drink",t:"8 East at Circa",e:"\uD83C\uDF63",d:"Pan-Asian cuisine with standout brisket fried rice and sushi. Stylish interiors inside the newest downtown resort. Locals rave about it.",g:"8 East Circa Las Vegas",tg:["Asian Fusion","Upscale"],p:"$$"},
{id:140,a:"downtown",c:"Experience",t:"Koolsville $10 Tattoo",e:"\uD83D\uDC89",d:"A Las Vegas institution offering a menu of small tattoos all under $10. A quirky, permanent souvenir of your Vegas trip.",g:"Koolsville Tattoo Las Vegas",tg:["Unique","Cheap"],p:"$"},

// SUMMERLIN PAID + FOOD (25 more = 45 total)
{id:221,a:"summerlin",c:"Food & Drink",t:"Nittaya's Secret Kitchen",e:"\uD83C\uDF5C",d:"Intimate Thai restaurant with a secret Kua menu. The Purple Rainforest Curry is Instagram-famous. Locals consider this the best Thai in Vegas.",g:"Nittayas Secret Kitchen Las Vegas",tg:["Thai","Local Fave"],p:"$$"},
{id:222,a:"summerlin",c:"Food & Drink",t:"Echo & Rig",e:"\uD83E\uDD69",d:"Butcher shop and restaurant combo. Dry-aged steaks, craft cocktails, and a case full of premium cuts. The bone marrow appetizer is incredible.",g:"Echo and Rig Las Vegas",tg:["Steakhouse","Upscale"],p:"$$$"},
{id:223,a:"summerlin",c:"Food & Drink",t:"Honey Salt",e:"\uD83C\uDF3B",d:"Farm-to-table comfort food on Rampart. Caramelized sea scallops, fried chicken sandwiches, and seasonal menus. A Summerlin staple.",g:"Honey Salt Las Vegas",tg:["Farm to Table","Brunch"],p:"$$"},
{id:224,a:"summerlin",c:"Food & Drink",t:"Al Solito Posto",e:"\uD83C\uDF5D",d:"Neighborhood Italian with house-made pappardelle Bolognese that locals call the best in Vegas. Wood-fired pizza with perfectly blistered crust.",g:"Al Solito Posto Las Vegas",tg:["Italian","Local Fave"],p:"$$"},
{id:225,a:"summerlin",c:"Food & Drink",t:"Ohlala French Bistro",e:"\uD83E\uDD50",d:"Authentic French dining with escargot, French onion soup, and filet mignon. Parisian-inspired decor and a calm atmosphere for relaxed evenings.",g:"Ohlala French Bistro Las Vegas",tg:["French","Romantic"],p:"$$"},
{id:226,a:"summerlin",c:"Experience",t:"Las Vegas Aviators Game",e:"\u26BE",d:"Triple-A baseball at the stunning Las Vegas Ballpark. Great atmosphere, affordable tickets, craft beer, and fireworks on Friday nights.",g:"Las Vegas Ballpark Summerlin",tg:["Sports","Family"],p:"$$"},
{id:227,a:"summerlin",c:"Experience",t:"Golden Knights Practice",e:"\uD83C\uDFD2",d:"Watch the Vegas Golden Knights practice at City National Arena. Free to watch, with open skate sessions available after. A cool escape from the heat.",g:"City National Arena Las Vegas",tg:["Sports","Free"],p:"Free"},
{id:228,a:"summerlin",c:"Experience",t:"Red Rock Casino Spa & Pool",e:"\uD83D\uDC86",d:"A luxury resort with a stunning pool complex, full-service spa, bowling alley, and multiple restaurants. A vacation without leaving town.",g:"Red Rock Casino Resort Las Vegas",tg:["Resort","Relaxing"],p:"$$"},
{id:229,a:"summerlin",c:"Food & Drink",t:"Vintner Grill",e:"\uD83C\uDF77",d:"Farm-to-table American cuisine with Mediterranean influences. White leather booths, patio with cabanas, and an extensive organic wine list.",g:"Vintner Grill Las Vegas",tg:["American","Wine"],p:"$$$"},
{id:230,a:"summerlin",c:"Food & Drink",t:"Americana",e:"\uD83C\uDF54",d:"Elevated American comfort food in Downtown Summerlin. Creative cocktails, a gorgeous patio, and dishes that go well beyond standard bar food.",g:"Americana Las Vegas Summerlin",tg:["American","Patio"],p:"$$"},
{id:231,a:"summerlin",c:"Experience",t:"Suncoast Bowling Center",e:"\uD83C\uDFB3",d:"A 64-lane bowling center inside Suncoast Casino. League play, cosmic bowling nights, and a full arcade. Low-key fun for all ages.",g:"Suncoast Bowling Center Las Vegas",tg:["Bowling","Family"],p:"$"},
{id:232,a:"summerlin",c:"Food & Drink",t:"Meraki Greek Grill",e:"\uD83E\uDD59",d:"Authentic Greek that transports you to the Mediterranean. Perfectly seasoned gyros, fresh salads, and warm hospitality. Locals can not stop talking about it.",g:"Meraki Greek Grill Las Vegas",tg:["Greek","Casual"],p:"$"},
{id:233,a:"summerlin",c:"Experience",t:"Red Rock Canyon Horseback Ride",e:"\uD83D\uDC0E",d:"Guided horseback rides through the desert landscape around Red Rock Canyon. Sunrise and sunset rides available for stunning photography.",g:"Red Rock Canyon horseback riding",tg:["Outdoors","Unique"],p:"$$"},
{id:234,a:"summerlin",c:"Food & Drink",t:"Bagel Nook Summerlin",e:"\uD83E\uDD6F",d:"Unconventional stuffed bagels with flavors like Fruity Pebbles, Hot Cheetos, and Oreo. A viral sensation that lives up to the hype.",g:"Bagel Nook Downtown Summerlin Las Vegas",tg:["Breakfast","Viral"],p:"$"},
{id:235,a:"summerlin",c:"Food & Drink",t:"Frankie's Uptown",e:"\uD83C\uDF78",d:"A neighborhood bar with elevated food, craft cocktails, and a warm vibe. The kind of place where the bartenders know your name.",g:"Frankies Uptown Las Vegas",tg:["Bar","Local"],p:"$"},
{id:236,a:"summerlin",c:"Experience",t:"Wet'n'Wild / Cowabunga Canyon",e:"\uD83C\uDFC4",d:"A waterpark with 25 slides, a lazy river, wave pool, and a 60-foot freefall drop. The perfect way to beat the Vegas summer heat.",g:"Cowabunga Canyon Las Vegas Summerlin",tg:["Waterpark","Family"],p:"$$"},
{id:237,a:"summerlin",c:"Food & Drink",t:"Tomoya Japanese Cuisine",e:"\uD83C\uDF63",d:"Top-rated Japanese restaurant with expertly prepared sushi, sashimi, and hot dishes. A quiet neighborhood gem that punches way above its weight.",g:"Tomoya Japanese Cuisine Las Vegas",tg:["Japanese","Sushi"],p:"$$"},
{id:238,a:"summerlin",c:"Experience",t:"TPC Las Vegas Golf",e:"\u26F3",d:"One of two Tournament Players Club courses in Summerlin. Desert golf with stunning Red Rock views. Public tee times available.",g:"TPC Las Vegas Summerlin",tg:["Golf","Premium"],p:"$$$"},
{id:239,a:"summerlin",c:"Food & Drink",t:"Cap't Loui Seafood Boil",e:"\uD83E\uDD9E",d:"Authentic Louisiana seafood boils with a secret sauce that has locals obsessed. Shrimp po boys, gumbo, and mountains of crawfish on the patio.",g:"Capt Loui Summerlin Las Vegas",tg:["Seafood","Casual"],p:"$$"},
{id:240,a:"summerlin",c:"Experience",t:"Spring Mountain Ranch Picnic",e:"\uD83E\uDDFA",d:"State park just west of Summerlin with picnic lawns, red rock backdrops, and summer theater under the stars. A beautiful escape.",g:"Spring Mountain Ranch State Park",tg:["Nature","Family"],p:"$"},

// HENDERSON PAID + FOOD (25 more = 45 total)
{id:321,a:"henderson",c:"Experience",t:"Green Valley Ranch Resort",e:"\uD83C\uDFE8",d:"Henderson's favorite resort with a gorgeous pool, great restaurants, spa, and a relaxed casino. European-inspired aesthetics. A mini vacation.",g:"Green Valley Ranch Resort Henderson",tg:["Resort","Pool"],p:"$$"},
{id:322,a:"henderson",c:"Food & Drink",t:"Hank's Fine Steaks",e:"\uD83E\uDD69",d:"Classic steakhouse inside Green Valley Ranch with an old-world vibe, prime cuts, and an extensive wine list. A Henderson special occasion spot.",g:"Hanks Fine Steaks Henderson",tg:["Steakhouse","Upscale"],p:"$$$"},
{id:323,a:"henderson",c:"Experience",t:"Cowabunga Bay Waterpark",e:"\uD83C\uDFC4",d:"A massive waterpark with slides, a lazy river, wave pool, and splash zones. The top family attraction in Henderson during summer months.",g:"Cowabunga Bay Henderson",tg:["Waterpark","Family"],p:"$$"},
{id:324,a:"henderson",c:"Culture",t:"Clark County Museum",e:"\uD83C\uDFDB\uFE0F",d:"A 30-acre complex with historic homes, a ghost town, mining trail, and Southern Nevada history exhibits. Only $2 admission. Best deal in Henderson.",g:"Clark County Museum Henderson",tg:["History","Budget"],p:"$"},
{id:325,a:"henderson",c:"Experience",t:"Lion Habitat Ranch",e:"\uD83E\uDD81",d:"A big cat sanctuary where you can see rescued lions up close. Guided tours, feeding opportunities, and giraffe encounters. Not a zoo, a rescue.",g:"Lion Habitat Ranch Henderson",tg:["Animals","Family"],p:"$$"},
{id:326,a:"henderson",c:"Food & Drink",t:"Borracha Mexican Cantina",e:"\uD83C\uDF2E",d:"Lively Mexican restaurant at Green Valley Ranch with creative tacos, tableside guacamole, and a vibrant bar scene. Great happy hour.",g:"Borracha Mexican Cantina Henderson",tg:["Mexican","Happy Hour"],p:"$$"},
{id:327,a:"henderson",c:"Outdoors",t:"Lake Mead Kayak Tour",e:"\uD83D\uDEF6",d:"Guided kayak tours through hidden coves and slot canyons on Lake Mead. Paddle to Emerald Cave where the water glows turquoise green.",g:"Emerald Cave kayak Lake Mead",tg:["Kayaking","Adventure"],p:"$$"},
{id:328,a:"henderson",c:"Food & Drink",t:"Settebello Pizzeria",e:"\uD83C\uDF55",d:"Certified Neapolitan pizza in Henderson's District. Wood-fired, authentic, and widely regarded as some of the best pizza in the valley.",g:"Settebello Pizzeria Henderson",tg:["Pizza","Authentic"],p:"$"},
{id:329,a:"henderson",c:"Experience",t:"M Resort Pool & Views",e:"\uD83C\uDFCA",d:"The M Resort has floor-to-ceiling windows with sweeping valley views and a gorgeous pool. Great restaurants and a more sophisticated local vibe.",g:"M Resort Henderson",tg:["Resort","Views"],p:"$$"},
{id:330,a:"henderson",c:"Outdoors",t:"Bootleg Canyon Zipline",e:"\u26A1",d:"Fly across Boulder Canyon on ziplines reaching speeds of 60 mph with views of Lake Mead and the desert below. Four lines, each more thrilling.",g:"Bootleg Canyon zipline Boulder City",tg:["Thrill","Outdoors"],p:"$$"},
{id:331,a:"henderson",c:"Food & Drink",t:"Lucille's Smokehouse BBQ",e:"\uD83C\uDF56",d:"Southern BBQ and comfort food at The District. Smoked ribs, brisket, and cornbread in a warm, family-friendly setting. Great patio.",g:"Lucilles BBQ Henderson",tg:["BBQ","Family"],p:"$$"},
{id:332,a:"henderson",c:"Experience",t:"Ethel M Holiday Lights",e:"\uD83C\uDF84",d:"Every November through January, the cactus garden transforms with over a million holiday lights. Free admission. The most magical free event in Henderson.",g:"Ethel M holiday cactus garden lights Henderson",tg:["Seasonal","Free"],p:"Free"},
{id:333,a:"henderson",c:"Food & Drink",t:"Mojave Brewing Company",e:"\uD83C\uDF7A",d:"Local craft brewery with a rotating tap list and laid-back taproom. Part of Henderson's growing brewery district. Try a flight.",g:"Mojave Brewing Company Henderson",tg:["Beer","Local"],p:"$"},
{id:334,a:"henderson",c:"Outdoors",t:"Valley of Fire Guided Hike",e:"\uD83E\uDDED",d:"Hire a local guide for an in-depth exploration of petroglyphs, geology, and hidden arches. Learn the stories behind the formations.",g:"Valley of Fire guided tour",tg:["Hiking","Educational"],p:"$$"},
{id:335,a:"henderson",c:"Experience",t:"Henderson Pavilion Concert",e:"\uD83C\uDFB6",d:"Outdoor amphitheater hosting concerts, plays, and festivals year-round. Bring a lawn chair and enjoy live entertainment under the desert sky.",g:"Henderson Pavilion",tg:["Music","Outdoor"],p:"$"},
{id:336,a:"henderson",c:"Food & Drink",t:"Rachel's Kitchen",e:"\uD83E\uDD57",d:"A healthy cafe chain born in Henderson with fresh salads, paninis, acai bowls, and smoothies. Clean eating done right. Multiple locations.",g:"Rachels Kitchen Henderson",tg:["Healthy","Brunch"],p:"$"},
{id:337,a:"henderson",c:"Experience",t:"Hoover Dam Tour",e:"\uD83C\uDFD7\uFE0F",d:"Go beyond the free walk with the guided Powerplant Tour or Dam Tour. See the massive generators, tunnels, and learn the incredible construction story.",g:"Hoover Dam tour",tg:["History","Engineering"],p:"$$"},
{id:338,a:"henderson",c:"Food & Drink",t:"Bad Beat Brewing",e:"\uD83C\uDF7B",d:"Another standout in Henderson's brewery park. Known for creative seasonal brews and a chill outdoor seating area. Very dog-friendly.",g:"Bad Beat Brewing Henderson",tg:["Beer","Dog Friendly"],p:"$"},
{id:339,a:"henderson",c:"Experience",t:"Lake Las Vegas Paddleboard",e:"\uD83C\uDFC4",d:"Rent a paddleboard or kayak on Lake Las Vegas for a peaceful morning on the water surrounded by desert mountains. Rentals available hourly.",g:"Lake Las Vegas water sports Henderson",tg:["Water Sports","Relaxing"],p:"$"},
{id:340,a:"henderson",c:"Food & Drink",t:"Todd's Unique Dining",e:"\uD83C\uDF7D\uFE0F",d:"A hidden gem run by Chef Todd Clore serving creative American cuisine in a small, intimate setting. One of the most underrated restaurants in the valley.",g:"Todds Unique Dining Henderson",tg:["Fine Dining","Hidden Gem"],p:"$$$"},

// NORTH LV PAID (15 more = 30 total)
{id:416,a:"north-lv",c:"Experience",t:"Las Vegas Motor Speedway",e:"\uD83C\uDFCE\uFE0F",d:"Drive a real NASCAR stock car or exotic supercar on the speedway. Multiple experiences from ride-alongs to full driving packages. Pure adrenaline.",g:"Las Vegas Motor Speedway",tg:["Thrill","Cars"],p:"$$$"},
{id:417,a:"north-lv",c:"Experience",t:"Dig This! Heavy Equipment",e:"\uD83D\uDE9C",d:"Operate bulldozers and excavators in a giant sandbox. Stack tires, dig trenches, and build mounds. A uniquely Vegas experience for adults.",g:"Dig This Las Vegas",tg:["Unique","Fun"],p:"$$$"},
{id:418,a:"north-lv",c:"Food & Drink",t:"Aliante Casino Dining",e:"\uD83C\uDF74",d:"MRKT Sea & Land offers upscale dining with a seafood focus. The resort also has Farm 24/7 for casual eats and a solid sports bar.",g:"Aliante Casino Hotel N. Las Vegas dining",tg:["Dining","Casino"],p:"$$"},
{id:419,a:"north-lv",c:"Experience",t:"Nellis AFB Air Show",e:"\u2708\uFE0F",d:"The annual Aviation Nation air show at Nellis Air Force Base features the Thunderbirds, military displays, and incredible aerial performances. Free admission.",g:"Nellis Air Force Base air show Las Vegas",tg:["Aviation","Free"],p:"Free"},
{id:420,a:"north-lv",c:"Experience",t:"Craig Ranch Skate Park",e:"\uD83D\uDEF9",d:"One of the largest free public skate parks in the valley. Well-maintained bowls, rails, and street features. Helmets required for minors.",g:"Craig Ranch Regional Park skate park",tg:["Skating","Free"],p:"Free"},
{id:421,a:"north-lv",c:"Food & Drink",t:"Mabel's BBQ",e:"\uD83C\uDF56",d:"Celebrity chef Michael Symon's BBQ joint at the Palms. Cleveland-style BBQ with Eastern European spice influences. The brisket is phenomenal.",g:"Mabels BBQ Las Vegas",tg:["BBQ","Celebrity Chef"],p:"$$"},
{id:422,a:"north-lv",c:"Outdoors",t:"Desert National Wildlife Refuge",e:"\uD83E\uDD85",d:"The largest wildlife refuge in the lower 48 states. Bighorn sheep habitat, desert hiking, and vast solitude. Free to enter. Bring lots of water.",g:"Desert National Wildlife Refuge Las Vegas",tg:["Wildlife","Solitude"],p:"Free"},
{id:423,a:"north-lv",c:"Experience",t:"Cannery Casino Entertainment",e:"\uD83C\uDFB5",d:"A locals casino with surprisingly good live entertainment, a movie theater, and affordable dining. The Star of the Desert Arena hosts concerts and events.",g:"Cannery Casino N. Las Vegas",tg:["Entertainment","Budget"],p:"$"},
{id:424,a:"north-lv",c:"Food & Drink",t:"Hainan Chicken at Mama's",e:"\uD83C\uDF57",d:"Mama's Kitchen in N. Las Vegas serves some of the best Chinese comfort food in the valley. Known for generous portions and authentic flavors.",g:"Mamas Kitchen North Las Vegas",tg:["Chinese","Local"],p:"$"},
{id:425,a:"north-lv",c:"Experience",t:"Vegas Indoor Skydiving",e:"\uD83E\uDE82",d:"Experience freefall in a vertical wind tunnel without jumping from a plane. Professional instructors guide you through the flight. All skill levels.",g:"Vegas Indoor Skydiving",tg:["Thrill","Indoor"],p:"$$"},
{id:426,a:"north-lv",c:"Outdoors",t:"Mt Charleston Day Trip",e:"\uD83C\uDFD4\uFE0F",d:"Drive 45 minutes to drop 30 degrees in temperature. Pine forests, hiking trails, and even skiing in winter. A complete escape from the desert.",g:"Mount Charleston Las Vegas",tg:["Mountains","Escape"],p:"Free"},
{id:427,a:"north-lv",c:"Experience",t:"N. Las Vegas Airport Scenic Flight",e:"\u2708\uFE0F",d:"Small plane scenic flights depart from North LV Airport over Red Rock Canyon and the Strip. More affordable than Strip helicopter tours.",g:"North Las Vegas Airport scenic flights",tg:["Scenic","Views"],p:"$$"},
{id:428,a:"north-lv",c:"Food & Drink",t:"Roberto's Taco Shop",e:"\uD83C\uDF2F",d:"A Vegas institution with multiple locations. The carne asada burritos and green sauce are legendary. Open late, always packed, always worth it.",g:"Robertos Taco Shop Las Vegas",tg:["Mexican","Late Night"],p:"$"},
{id:429,a:"north-lv",c:"Experience",t:"Speedvegas Exotic Driving",e:"\uD83C\uDFCE\uFE0F",d:"Drive Ferraris, Lamborghinis, and Porsches on a 1.5-mile racetrack. Multiple packages from ride-alongs to full driving experiences.",g:"Speedvegas Las Vegas",tg:["Cars","Thrill"],p:"$$$"},
{id:430,a:"north-lv",c:"Experience",t:"Escape Room Challenge",e:"\uD83D\uDD10",d:"Several escape room venues in North LV offer themed puzzle experiences. Great for groups who want something different beyond the casino floor.",g:"escape rooms N. Las Vegas",tg:["Puzzles","Group"],p:"$$"},

// CENTENNIAL PAID (15 more = 30 total)
{id:516,a:"centennial",c:"Food & Drink",t:"DW Bistro",e:"\uD83C\uDF74",d:"A beloved local restaurant blending New Mexican and Jamaican flavors. Green chile cheeseburgers, jerk chicken, and a fantastic patio vibe.",g:"DW Bistro Las Vegas",tg:["Fusion","Local Fave"],p:"$$"},
{id:517,a:"centennial",c:"Experience",t:"Tivoli Village Dining & Wine",e:"\uD83C\uDF77",d:"Mediterranean-themed outdoor village with upscale restaurants, wine bars, and boutique shopping. A European-style evening out on the west side.",g:"Tivoli Village Las Vegas",tg:["Dining","Shopping"],p:"$$"},
{id:518,a:"centennial",c:"Food & Drink",t:"Lindo Michoacan",e:"\uD83C\uDF2E",d:"Authentic regional Mexican cuisine with a massive menu and vibrant atmosphere. Known for the mole and the lively weekend scene. A local institution.",g:"Lindo Michoacan Las Vegas",tg:["Mexican","Authentic"],p:"$"},
{id:519,a:"centennial",c:"Experience",t:"Skye Canyon Community Events",e:"\uD83C\uDF89",d:"The newest master-planned community hosts free events like outdoor movies, food truck festivals, and holiday celebrations at Skye Canyon Park.",g:"Skye Canyon events Las Vegas",tg:["Community","Free"],p:"Free"},
{id:520,a:"centennial",c:"Outdoors",t:"Mt Charleston Cathedral Rock",e:"\u26EA",d:"A moderate 3-mile round trip hike to Cathedral Rock on Mt Charleston. Pine forests and cool temperatures just 45 min from Centennial Hills.",g:"Cathedral Rock Trail Mount Charleston",tg:["Hiking","Cool"],p:"Free"},
{id:521,a:"centennial",c:"Food & Drink",t:"Pizza Rock",e:"\uD83C\uDF55",d:"Award-winning pizza from a World Pizza Champion. Multiple styles from Neapolitan to New York. Creative pies and a great beer selection.",g:"Pizza Rock Las Vegas",tg:["Pizza","Award-Winning"],p:"$"},
