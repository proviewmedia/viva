{id:522,a:"centennial",c:"Experience",t:"Suncoast Casino Movies & Bowling",e:"\uD83C\uDFAC",d:"A locals casino with a 16-screen movie theater, 64-lane bowling center, bingo, and affordable dining. Solid entertainment for the whole family.",g:"Suncoast Hotel Casino Las Vegas",tg:["Movies","Bowling"],p:"$"},
{id:523,a:"centennial",c:"Outdoors",t:"Mary Jane Falls Hike",e:"\uD83D\uDCA7",d:"A popular 2.5-mile trail to a seasonal waterfall on Mt Charleston. Pine-scented air and mountain scenery that feels nothing like Vegas.",g:"Mary Jane Falls Mount Charleston",tg:["Hiking","Waterfall"],p:"Free"},
{id:524,a:"centennial",c:"Food & Drink",t:"Avery's Coffee",e:"\u2615",d:"A local coffee roaster with a cozy shop perfect for morning work sessions. Single-origin pour-overs and pastries in a welcoming space.",g:"Averys Coffee Las Vegas",tg:["Coffee","Local"],p:"$"},
{id:525,a:"centennial",c:"Experience",t:"Santa Fe Station Bowling",e:"\uD83C\uDFB3",d:"A locals casino with a well-maintained bowling center, movie theater, and surprisingly good sushi restaurant. Great value entertainment.",g:"Santa Fe Station Las Vegas",tg:["Bowling","Casino"],p:"$"},
{id:526,a:"centennial",c:"Outdoors",t:"Bristlecone Loop Trail",e:"\uD83C\uDF32",d:"A moderate 6-mile loop through ancient bristlecone pines on Mt Charleston. Some of the oldest living trees on Earth in a stunning alpine setting.",g:"Bristlecone Loop Trail Mount Charleston",tg:["Hiking","Ancient"],p:"Free"},
{id:527,a:"centennial",c:"Food & Drink",t:"Hash House A Go Go",e:"\uD83E\uDD5E",d:"Twisted Farm Food with massive portions. The Sage Fried Chicken Benedict and Chicken & Waffles are legendary. Come very hungry.",g:"Hash House A Go Go Las Vegas",tg:["Breakfast","Huge Portions"],p:"$$"},
{id:528,a:"centennial",c:"Experience",t:"Lee Canyon Ski Resort",e:"\u26F7\uFE0F",d:"Skiing and snowboarding just 45 minutes from the Strip. Small but charming resort on Mt Charleston with rentals and lessons available.",g:"Lee Canyon ski resort Las Vegas",tg:["Skiing","Winter"],p:"$$"},
{id:529,a:"centennial",c:"Food & Drink",t:"Freed's Bakery",e:"\uD83C\uDF82",d:"A Las Vegas institution since 1959 making cakes, pastries, and cupcakes. Featured on TV multiple times. The cupcakes alone are worth the trip.",g:"Freeds Bakery Las Vegas",tg:["Bakery","Institution"],p:"$"},
{id:530,a:"centennial",c:"Experience",t:"Gilcrease Orchard U-Pick",e:"\uD83C\uDF4E",d:"A working farm in the northwest valley offering seasonal u-pick produce. Peaches in summer, pumpkins in fall. A slice of rural life in the city.",g:"Gilcrease Orchard Las Vegas",tg:["Farm","Seasonal"],p:"$"},

// ENTERPRISE PAID (15 more = 30 total)
{id:616,a:"enterprise",c:"Experience",t:"Town Square Events & Dining",e:"\uD83C\uDF33",d:"Outdoor shopping center with a central park, splash pad, free live events, and great restaurants like Yard House and Tommy Bahama.",g:"Town Square Las Vegas",tg:["Shopping","Family"],p:"Free Entry"},
{id:617,a:"enterprise",c:"Food & Drink",t:"Grape Street Wine Bar",e:"\uD83C\uDF77",d:"A casual wine bar and bistro at Town Square with an extensive by-the-glass list, flatbreads, and a gorgeous patio. Date night favorite.",g:"Grape Street Wine Bar Las Vegas",tg:["Wine","Patio"],p:"$$"},
{id:618,a:"enterprise",c:"Experience",t:"Allegiant Stadium Event",e:"\uD83C\uDFC8",d:"Home of the Raiders and host to massive concerts, soccer matches, and special events. The $1.9 billion stadium is an architectural marvel.",g:"Allegiant Stadium Las Vegas",tg:["Sports","Concerts"],p:"$$"},
{id:619,a:"enterprise",c:"Food & Drink",t:"Tacotarian",e:"\uD83C\uDF2E",d:"Award-winning plant-based Mexican food that even meat lovers rave about. Creative vegan tacos, burritos, and nachos. Nationally recognized.",g:"Tacotarian Las Vegas",tg:["Vegan","Mexican"],p:"$"},
{id:620,a:"enterprise",c:"Experience",t:"Topgolf Las Vegas",e:"\u26F3",d:"Multi-level driving range with Strip views, a rooftop terrace, full bar, and great food. Climate-controlled bays and live music.",g:"Topgolf Las Vegas",tg:["Sports","Social"],p:"$$"},
{id:621,a:"enterprise",c:"Outdoors",t:"Sloan Canyon Conservation Hike",e:"\uD83E\uDDED",d:"Southern approach to Sloan Canyon for fewer crowds and raw desert hiking. Ancient petroglyphs and desert tortoise habitat.",g:"Sloan Canyon National Conservation Area",tg:["Hiking","Desert"],p:"Free"},
{id:622,a:"enterprise",c:"Food & Drink",t:"The Stove",e:"\uD83C\uDF73",d:"All-day brunch spot with creative dishes and a warm atmosphere. The cinnamon roll pancakes and lobster mac are fan favorites.",g:"The Stove Las Vegas",tg:["Brunch","Creative"],p:"$$"},
{id:623,a:"enterprise",c:"Experience",t:"South Point Arena & Events",e:"\uD83C\uDFAA",d:"An equestrian arena and events center hosting rodeos, horse shows, concerts, and community events. Check the calendar for free events.",g:"South Point Arena Las Vegas",tg:["Events","Entertainment"],p:"$"},
{id:624,a:"enterprise",c:"Food & Drink",t:"Pin-Up Pizza at Planet Hollywood",e:"\uD83C\uDF55",d:"Massive 24-inch slices at Planet Hollywood. Consistently voted among the best pizza on the Strip. A great late-night option.",g:"Pin-Up Pizza Las Vegas",tg:["Pizza","Late Night"],p:"$"},
{id:625,a:"enterprise",c:"Experience",t:"Silverton Aquarium",e:"\uD83D\uDC20",d:"A 117,000-gallon saltwater aquarium inside Silverton Casino with stingrays, sharks, and free mermaid shows. Completely free to watch.",g:"Silverton Casino Aquarium Las Vegas",tg:["Family","Free"],p:"Free"},
{id:626,a:"enterprise",c:"Food & Drink",t:"Yard House at Town Square",e:"\uD83C\uDF7A",d:"Over 100 beers on tap, a massive menu, and a great patio at Town Square. The gardein orange chicken is shockingly good.",g:"Yard House Town Square Las Vegas",tg:["Beer","Casual"],p:"$$"},
{id:627,a:"enterprise",c:"Outdoors",t:"Blue Diamond Trail System",e:"\uD83D\uDEB4",d:"Mountain bike and hiking trails southwest of Enterprise near the village of Blue Diamond. Rocky desert terrain with Red Rock views.",g:"Blue Diamond trails Las Vegas",tg:["Biking","Desert"],p:"Free"},
{id:628,a:"enterprise",c:"Food & Drink",t:"Other Mama Sushi & Izakaya",e:"\uD83C\uDF63",d:"A trendy neighborhood sushi and izakaya spot with creative rolls, sake, and a late-night menu. A local favorite on Spring Mountain.",g:"Other Mama Las Vegas",tg:["Sushi","Late Night"],p:"$$"},
{id:629,a:"enterprise",c:"Experience",t:"Pioneer Saloon Goodsprings",e:"\uD83E\uDD20",d:"A genuine 1913 saloon in the ghost town of Goodsprings, 35 min south. Bullet holes in the walls, cold beer, and real Nevada history.",g:"Pioneer Saloon Goodsprings Nevada",tg:["History","Saloon"],p:"$"},
{id:630,a:"enterprise",c:"Experience",t:"Las Vegas South Premium Outlets",e:"\uD83D\uDECD\uFE0F",d:"Over 140 designer outlet stores in an open-air setting south of the Strip. Nike, Coach, Kate Spade, and more at discount prices.",g:"Las Vegas South Premium Outlets",tg:["Shopping","Deals"],p:"Free Entry"},
{id:701,a:"mt-charleston",c:"Outdoors",t:"Mary Jane Falls Trail",e:"\uD83D\uDCA7",d:"One of the most popular hikes on the mountain. A 3-mile round trip with 1,000 feet of elevation gain through pine forest to a stunning waterfall fed by snowmelt. Moderately challenging.",g:"Mary Jane Falls Trail Mt Charleston",tg:["Hiking","Waterfall"],p:"Free"},
{id:702,a:"mt-charleston",c:"Outdoors",t:"Cathedral Rock Trail",e:"\u26F0\uFE0F",d:"A 2.8-mile round trip to a dramatic rock formation with panoramic views. The fall colors along this trail are the best on the mountain. Popular with families and photographers.",g:"Cathedral Rock Trail Mt Charleston",tg:["Hiking","Views"],p:"Free"},
{id:703,a:"mt-charleston",c:"Experience",t:"Lee Canyon Ski Resort",e:"\u26F7\uFE0F",d:"Las Vegas's only ski resort at 8,500 feet. Skiing, snowboarding, and tubing in winter. Summer operations include scenic chair rides, mountain biking, disc golf, and axe throwing.",g:"Lee Canyon Las Vegas",tg:["Skiing","Adventure"],p:"$$"},
{id:704,a:"mt-charleston",c:"Outdoors",t:"Charleston Peak Summit",e:"\uD83C\uDFD4\uFE0F",d:"The highest point in Southern Nevada at 11,916 feet. A grueling 17-mile round trip via South Loop or North Loop trails. One of the most rewarding summit hikes in the state.",g:"Charleston Peak summit trail",tg:["Summit","Advanced"],p:"Free"},
{id:705,a:"mt-charleston",c:"Outdoors",t:"Fletcher Canyon Trail",e:"\uD83C\uDF32",d:"A peaceful 3.6-mile round trip through a shaded canyon. No waterfall at the end, just solitude and natural beauty. One of the quieter trails on the mountain. Easy to moderate.",g:"Fletcher Canyon Trail Mt Charleston",tg:["Hiking","Peaceful"],p:"Free"},
{id:706,a:"mt-charleston",c:"Food & Drink",t:"Canyon Restaurant at The Retreat",e:"\uD83C\uDF7D\uFE0F",d:"Gourmet American comfort food at 6,700 feet elevation in Kyle Canyon. Open to the public with mountain views, a cozy fireplace, and fresh baked goods from the 24-hour cafe.",g:"Canyon Restaurant Retreat on Charleston Peak",tg:["Dining","Mountain"],p:"$$"},
{id:707,a:"mt-charleston",c:"Experience",t:"Mt. Charleston Lodge Cabins",e:"\uD83C\uDFE0",d:"23 rustic log cabins at 7,717 feet. The historic lodge is being rebuilt after fire but the cabins remain open. Fireplaces, forest views, and total seclusion from city life.",g:"Mt Charleston Lodge cabins",tg:["Lodging","Rustic"],p:"$$$"},
{id:708,a:"mt-charleston",c:"Outdoors",t:"Bristlecone Trail",e:"\uD83C\uDF3F",d:"A 6-mile loop through groves of ancient bristlecone pines, some of the oldest living organisms on Earth. The twisted, weathered trunks are endlessly photogenic. Moderate difficulty.",g:"Bristlecone Trail Mt Charleston",tg:["Hiking","Ancient Trees"],p:"Free"},
{id:709,a:"mt-charleston",c:"Experience",t:"Kyle Canyon Scenic Byway",e:"\uD83D\uDE97",d:"The drive up Kyle Canyon Road (SR-157) is a dramatic journey from desert floor to alpine forest. Temperature drops 20-30 degrees. Multiple pullouts for photos. One of the best drives near Vegas.",g:"Kyle Canyon Road scenic drive",tg:["Scenic Drive","Photography"],p:"Free"},
{id:710,a:"mt-charleston",c:"Outdoors",t:"Big Falls / Waterfall Hike",e:"\uD83C\uDFDE\uFE0F",d:"Beyond Mary Jane Falls, Big Falls rewards the extra effort with a larger cascade fed entirely by snowmelt. Best flow in spring after heavy winter snow. The trail is steep and rocky.",g:"Big Falls Mt Charleston",tg:["Waterfall","Advanced"],p:"Free"},
{id:711,a:"mt-charleston",c:"Nature",t:"Spring Mountains Wildlife",e:"\uD83E\uDD8C",d:"The Spring Mountains host mule deer, wild horses, Palmer chipmunks (found nowhere else on Earth), and a rich variety of bird species. Seven distinct climate zones in one mountain range.",g:"Spring Mountains National Recreation Area wildlife",tg:["Wildlife","Nature"],p:"Free"},
{id:712,a:"mt-charleston",c:"Experience",t:"Retreat on Charleston Peak Hotel",e:"\uD83C\uDFE8",d:"A rustic, pet-friendly hotel in mid-Kyle Canyon at 6,700 feet. Rooms, a lounge, restaurant, and banquet facilities. A genuine mountain retreat 45 minutes from the Strip.",g:"Retreat on Charleston Peak hotel",tg:["Lodging","Resort"],p:"$$"},
{id:713,a:"mt-charleston",c:"Outdoors",t:"Lee Meadows Picnic Area",e:"\uD83E\uDDFA",d:"A wide open mountain meadow perfect for picnics, reading, or just breathing cool pine-scented air. No reservation needed for groups under 20. Open dawn to dusk. Free.",g:"Lee Meadows Mt Charleston",tg:["Picnic","Family"],p:"Free"},
{id:714,a:"mt-charleston",c:"Outdoors",t:"Sawmill Trailhead Loop",e:"\uD83D\uDC0E",d:"Access to over 35 miles of trails for hikers, equestrians, and mountain bikers. Views of Mummy Mountain. The multi-use trail system is the most extensive on the mountain.",g:"Sawmill Trailhead Mt Charleston",tg:["Multi-Use","Equestrian"],p:"Free"},
{id:715,a:"mt-charleston",c:"Experience",t:"Lee Canyon Summer Activities",e:"\uD83C\uDFAF",d:"When the snow melts, Lee Canyon transforms into a summer adventure park. Scenic chair rides, mountain biking, disc golf, axe throwing, and archery. Open daily May through September.",g:"Lee Canyon summer activities",tg:["Adventure","Summer"],p:"$$"},
{id:716,a:"mt-charleston",c:"Culture",t:"Cold War Memorial",e:"\uD83C\uDFDB\uFE0F",d:"The nation's first memorial dedicated to Cold War veterans. Located within the Spring Mountains National Recreation Area. A solemn and meaningful stop on the mountain.",g:"Cold War Memorial Mt Charleston",tg:["Memorial","History"],p:"Free"},
{id:717,a:"mt-charleston",c:"Outdoors",t:"Fletcher View Campground",e:"\u26FA",d:"One of the most popular campgrounds on the mountain at 7,000 feet. Pine-shaded sites with tables, fire rings, and vault toilets. First come, first served. Open May through September.",g:"Fletcher View Campground Mt Charleston",tg:["Camping","Forest"],p:"$"},
{id:718,a:"mt-charleston",c:"Experience",t:"Rainbow Canyon Community",e:"\uD83C\uDF08",d:"One of Mt. Charleston's most beloved residential neighborhoods. Log cabins and custom homes nestled among towering ponderosa pines. Homes start around $365K. No HOA, lots averaging quarter-acre.",g:"Rainbow Canyon Mt Charleston",tg:["Community","Homes"],p:"Free to explore"},
{id:719,a:"mt-charleston",c:"Experience",t:"Estates at Cathedral Rock",e:"\uD83C\uDFD4\uFE0F",d:"The premier gated community on Mt. Charleston. Million-dollar custom homes built on the ridges with sweeping mountain views. Modern construction, large lots, and ultimate privacy.",g:"Estates at Cathedral Rock Mt Charleston",tg:["Luxury","Gated"],p:"Free to explore"},
{id:720,a:"mt-charleston",c:"Experience",t:"Echo Ridge Community",e:"\uD83C\uDFE1",d:"A mid-range residential subdivision on Mt. Charleston. Custom homes starting around $710K surrounded by national forest. Four-season living with mountain character and charm.",g:"Echo Ridge Mt Charleston homes",tg:["Community","Mountain Living"],p:"Free to explore"},
{id:721,a:"mt-charleston",c:"Experience",t:"Mt. Charleston Village Condos",e:"\uD83C\uDFD8\uFE0F",d:"Affordable mountain living next to the US Forest Service Kyle Gateway. One and two-bedroom condos starting around $200K. The most accessible entry point to owning property on the mountain.",g:"Mt Charleston Village condos",tg:["Condos","Affordable"],p:"Free to explore"},
{id:722,a:"mt-charleston",c:"Experience",t:"Lee Canyon Cabins & Homes",e:"\uD83E\uDEB5",d:"The highest residential area on Mt. Charleston at 8,000-8,500 feet elevation. Secluded cabins and homes in the Toiyabe National Forest. Camp Lady of the Snows is a gated subdivision here.",g:"Lee Canyon homes Mt Charleston",tg:["Cabins","Secluded"],p:"Free to explore"},
{id:723,a:"mt-charleston",c:"Experience",t:"Deer Creek Off-Grid Community",e:"\uD83C\uDF32",d:"Mt. Charleston's most remote and secluded area. Accessed via a 2-mile dirt road. Off-grid living with pitched topography. Primarily three-season use. For those seeking true wilderness.",g:"Deer Creek Mt Charleston",tg:["Off-Grid","Remote"],p:"Free to explore"},
{id:724,a:"mt-charleston",c:"Experience",t:"Lower Kyle Canyon Ranchettes",e:"\uD83D\uDC34",d:"Custom residences and equestrian estates at the base of Mt. Charleston. Horse-zoned with space for trail riding and gardening. Joshua trees, dark skies, and views of Charleston Peak. No HOA.",g:"Lower Kyle Canyon homes Mt Charleston",tg:["Equestrian","Rural"],p:"Free to explore"},
{id:725,a:"mt-charleston",c:"Food & Drink",t:"Bighorn Grill at Lee Canyon",e:"\uD83C\uDF54",d:"Casual mountain dining at the ski resort base. Burgers, sandwiches, and comfort food after a day on the slopes or trails. The Brewin Burro coffee shop is open for morning hikers.",g:"Bighorn Grill Lee Canyon",tg:["Casual","Mountain"],p:"$"},
{id:726,a:"mt-charleston",c:"Outdoors",t:"McWilliams Campground",e:"\uD83C\uDFD5\uFE0F",d:"A quieter alternative to Fletcher View at 8,400 feet elevation. 40 sites surrounded by dense pine forest. Tables, fire rings, vault toilets. Reservation or first come first served.",g:"McWilliams Campground Mt Charleston",tg:["Camping","Quiet"],p:"$"},
{id:727,a:"mt-charleston",c:"Nature",t:"Fall Colors on the Mountain",e:"\uD83C\uDF42",d:"September through October, the aspens and oaks on Mt. Charleston turn brilliant gold, orange, and crimson. Cathedral Rock Trail and Kyle Canyon Road offer the best displays. Peak color varies yearly.",g:"Mt Charleston fall colors",tg:["Seasonal","Photography"],p:"Free"},
{id:728,a:"mt-charleston",c:"Outdoors",t:"South Loop to Charleston Peak",e:"\uD83E\uDD7E",d:"The more popular of two routes to the 11,916-foot summit. 8.4 miles one way with 4,300 feet of elevation gain. Passes through five climate zones. Start before dawn in summer.",g:"South Loop Trail Charleston Peak",tg:["Summit","Strenuous"],p:"Free"},
{id:729,a:"mt-charleston",c:"Experience",t:"Spring Mountains Visitor Gateway",e:"\uD83D\uDCCD",d:"The US Forest Service visitor center at the base of Kyle Canyon. Maps, trail conditions, ranger programs, and a gift shop. The best first stop for anyone new to the mountain.",g:"Spring Mountains Visitor Gateway",tg:["Visitor Center","Info"],p:"Free"},
{id:730,a:"mt-charleston",c:"Views",t:"Mummy Mountain Viewpoint",e:"\uD83D\uDC41\uFE0F",d:"Named for its profile resembling a mummy lying down, this 11,528-foot peak is visible from many trails. The best views are from Sawmill Trailhead and the Bristlecone Trail.",g:"Mummy Mountain Mt Charleston",tg:["Views","Landmark"],p:"Free"},
];

function linkify(t){return t.replace(/(https?:\/\/[^\s,)]+|[a-z0-9][-a-z0-9]*\.(com|org|gov|net|io)\/[^\s,)]*|[a-z0-9][-a-z0-9]*\.(com|org|gov|net|io))/gi,function(u){var h=u.startsWith('http')?u:'https://'+u;return '<a href="'+h+'" target="_blank" rel="noopener" style="color:var(--accent);text-decoration:underline">'+u+'</a>';});}
const AN={
  "the-strip":"The Strip","downtown":"Downtown","summerlin":"Summerlin",
  "henderson":"Henderson","north-lv":"N. Las Vegas","centennial":"Centennial Hills","enterprise":"Enterprise","mt-charleston":"Mt. Charleston"
};
const CATS=["Experience","Outdoors","Food & Drink","Culture","Nature","Views","Nightlife"];
const TAGS=["Family","Hiking","Free","Photography","History","Art","Iconic","Sports","Sunset","Adventure","Romantic","Date Night","Relaxing","Shopping","Dining","Local","Unique","Thrill","Wildlife","Community"];

const $=id=>document.getElementById(id);
let favs=JSON.parse(localStorage.getItem("sevn_f")||"[]");
let selAreas=new Set();
let selCats=new Set();
let selTags=new Set();

// ═══════════════════════════════════════════════════
// BUILD FILTER CHIPS
// ═══════════════════════════════════════════════════
function buildChips(){
  buildDrop("areaDrop","areaTrig","Area",Object.keys(AN).map(k=>({val:k,label:AN[k]})),selAreas);
  buildDrop("catDrop","catTrig","Type",CATS.map(c=>({val:c,label:c})),selCats);
  buildDrop("tagDrop","tagTrig","Vibe",TAGS.map(t=>({val:t,label:t})),selTags);
}

const filterBack=$("filterBack");
let openDrop=null;

function closeAllDrops(){
  document.querySelectorAll(".fdrop").forEach(d=>d.classList.remove("open"));
  filterBack.classList.remove("open");
  openDrop=null;
}
filterBack.addEventListener("click",closeAllDrops);

function buildDrop(dropId,trigId,label,items,selSet){
  const drop=$(dropId);
  const trig=$(trigId);

  drop.innerHTML="";
  items.forEach(item=>{
    const opt=document.createElement("div");
    opt.className="fdrop-opt"+(selSet.has(item.val)?" sel":"");
    opt.dataset.val=item.val;
    opt.innerHTML=item.label+'<span class="fo-ck">\u2713</span>';
    opt.addEventListener("click",()=>{
      if(selSet.has(item.val)){selSet.delete(item.val);opt.classList.remove("sel");}
      else{selSet.add(item.val);opt.classList.add("sel");}
      updateTrig(trigId,label,selSet);
      updateClear();
      render();
    });
    drop.appendChild(opt);
  });

  trig.addEventListener("click",()=>{
    if(openDrop===dropId){closeAllDrops();return;}
    closeAllDrops();
    // Position dropdown below the filter bar
    const bar=$("filterBar");
    const rect=bar.getBoundingClientRect();
    drop.style.top=(rect.bottom+6)+"px";
    drop.classList.add("open");
    filterBack.classList.add("open");
    openDrop=dropId;
  });

  updateTrig(trigId,label,selSet);
}

function updateTrig(trigId,label,selSet){
  const trig=$(trigId);
  const hasSel=selSet.size>0;
  trig.classList.toggle("has-sel",hasSel);
  const svg='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>';
  if(hasSel){
    trig.innerHTML=label+' <span class="filter-cnt">'+selSet.size+'</span> '+svg;
  } else {
    trig.innerHTML=label+' '+svg;
  }
}

function updateClear(){
  const total=selAreas.size+selCats.size+selTags.size;
  $("clearAll").classList.toggle("show",total>0);
}

$("clearAll").addEventListener("click",()=>{
  selAreas.clear();selCats.clear();selTags.clear();
  document.querySelectorAll(".fdrop-opt").forEach(o=>o.classList.remove("sel"));
  updateTrig("areaTrig","Area",selAreas);
  updateTrig("catTrig","Type",selCats);
  updateTrig("tagTrig","Vibe",selTags);
  updateClear();
  render();
});

// ═══════════════════════════════════════════════════
// FILTER + RENDER
// ═══════════════════════════════════════════════════
function getFiltered(){
  return D.filter(act=>{
    if(selAreas.size>0&&!selAreas.has(act.a))return false;
    if(selCats.size>0&&!selCats.has(act.c))return false;
    if(selTags.size>0){
      if(!act.tg||!act.tg.some(t=>selTags.has(t)))return false;
    }
    return true;
  });
}

function render(){
  const results=getFiltered();
  const grid=$("resultsGrid");
  const empty=$("emptyState");
  const count=$("resultCount");

  count.textContent=results.length+" result"+(results.length!==1?"s":"");

  if(results.length===0){
    grid.innerHTML="";
    empty.style.display="flex";
    return;
  }
  empty.style.display="none";
  grid.innerHTML="";

  results.forEach(act=>{
    const card=document.createElement("div");
    card.className="gcard";
    const isSaved=favs.some(f=>f.id===act.id);
    card.innerHTML=`
      <div class="gc-emoji" data-c="${act.c}">${act.e}</div>
      <div class="gc-info">
        <div class="gc-cat">${act.c}</div>
        <div class="gc-title">${act.t}</div>
        <div class="gc-area">${AN[act.a]||""}</div>
      </div>
      <button class="gc-heart ${isSaved?'saved':''}" data-id="${act.id}">
        <svg viewBox="0 0 24 24" ${isSaved?'fill="currentColor"':'fill="none"'} stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      </button>`;
    card.addEventListener("click",e=>{
      if(e.target.closest(".gc-heart"))return;
      openDetail(act);
    });
    card.querySelector(".gc-heart").addEventListener("click",e=>{
      e.stopPropagation();
      toggleFav(act);
      render();
    });
    grid.appendChild(card);
  });
}

// ═══════════════════════════════════════════════════
// FAVORITES
// ═══════════════════════════════════════════════════
function toggleFav(act){
  const idx=favs.findIndex(f=>f.id===act.id);
  if(idx>-1)favs.splice(idx,1);else favs.push(act);
  localStorage.setItem("sevn_f",JSON.stringify(favs));
}

// ═══════════════════════════════════════════════════
// DETAIL MODAL
// ═══════════════════════════════════════════════════
let detailAct=null;
function openDetail(act){
  detailAct=act;
  $("dEmoji").textContent=act.e;
  $("dCat").textContent=act.c;
  $("dTitle").textContent=act.t;
  $("dDesc").textContent=act.d;
  const tip=TIPS[act.id];
  if(tip){$("dTip").innerHTML='<strong>Local Tip</strong>'+linkify(tip);$("dTip").style.display="block";}
  else{$("dTip").style.display="none";}
  if(act.s){$("dSeason").innerHTML='\u{1F5D3}\uFE0F '+act.s;$("dSeason").style.display="inline-flex";}
  else{$("dSeason").style.display="none";}
  // Tags
  const tags=$("dTags");
  if(act.tg&&act.tg.length){
    tags.innerHTML=act.tg.map(t=>'<span class="dtag">'+t+'</span>').join("");
    tags.style.display="flex";
  } else {tags.style.display="none";}
  const isSaved=favs.some(f=>f.id===act.id);
  $("dSaveBtn").textContent=isSaved?"\u2713 Saved":"Save";
  $("dSaveBtn").classList.toggle("saved",isSaved);
  $("dMod").classList.add("open");
}
function closeDetail(){$("dMod").classList.remove("open");}
$("dX").addEventListener("click",closeDetail);
$("dBg").addEventListener("click",closeDetail);
$("dSaveBtn").addEventListener("click",()=>{
  if(!detailAct)return;
  toggleFav(detailAct);
  const isSaved=favs.some(f=>f.id===detailAct.id);
  $("dSaveBtn").textContent=isSaved?"\u2713 Saved":"Save";
  $("dSaveBtn").classList.toggle("saved",isSaved);
  render();
});
document.addEventListener("keydown",e=>{if(e.key==="Escape")closeDetail();});

// ═══════════════════════════════════════════════════
// CHECK URL PARAMS (deep link from main page)
// ═══════════════════════════════════════════════════
const params=new URLSearchParams(window.location.search);
if(params.get("area")){
  const a=params.get("area");
  if(AN[a])selAreas.add(a);
}
if(params.get("cat")){selCats.add(params.get("cat"));}
if(params.get("tag")){selTags.add(params.get("tag"));}

// ═══════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════
buildChips();
updateClear();
render();

</script>
